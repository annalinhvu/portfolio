<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>From Scratch — Recipe Index</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root[data-theme="light"]{
  --bg:#fdf9f2;
  --surface:#ffffff;
  --surface-2:#f5ece0;
  --text-1:#1e1a16;
  --text-2:#4a4440;
  --text-3:#8c857c;
  --text-4:#b8b0a4;
  --accent:#c47d5a;
  --border:#e6d9c8;
  --border-strong:#c8b8a4;
  --shadow:0 2px 14px rgba(0,0,0,.07);
  --shadow-hover:0 10px 32px rgba(0,0,0,.13);
  --cat-breakfast:#e8c47a;
  --cat-main:#c47d5a;
  --cat-side:#7b9e87;
  --cat-dessert:#d4a0a0;
  --cat-snack:#c9a96e;
  --cat-drink:#90aec8;
}
:root[data-theme="dark"]{
  --bg:#181511;
  --surface:#221e1a;
  --surface-2:#2c2722;
  --text-1:#ece5db;
  --text-2:#c2b9ae;
  --text-3:#8c857c;
  --text-4:#5c5650;
  --accent:#d49a7a;
  --border:#38302a;
  --border-strong:#50443c;
  --shadow:0 2px 14px rgba(0,0,0,.2);
  --shadow-hover:0 10px 32px rgba(0,0,0,.32);
  --cat-breakfast:#d4be82;
  --cat-main:#d49a7a;
  --cat-side:#9bbaa5;
  --cat-dessert:#d4a0a0;
  --cat-snack:#c9a96e;
  --cat-drink:#a0b8d4;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text-2);
  min-height:100vh;transition:background .3s,color .3s;
  -webkit-font-smoothing:antialiased;
}

/* ── Topbar ── */
.topbar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:46px;
  background:var(--surface);border-bottom:1px solid var(--border);
  transition:background .3s,border-color .3s;
}
.back-link{
  font-size:.66rem;letter-spacing:1px;text-transform:uppercase;
  color:var(--text-4);text-decoration:none;transition:color .2s;
}
.back-link:hover{color:var(--text-2)}
.topbar-right{display:flex;align-items:center;gap:4px}
.saved-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 11px;border-radius:20px;
  border:1.5px solid var(--border);background:none;
  font-size:.7rem;color:var(--text-4);
  cursor:pointer;transition:all .2s;font-family:inherit;
}
.saved-btn:hover,.saved-btn.has-saved{color:var(--accent);border-color:var(--accent)}
.theme-btn{
  background:none;border:none;cursor:pointer;
  font-size:.9rem;color:var(--text-4);padding:5px 8px;transition:color .2s;
}
.theme-btn:hover{color:var(--text-2)}

/* ── Masthead ── */
.masthead{
  text-align:center;padding:68px 28px 60px;
  background:var(--surface-2);
  border-bottom:2px solid var(--border);
  position:relative;overflow:hidden;
}
/* Subtle dot grid */
.masthead::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle,var(--accent) 1.5px,transparent 1.5px);
  background-size:22px 22px;opacity:.07;pointer-events:none;
}
.masthead-eyebrow{
  font-size:.6rem;letter-spacing:3px;text-transform:uppercase;
  color:var(--text-4);margin-bottom:20px;position:relative;
}
.masthead-title{
  font-family:Georgia,serif;
  font-size:clamp(3rem,7vw,5.5rem);
  font-weight:400;font-style:italic;
  color:var(--text-1);line-height:.95;
  letter-spacing:-1.5px;margin-bottom:18px;
  position:relative;
}
.masthead-tagline{
  font-family:Georgia,serif;font-style:italic;
  font-size:.9rem;color:var(--text-3);position:relative;
}

/* ── Category pills strip ── */
.cat-strip-wrap{
  position:sticky;top:46px;z-index:90;
  background:var(--bg);border-bottom:1px solid var(--border);
  transition:background .3s;
  overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none;
}
.cat-strip-wrap::-webkit-scrollbar{display:none}
.cat-strip{
  display:flex;gap:8px;padding:14px 28px;
  min-width:max-content;align-items:center;
}
.cat-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 14px;border-radius:20px;
  border:1.5px solid var(--border);
  background:var(--surface);
  font-size:.68rem;letter-spacing:.8px;text-transform:capitalize;
  color:var(--text-3);cursor:pointer;transition:all .2s;
  user-select:none;white-space:nowrap;font-family:inherit;
}
.cat-pill:hover{border-color:var(--border-strong);color:var(--text-1)}
.cat-pill.active{color:#fff;border-color:transparent}
/* Light categories get dark text */
.cat-pill[data-cat="breakfast"].active,
.cat-pill[data-cat="snack"].active{color:var(--text-1)}
.cat-pill[data-cat="all"].active{background:var(--text-1)}
.cat-pill[data-cat="breakfast"].active{background:var(--cat-breakfast)}
.cat-pill[data-cat="main"].active{background:var(--cat-main)}
.cat-pill[data-cat="side"].active{background:var(--cat-side)}
.cat-pill[data-cat="dessert"].active{background:var(--cat-dessert)}
.cat-pill[data-cat="snack"].active{background:var(--cat-snack)}
.cat-pill[data-cat="drink"].active{background:var(--cat-drink)}
.cat-pill[data-cat="saved"].active{background:var(--accent);color:#fff}
.cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── Page / filter area ── */
.page{max-width:1140px;margin:0 auto;padding:0 28px 100px}

.filter-row{
  display:flex;gap:8px;padding:18px 0;
  border-bottom:1px solid var(--border);
  align-items:center;flex-wrap:wrap;
}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-icon{
  position:absolute;left:11px;top:50%;transform:translateY(-50%);
  font-size:.75rem;color:var(--text-4);pointer-events:none;
}
.search-input{
  width:100%;padding:9px 14px 9px 30px;border-radius:6px;
  border:1.5px solid var(--border);background:var(--surface);
  font-size:.8rem;color:var(--text-2);font-family:inherit;
  transition:border-color .2s;
}
.search-input::placeholder{color:var(--text-4)}
.search-input:focus{outline:none;border-color:var(--accent)}
.filter-select{
  padding:9px 28px 9px 12px;border-radius:6px;
  border:1.5px solid var(--border);background:var(--surface);
  font-size:.76rem;color:var(--text-2);font-family:inherit;
  cursor:pointer;-webkit-appearance:none;appearance:none;
  background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%238c857c'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 10px center;
  transition:border-color .2s;
}
.filter-select:focus{outline:none;border-color:var(--accent)}

.result-count{
  padding:16px 0 8px;
  font-size:.7rem;letter-spacing:.8px;color:var(--text-4);
}

/* ── Card grid ── */
.card-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:18px;
}
@media(max-width:1000px){.card-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:580px){.card-grid{grid-template-columns:1fr}}

/* ── Recipe card ── */
.recipe-card{
  background:var(--surface);border-radius:10px;
  overflow:hidden;cursor:pointer;
  box-shadow:var(--shadow);
  transition:transform .22s,box-shadow .22s;
  display:flex;flex-direction:column;
  border:1px solid var(--border);
}
.recipe-card:hover{
  transform:translateY(-4px);box-shadow:var(--shadow-hover);
}

.card-header{
  padding:14px 18px 12px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.card-cat-label{
  font-size:.58rem;letter-spacing:2px;text-transform:uppercase;
  font-weight:700;
}
.card-cat-icon{font-size:.75rem;opacity:.7}

.card-body{
  padding:16px 18px 12px;flex:1;
}
.card-name{
  font-family:Georgia,serif;font-size:1.08rem;font-weight:400;
  color:var(--text-1);margin-bottom:6px;line-height:1.3;
}
.card-tagline{
  font-family:Georgia,serif;font-style:italic;
  font-size:.8rem;color:var(--text-3);line-height:1.5;
}

.card-footer{
  display:flex;align-items:center;gap:8px;
  padding:10px 18px 14px;
  border-top:1px solid var(--border);
  flex-shrink:0;
}
.cuisine-stamp{
  font-size:.56rem;text-transform:uppercase;
  letter-spacing:1.2px;font-weight:600;
  color:var(--text-3);border:1.5px solid var(--border-strong);
  padding:2px 7px;border-radius:2px;white-space:nowrap;
}
.diff-dots{
  display:inline-flex;align-items:center;gap:3px;flex-shrink:0;
}
.diff-dot{
  width:7px;height:7px;border-radius:50%;
  border:1.5px solid var(--accent);transition:background .2s;
}
.diff-dot.filled{background:var(--accent)}
.card-time{
  font-size:.68rem;color:var(--text-4);
  margin-left:auto;white-space:nowrap;
}
.heart-btn{
  background:none;border:none;cursor:pointer;
  font-size:.95rem;line-height:1;padding:2px;
  color:var(--text-4);transition:all .2s;flex-shrink:0;
}
.heart-btn:hover{color:var(--accent);transform:scale(1.2)}
.heart-btn.saved{color:var(--accent)}

/* ── Empty state ── */
.empty-state{
  text-align:center;padding:80px 20px;
  color:var(--text-4);grid-column:1/-1;
}
.empty-state p{
  font-family:Georgia,serif;font-style:italic;font-size:.9rem;
}

/* ── Detail view ── */
.detail-view{display:none}
.detail-view.active{display:block}
.catalog-view.hidden{display:none}

.detail-back{
  display:inline-flex;align-items:center;gap:5px;
  font-size:.66rem;letter-spacing:1px;text-transform:uppercase;
  color:var(--text-4);cursor:pointer;padding:20px 0 0;
  transition:color .2s;background:none;border:none;font-family:inherit;
}
.detail-back:hover{color:var(--text-2)}

/* Detail banner */
.detail-banner{
  border-radius:10px;padding:32px 36px;margin-top:12px;
  margin-bottom:36px;position:relative;overflow:hidden;
}
.detail-banner::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle,rgba(255,255,255,.12) 1.5px,transparent 1.5px);
  background-size:18px 18px;pointer-events:none;
}
.detail-banner-meta{
  font-size:.6rem;letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,.7);margin-bottom:14px;
  display:flex;gap:10px;align-items:center;position:relative;
}
.detail-banner-sep{opacity:.4}
.detail-title{
  font-family:Georgia,serif;
  font-size:clamp(1.8rem,3.5vw,2.8rem);
  font-weight:400;color:#fff;
  line-height:1.1;letter-spacing:-.5px;margin-bottom:10px;
  position:relative;
}
.detail-tagline{
  font-family:Georgia,serif;font-style:italic;
  font-size:.95rem;color:rgba(255,255,255,.8);
  margin-bottom:14px;position:relative;
}
.detail-badges{display:flex;gap:6px;flex-wrap:wrap;position:relative}
.badge{
  font-size:.58rem;letter-spacing:1px;text-transform:uppercase;
  color:rgba(255,255,255,.8);padding:3px 9px;
  border:1px solid rgba(255,255,255,.3);border-radius:2px;
}

/* Detail body */
.detail-body{
  display:grid;grid-template-columns:2fr 1fr;gap:48px;
}
@media(max-width:640px){
  .detail-body{grid-template-columns:1fr}
  .detail-banner{padding:24px 20px}
}

.detail-description{
  font-size:.92rem;color:var(--text-2);line-height:1.85;
  margin-bottom:32px;
}
.detail-section{margin-bottom:28px}
.detail-section-label{
  font-size:.58rem;letter-spacing:2px;text-transform:uppercase;
  font-weight:700;color:var(--accent);margin-bottom:12px;
  display:flex;align-items:center;gap:10px;
}
.detail-section-label::after{
  content:'';flex:1;height:1px;background:var(--border);
}

.ingredient-list{list-style:none}
.ingredient-list li{
  font-size:.86rem;color:var(--text-2);
  padding:6px 0 6px 14px;position:relative;
  line-height:1.6;border-bottom:1px solid var(--border);
}
.ingredient-list li:last-child{border-bottom:none}
.ingredient-list li::before{
  content:'';position:absolute;left:0;top:13px;
  width:5px;height:5px;border-radius:50%;
  background:var(--accent);opacity:.55;
}

.instruction-list{list-style:none;counter-reset:steps}
.instruction-list li{
  font-size:.86rem;color:var(--text-2);
  padding:8px 0 8px 32px;position:relative;
  line-height:1.78;counter-increment:steps;
  border-bottom:1px solid var(--border);
}
.instruction-list li:last-child{border-bottom:none}
.instruction-list li::before{
  content:counter(steps);position:absolute;left:0;top:8px;
  font-family:Georgia,serif;font-size:.8rem;
  color:var(--accent);width:22px;
}

.tips-box{
  padding:14px 16px;
  background:var(--surface-2);border-radius:6px;
  border-left:3px solid var(--accent);
  font-family:Georgia,serif;font-style:italic;
  font-size:.84rem;color:var(--text-3);line-height:1.8;
}

/* Sidebar */
.detail-sidebar-inner{
  position:sticky;top:calc(46px + 52px + 20px);
}
.sidebar-header{
  font-size:.58rem;letter-spacing:2px;text-transform:uppercase;
  font-weight:700;color:var(--accent);margin-bottom:12px;
  display:flex;align-items:center;gap:10px;
}
.sidebar-header::after{content:'';flex:1;height:1px;background:var(--border)}
.sidebar-stat{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 0;border-bottom:1px solid var(--border);font-size:.8rem;
}
.sidebar-stat:last-of-type{border-bottom:none}
.stat-label{color:var(--text-3);text-transform:capitalize}
.stat-value{color:var(--text-1);font-weight:500;text-transform:capitalize}

.save-btn{
  display:flex;align-items:center;justify-content:center;gap:7px;
  margin-top:18px;padding:11px 16px;
  border:1.5px solid var(--border);border-radius:6px;
  background:none;font-size:.78rem;font-family:inherit;
  color:var(--text-3);cursor:pointer;transition:all .2s;width:100%;
}
.save-btn:hover{border-color:var(--accent);color:var(--accent)}
.save-btn.saved{border-color:var(--accent);color:var(--accent);background:var(--surface-2)}

/* ── Footer ── */
.page-footer{
  padding:52px 0 16px;text-align:center;
  font-size:.66rem;letter-spacing:.5px;color:var(--text-4);
}
.page-footer a{color:var(--text-4);text-decoration:none;transition:color .2s}
.page-footer a:hover{color:var(--text-2)}

/* ── Animations ── */
@keyframes cardIn{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
.card-in{animation:cardIn .28s ease forwards}

/* ── Responsive ── */
@media(max-width:580px){
  .topbar,.cat-strip{padding-left:16px;padding-right:16px}
  .page{padding:0 16px 80px}
  .masthead{padding:48px 20px 40px}
  .detail-back{padding-top:16px}
}
</style>
</head>
<body>

<div class="topbar">
  <a href="../../index.html#lab" class="back-link">&larr; Portfolio</a>
  <div class="topbar-right">
    <button class="saved-btn" id="savedBadge" onclick="filterSaved()">
      <span id="savedHeart">&#9825;</span><span id="savedCount">0</span>&nbsp;saved
    </button>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">&#9790;</button>
  </div>
</div>

<div class="catalog-view" id="catalogView">

  <div class="masthead">
    <p class="masthead-eyebrow">a personal recipe collection</p>
    <h1 class="masthead-title">From Scratch</h1>
    <p class="masthead-tagline">made with care</p>
  </div>

  <div class="cat-strip-wrap">
    <div class="cat-strip">
      <button class="cat-pill active" data-cat="all" onclick="setCat('all',this)">All</button>
      <button class="cat-pill" data-cat="breakfast" onclick="setCat('breakfast',this)">
        <span class="cat-dot" style="background:var(--cat-breakfast)"></span>Breakfast
      </button>
      <button class="cat-pill" data-cat="main" onclick="setCat('main',this)">
        <span class="cat-dot" style="background:var(--cat-main)"></span>Main
      </button>
      <button class="cat-pill" data-cat="side" onclick="setCat('side',this)">
        <span class="cat-dot" style="background:var(--cat-side)"></span>Side
      </button>
      <button class="cat-pill" data-cat="dessert" onclick="setCat('dessert',this)">
        <span class="cat-dot" style="background:var(--cat-dessert)"></span>Dessert
      </button>
      <button class="cat-pill" data-cat="snack" onclick="setCat('snack',this)">
        <span class="cat-dot" style="background:var(--cat-snack)"></span>Snack
      </button>
      <button class="cat-pill" data-cat="drink" onclick="setCat('drink',this)">
        <span class="cat-dot" style="background:var(--cat-drink)"></span>Drink
      </button>
      <button class="cat-pill" data-cat="saved" onclick="setCat('saved',this)">&#9825;&nbsp;Saved</button>
    </div>
  </div>

  <div class="page">
    <div class="filter-row">
      <div class="search-wrap">
        <span class="search-icon">&#9906;</span>
        <input type="search" class="search-input" id="searchInput"
          placeholder="Search recipes, ingredients..." oninput="onSearch()">
      </div>
      <select class="filter-select" id="cuisineFilter" onchange="applyFilters()">
        <option value="">All cuisines</option>
        <option value="italian">Italian</option>
        <option value="japanese">Japanese</option>
        <option value="korean">Korean</option>
        <option value="french">French</option>
        <option value="american">American</option>
        <option value="mexican">Mexican</option>
        <option value="other">Other</option>
      </select>
      <select class="filter-select" id="difficultyFilter" onchange="applyFilters()">
        <option value="">Any difficulty</option>
        <option value="easy">Easy</option>
        <option value="moderate">Moderate</option>
        <option value="involved">Involved</option>
      </select>
    </div>

    <div class="result-count" id="resultCount"></div>
    <div class="card-grid" id="cardGrid"></div>

    <div class="page-footer">
      <a href="../../index.html#lab">&larr; back to portfolio</a>
    </div>
  </div>

</div><!-- /catalog-view -->

<div class="detail-view" id="detailView">
  <div class="page">
    <button class="detail-back" onclick="showCatalog()">&larr; Back to recipes</button>
    <div id="detailContent"></div>
  </div>
</div>

<script>
const LS_FAV   = 'from-scratch-favorites';
const LS_THEME = 'from-scratch-theme';

const CAT_COLORS = {
  breakfast:'var(--cat-breakfast)', main:'var(--cat-main)',
  side:'var(--cat-side)',           dessert:'var(--cat-dessert)',
  snack:'var(--cat-snack)',         drink:'var(--cat-drink)',
};
// Icons for card headers
const CAT_ICONS = {
  breakfast:'◎', main:'◆', side:'◇',
  dessert:'✦', snack:'◈', drink:'◉',
};
// Whether to use dark text on the category color
const CAT_DARK = { breakfast:true, snack:true };

let allRecipes = [];
let activeCat  = 'all';
let savedIds   = new Set();
let searchTimer = null;

/* ── Theme ── */
function toggleTheme(){
  const html = document.documentElement;
  const next = html.getAttribute('data-theme')==='dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem(LS_THEME, next);
  updateThemeBtn(next);
}
function updateThemeBtn(t){
  document.getElementById('themeBtn').textContent = t==='dark' ? '\u2600' : '\u263E';
}

/* ── Favorites ── */
function loadSaved(){
  try{ savedIds = new Set(JSON.parse(localStorage.getItem(LS_FAV)||'[]')); }
  catch{ savedIds = new Set(); }
}
function persistSaved(){ localStorage.setItem(LS_FAV, JSON.stringify([...savedIds])); }

function toggleFavorite(id, e){
  if(e) e.stopPropagation();
  savedIds.has(id) ? savedIds.delete(id) : savedIds.add(id);
  persistSaved();
  updateSavedBadge();
  document.querySelectorAll('.heart-btn[data-id="'+id+'"]').forEach(btn=>{
    btn.classList.toggle('saved', savedIds.has(id));
    btn.innerHTML = savedIds.has(id) ? '&#9829;' : '&#9825;';
  });
  const sb = document.getElementById('detailSaveBtn');
  if(sb && parseInt(sb.dataset.id)===id){
    sb.classList.toggle('saved', savedIds.has(id));
    sb.innerHTML = savedIds.has(id) ? '&#9829;&ensp;Saved' : '&#9825;&ensp;Save Recipe';
  }
  if(activeCat==='saved' && !savedIds.has(id)) applyFilters();
}

function updateSavedBadge(){
  const n = savedIds.size;
  document.getElementById('savedCount').textContent = n;
  document.getElementById('savedHeart').innerHTML = n>0 ? '&#9829;' : '&#9825;';
  document.getElementById('savedBadge').classList.toggle('has-saved', n>0);
}

/* ── Filters ── */
function setCat(cat, btn){
  activeCat = cat;
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}
function filterSaved(){
  activeCat = 'saved';
  document.querySelectorAll('.cat-pill').forEach(p=>{
    p.classList.toggle('active', p.dataset.cat==='saved');
  });
  applyFilters();
}
function onSearch(){
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilters, 150);
}

function applyFilters(){
  const q       = (document.getElementById('searchInput').value||'').toLowerCase().trim();
  const cuisine = document.getElementById('cuisineFilter').value;
  const diff    = document.getElementById('difficultyFilter').value;

  const filtered = allRecipes.filter(r=>{
    if(activeCat==='saved')      { if(!savedIds.has(r.id)) return false; }
    else if(activeCat!=='all')   { if(r.category!==activeCat) return false; }
    if(cuisine && r.cuisine!==cuisine) return false;
    if(diff    && r.difficulty!==diff) return false;
    if(q){
      const h=[r.name,r.tagline,r.ingredients,r.cuisine,r.category].join(' ').toLowerCase();
      if(!h.includes(q)) return false;
    }
    return true;
  });

  renderCards(filtered);
  const el = document.getElementById('resultCount');
  el.textContent = filtered.length + (filtered.length===1?' recipe':' recipes')
    + (activeCat==='saved' ? ' saved' : '');
}

/* ── Render ── */
function diffDots(d){
  const n = {easy:1,moderate:2,involved:3}[d]||1;
  return [0,1,2].map(i=>`<span class="diff-dot${i<n?' filled':''}"></span>`).join('');
}

function fmtTime(min){
  if(!min) return '—';
  if(min>=60){
    const h=Math.floor(min/60), m=min%60;
    return h+'h'+(m?'&thinsp;'+m+'m':'');
  }
  return min+'m';
}

function renderCards(list){
  const grid = document.getElementById('cardGrid');
  if(!list.length){
    grid.innerHTML='<div class="empty-state"><p>No recipes found.<br>Try adjusting your filters.</p></div>';
    return;
  }
  grid.innerHTML = list.map((r,i)=>{
    const color    = CAT_COLORS[r.category] || 'var(--accent)';
    const icon     = CAT_ICONS[r.category] || '◆';
    const textCol  = CAT_DARK[r.category] ? 'color:var(--text-1)' : 'color:#fff';
    const isSaved  = savedIds.has(r.id);
    const totalMin = r.prep_time_min + r.cook_time_min;

    return `<div class="recipe-card card-in" style="animation-delay:${i*0.03}s" onclick="showDetail(${r.id})">
      <div class="card-header" style="background:${color}">
        <span class="card-cat-label" style="${textCol}">${r.category}</span>
        <span class="card-cat-icon" style="${textCol}">${icon}</span>
      </div>
      <div class="card-body">
        <div class="card-name">${r.name}</div>
        <div class="card-tagline">${r.tagline}</div>
      </div>
      <div class="card-footer">
        <span class="cuisine-stamp">${r.cuisine}</span>
        <span class="diff-dots">${diffDots(r.difficulty)}</span>
        <span class="card-time">${fmtTime(totalMin)}</span>
        <button class="heart-btn${isSaved?' saved':''}" data-id="${r.id}"
          onclick="toggleFavorite(${r.id},event)">${isSaved?'&#9829;':'&#9825;'}</button>
      </div>
    </div>`;
  }).join('');
}

/* ── Detail view ── */
function showDetail(id){
  const r = allRecipes.find(x=>x.id===id);
  if(!r) return;
  const color   = CAT_COLORS[r.category] || 'var(--accent)';
  const isSaved = savedIds.has(r.id);

  const ingredients  = r.ingredients.split('\n')
    .map(l=>l.replace(/^-\s*/,'').trim()).filter(Boolean);
  const instructions = r.instructions.split('\n')
    .map(l=>l.replace(/^\d+\.\s*/,'').trim()).filter(Boolean);

  const dietaryHtml = r.dietary.length
    ? r.dietary.map(d=>`<span class="badge">${d}</span>`).join('') : '';

  const tipsHtml = r.tips
    ? `<div class="detail-section">
        <div class="detail-section-label">Tips</div>
        <div class="tips-box">${r.tips}</div>
      </div>` : '';

  const totalMin = r.prep_time_min + r.cook_time_min;

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-banner" style="background:${color}">
      <div class="detail-banner-meta">
        <span>${r.category}</span>
        <span class="detail-banner-sep">/</span>
        <span>${r.cuisine}</span>
        <span class="detail-banner-sep">/</span>
        <span>${r.difficulty}</span>
      </div>
      <h1 class="detail-title">${r.name}</h1>
      <p class="detail-tagline">${r.tagline}</p>
      ${dietaryHtml ? '<div class="detail-badges">'+dietaryHtml+'</div>' : ''}
    </div>
    <div class="detail-body">
      <div>
        <p class="detail-description">${r.description}</p>
        <div class="detail-section">
          <div class="detail-section-label">Ingredients</div>
          <ul class="ingredient-list">
            ${ingredients.map(i=>`<li>${i}</li>`).join('')}
          </ul>
        </div>
        <div class="detail-section">
          <div class="detail-section-label">Instructions</div>
          <ol class="instruction-list">
            ${instructions.map(s=>`<li>${s}</li>`).join('')}
          </ol>
        </div>
        ${tipsHtml}
      </div>
      <div>
        <div class="detail-sidebar-inner">
          <div class="sidebar-header">Quick Facts</div>
          <div class="sidebar-stat">
            <span class="stat-label">Prep</span>
            <span class="stat-value">${r.prep_time_min} min</span>
          </div>
          <div class="sidebar-stat">
            <span class="stat-label">Cook</span>
            <span class="stat-value">${r.cook_time_min>0?r.cook_time_min+' min':'—'}</span>
          </div>
          <div class="sidebar-stat">
            <span class="stat-label">Total</span>
            <span class="stat-value">${fmtTime(totalMin)}</span>
          </div>
          <div class="sidebar-stat">
            <span class="stat-label">Serves</span>
            <span class="stat-value">${r.servings}</span>
          </div>
          <div class="sidebar-stat">
            <span class="stat-label">Difficulty</span>
            <span class="stat-value">${r.difficulty}</span>
          </div>
          <div class="sidebar-stat">
            <span class="stat-label">Cuisine</span>
            <span class="stat-value">${r.cuisine}</span>
          </div>
          <div class="sidebar-stat">
            <span class="stat-label">Source</span>
            <span class="stat-value">${r.source}</span>
          </div>
          <button class="save-btn${isSaved?' saved':''}" id="detailSaveBtn"
            data-id="${r.id}" onclick="toggleFavorite(${r.id},event)">
            ${isSaved?'&#9829;&ensp;Saved':'&#9825;&ensp;Save Recipe'}
          </button>
        </div>
      </div>
    </div>`;

  document.getElementById('catalogView').classList.add('hidden');
  document.getElementById('detailView').classList.add('active');
  window.scrollTo(0,0);
  location.hash = 'recipe-'+id;
}

function showCatalog(){
  document.getElementById('detailView').classList.remove('active');
  document.getElementById('catalogView').classList.remove('hidden');
  history.pushState('', document.title, location.pathname);
}

function handleHash(){
  const h = location.hash;
  if(h.startsWith('#recipe-')){
    const id = parseInt(h.replace('#recipe-',''));
    if(!isNaN(id) && allRecipes.length) showDetail(id);
  }
}

/* ── Init ── */
async function init(){
  const theme = localStorage.getItem(LS_THEME)||'light';
  document.documentElement.setAttribute('data-theme', theme);
  updateThemeBtn(theme);
  loadSaved();
  updateSavedBadge();
  const res = await fetch('data/recipes.json');
  allRecipes = await res.json();
  applyFilters();
  handleHash();
}

window.addEventListener('hashchange', handleHash);
init();
</script>
</body>
</html>
