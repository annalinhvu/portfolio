<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>From Scratch — Recipe Index</title>
<meta name="description" content="A personal recipe index — ~37 dishes filterable by cuisine, meal type, and ingredients.">
<meta name="theme-color" content="#ede8dc">
<meta property="og:title" content="From Scratch — Recipe Index">
<meta property="og:url" content="https://annalinhvu.github.io/portfolio/projects/recipes/">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root[data-theme="light"]{
  --bg:#f6ede0;
  --card:#fffdf8;
  --text-1:#2c1a0e;
  --text-2:#4a3020;
  --text-3:#7a5a42;
  --text-4:#b09070;
  --accent:#a8552a;
  --accent-warm:#c4784a;
  --border:#e4d0b8;
  --sh:0 2px 6px rgba(80,40,10,.07),0 1px 3px rgba(80,40,10,.05);
  --sh-h:0 6px 20px rgba(80,40,10,.13),0 3px 8px rgba(80,40,10,.09);
  --cat-breakfast:#b8880a;
  --cat-main:#a8452a;
  --cat-side:#3a7a4a;
  --cat-dessert:#a85870;
  --cat-snack:#a87030;
  --cat-drink:#3a6898;
  --cat-vietnamese:#7a3a78;
}
:root[data-theme="dark"]{
  --bg:#1c1008;
  --card:#261808;
  --text-1:#f0dfc0;
  --text-2:#d0b890;
  --text-3:#906848;
  --text-4:#5c4028;
  --accent:#c47040;
  --accent-warm:#d88c58;
  --border:#3c2818;
  --sh:0 2px 6px rgba(0,0,0,.28),0 1px 3px rgba(0,0,0,.22);
  --sh-h:0 6px 20px rgba(0,0,0,.4),0 3px 8px rgba(0,0,0,.32);
  --cat-breakfast:#c89820;
  --cat-main:#c05838;
  --cat-side:#4a9a5a;
  --cat-dessert:#c06888;
  --cat-snack:#c08040;
  --cat-drink:#5888b8;
  --cat-vietnamese:#a05aa0;
}

/* ── Base ── */
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background-color:var(--bg);
  color:var(--text-2);min-height:100vh;
  transition:background-color .3s,color .3s;
  -webkit-font-smoothing:antialiased;
}

/* ── Topbar ── */
.topbar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:44px;
  background:var(--bg);border-bottom:1px solid var(--border);
  transition:background .3s,border-color .3s;
}
.back-link{
  font-size:.58rem;letter-spacing:1.4px;text-transform:uppercase;
  color:var(--text-4);text-decoration:none;transition:color .2s;
}
.back-link:hover{color:var(--text-2)}
.topbar-brand{
  font-family:Georgia,serif;font-style:italic;
  font-size:.95rem;color:var(--text-3);
  position:absolute;left:50%;transform:translateX(-50%);
}
.topbar-right{display:flex;align-items:center;gap:4px}
.saved-btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:2px;
  border:1px solid var(--border);background:none;
  font-size:.62rem;letter-spacing:.5px;color:var(--text-4);
  cursor:pointer;transition:all .2s;font-family:inherit;
}
.saved-btn:hover,.saved-btn.has-saved{color:var(--accent-warm);border-color:var(--accent-warm)}
.theme-btn{
  background:none;border:none;cursor:pointer;
  font-size:.85rem;color:var(--text-4);padding:4px 8px;transition:color .2s;
}
.theme-btn:hover{color:var(--text-2)}

/* ── Masthead ── */
.masthead{
  background:var(--accent);
  padding:48px 32px 44px;
  text-align:center;
  position:relative;overflow:hidden;
  border-bottom:3px solid rgba(0,0,0,.1);
}
:root[data-theme="dark"] .masthead{background:#5a2810}
.masthead::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(255,255,255,.1) 1.5px,transparent 1.5px);
  background-size:24px 24px;pointer-events:none;
}
.masthead-label{
  display:inline-block;
  border:2px solid rgba(255,255,255,.45);
  padding:20px 52px;
  position:relative;z-index:1;
}
.masthead-label::before{
  content:'';position:absolute;inset:6px;
  border:1px solid rgba(255,255,255,.22);
  pointer-events:none;
}
.masthead-eyebrow{
  font-size:.5rem;letter-spacing:3.5px;text-transform:uppercase;
  color:rgba(255,255,255,.65);margin-bottom:8px;
}
.masthead-title{
  font-family:Georgia,serif;
  font-size:1.75rem;
  font-style:normal;font-weight:400;
  color:#fff;line-height:1;
  letter-spacing:6px;text-transform:uppercase;
  margin-bottom:0;
}
.masthead-tag{
  font-size:.52rem;letter-spacing:2.5px;text-transform:uppercase;
  color:rgba(255,255,255,.58);
  font-style:normal;margin-top:10px;
}

/* ── Category strip ── */
.cat-wrap{
  position:sticky;top:44px;z-index:90;
  background:var(--bg);border-bottom:1px solid var(--border);
  overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none;
  transition:background .3s;
}
.cat-wrap::-webkit-scrollbar{display:none}
.cat-strip{
  display:flex;gap:8px;padding:11px 28px;
  min-width:max-content;
}
.cat-pill{
  padding:5px 13px;border-radius:2px;
  border:1px solid var(--border);
  background:none;
  font-size:.58rem;letter-spacing:1.4px;text-transform:uppercase;
  color:var(--text-3);cursor:pointer;transition:all .18s;
  font-family:inherit;white-space:nowrap;
}
.cat-pill:hover{color:var(--text-1);border-color:var(--text-3)}
.cat-pill[data-cat="breakfast"]:hover{color:var(--cat-breakfast);border-color:var(--cat-breakfast)}
.cat-pill[data-cat="main"]:hover{color:var(--cat-main);border-color:var(--cat-main)}
.cat-pill[data-cat="side"]:hover{color:var(--cat-side);border-color:var(--cat-side)}
.cat-pill[data-cat="dessert"]:hover{color:var(--cat-dessert);border-color:var(--cat-dessert)}
.cat-pill[data-cat="snack"]:hover{color:var(--cat-snack);border-color:var(--cat-snack)}
.cat-pill[data-cat="drink"]:hover{color:var(--cat-drink);border-color:var(--cat-drink)}
.cat-pill[data-cat="vietnamese"]:hover{color:var(--cat-vietnamese);border-color:var(--cat-vietnamese)}
.cat-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.cat-pill[data-cat="breakfast"].active{background:var(--cat-breakfast);border-color:var(--cat-breakfast);color:#fff}
.cat-pill[data-cat="main"].active{background:var(--cat-main);border-color:var(--cat-main);color:#fff}
.cat-pill[data-cat="side"].active{background:var(--cat-side);border-color:var(--cat-side);color:#fff}
.cat-pill[data-cat="dessert"].active{background:var(--cat-dessert);border-color:var(--cat-dessert);color:#fff}
.cat-pill[data-cat="snack"].active{background:var(--cat-snack);border-color:var(--cat-snack);color:#fff}
.cat-pill[data-cat="drink"].active{background:var(--cat-drink);border-color:var(--cat-drink);color:#fff}
.cat-pill[data-cat="vietnamese"].active{background:var(--cat-vietnamese);border-color:var(--cat-vietnamese);color:#fff}

/* ── Page ── */
.page{max-width:1140px;margin:0 auto;padding:0 28px 100px}

.filter-row{
  display:flex;gap:8px;padding:16px 0;
  border-bottom:1px solid var(--border);
  align-items:center;flex-wrap:wrap;
}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-icon{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  font-size:.62rem;color:var(--text-4);pointer-events:none;
}
.search-input{
  width:100%;padding:8px 12px 8px 28px;border-radius:2px;
  border:1px solid var(--border);background:var(--card);
  font-size:.78rem;color:var(--text-2);font-family:inherit;
  transition:border-color .2s;
}
.search-input::placeholder{color:var(--text-4)}
.search-input:focus{outline:none;border-color:var(--accent)}
.filter-select{
  padding:8px 26px 8px 10px;border-radius:2px;
  border:1px solid var(--border);background:var(--card);
  font-size:.74rem;color:var(--text-2);font-family:inherit;
  cursor:pointer;-webkit-appearance:none;appearance:none;
  background-image:url("data:image/svg+xml,%3Csvg width='9' height='5' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l4.5 5L9 0z' fill='%238a7460'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 8px center;
  transition:border-color .2s;
}
.filter-select:focus{outline:none;border-color:var(--accent)}
.result-count{
  padding:14px 0 6px;font-size:.58rem;
  letter-spacing:1.6px;text-transform:uppercase;color:var(--text-4);
}

/* ── Card grid ── */
.card-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:18px;
}
@media(max-width:960px){.card-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:540px){.card-grid{grid-template-columns:1fr}}

/* ── Recipe card ── */
.recipe-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  cursor:pointer;
  transition:transform .22s,box-shadow .22s;
  box-shadow:var(--sh);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.recipe-card:hover{
  transform:translateY(-5px);
  box-shadow:var(--sh-h);
}
/* Colored category band */
.card-band{
  padding:11px 15px;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;
}
.card-band::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.14) 0%,transparent 55%);
  pointer-events:none;
}
.band-cat{
  font-size:.58rem;letter-spacing:1.8px;text-transform:uppercase;
  color:rgba(255,255,255,.92);font-weight:600;
}
/* Card body */
.card-body{
  padding:16px 16px 12px;flex:1;
}
.card-name{
  font-family:Georgia,serif;font-size:1.05rem;
  font-weight:400;color:var(--text-1);
  margin-bottom:7px;line-height:1.3;
}
.card-tag{
  font-size:.78rem;font-style:italic;
  color:var(--text-3);line-height:1.5;
}
/* Card footer */
.card-foot{
  padding:10px 16px 14px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.cuisine-lbl{
  font-size:.56rem;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--text-3);font-weight:600;
}
.diff-dots{display:inline-flex;align-items:center;gap:3px;flex-shrink:0}
.d-dot{
  width:6px;height:6px;border-radius:50%;
  border:1.5px solid var(--accent-warm);
}
.d-dot.on{background:var(--accent-warm)}
.card-time{
  font-size:.6rem;color:var(--text-4);
  margin-left:auto;white-space:nowrap;
}
.heart-btn{
  background:none;border:none;cursor:pointer;
  font-size:.88rem;line-height:1;padding:2px;
  color:var(--text-4);transition:all .18s;flex-shrink:0;
}
.heart-btn:hover{color:var(--accent-warm);transform:scale(1.2)}
.heart-btn.saved{color:var(--accent-warm)}

/* ── Empty state ── */
.empty-state{
  text-align:center;padding:80px 20px;
  color:var(--text-4);grid-column:1/-1;
}
.empty-state p{font-family:Georgia,serif;font-style:italic;font-size:.9rem}

/* ── Views ── */
.detail-view{display:none}
.detail-view.active{display:block}
.catalog-view.hidden{display:none}

/* ── Detail ── */
.detail-back{
  display:inline-flex;align-items:center;gap:5px;
  font-size:.56rem;letter-spacing:1.4px;text-transform:uppercase;
  color:var(--text-4);cursor:pointer;padding:20px 0 14px;
  transition:color .2s;background:none;border:none;font-family:inherit;
}
.detail-back:hover{color:var(--text-2)}

/* Detail = large recipe card */
.detail-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;box-shadow:var(--sh-h);
}
.detail-band{
  padding:14px 28px;
  display:flex;align-items:center;gap:10px;
}
.detail-band-cat{
  font-size:.62rem;letter-spacing:1.8px;text-transform:uppercase;
  color:rgba(255,255,255,.92);font-weight:600;
}
.detail-head-section{
  padding:28px 32px 24px;
  border-bottom:1px solid var(--border);
}
.detail-title{
  font-family:Georgia,serif;
  font-size:clamp(1.8rem,3.5vw,2.8rem);
  font-weight:400;color:var(--text-1);
  line-height:1.05;letter-spacing:-.5px;margin-bottom:8px;
}
.detail-tagline{
  font-style:italic;
  font-size:.92rem;color:var(--text-3);margin-bottom:12px;
}
.detail-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:0}
.badge{
  font-size:.56rem;letter-spacing:1px;text-transform:uppercase;
  color:var(--text-3);border:1px solid var(--border);
  padding:3px 9px;border-radius:20px;
}
/* Section divider */
.orn-rule{
  display:flex;align-items:center;gap:14px;
  padding:0 32px;margin:20px 0;
}
.orn-rule::before,.orn-rule::after{
  content:'';flex:1;height:1px;background:var(--border);
}
.detail-body{
  display:grid;grid-template-columns:2fr 1fr;gap:0;
}
@media(max-width:640px){.detail-body{grid-template-columns:1fr}}
.detail-main{
  padding:28px 32px 36px;
  border-right:1px solid var(--border);
}
@media(max-width:640px){.detail-main{border-right:none;border-bottom:1px solid var(--border);padding:24px 20px}}
.detail-sidebar{padding:28px 24px 36px}
@media(max-width:640px){.detail-sidebar{padding:24px 20px}}

.detail-desc{
  font-size:.9rem;color:var(--text-2);line-height:1.85;margin-bottom:28px;
}
.det-section{margin-bottom:24px}
.det-label{
  font-size:.56rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--accent);margin-bottom:10px;font-weight:600;
  display:flex;align-items:center;gap:10px;
}
.det-label::after{content:'';flex:1;height:1px;background:var(--border)}
.ing-list{list-style:none}
.ing-list li{
  font-size:.84rem;color:var(--text-2);
  padding:6px 0 6px 14px;position:relative;
  line-height:1.6;border-bottom:1px solid var(--border);
}
.ing-list li:last-child{border-bottom:none}
.ing-list li::before{
  content:'';position:absolute;left:0;top:13px;
  width:5px;height:5px;border-radius:50%;
  background:var(--accent-warm);opacity:.6;
}
.step-list{list-style:none;counter-reset:steps}
.step-list li{
  font-size:.84rem;color:var(--text-2);
  padding:8px 0 8px 28px;position:relative;
  line-height:1.8;counter-increment:steps;
  border-bottom:1px solid var(--border);
}
.step-list li:last-child{border-bottom:none}
.step-list li::before{
  content:counter(steps);position:absolute;left:0;top:8px;
  font-family:Georgia,serif;font-style:italic;font-size:.8rem;
  color:var(--accent-warm);width:20px;text-align:center;
}
.tips-wrap{
  padding:12px 16px;
  background:rgba(168,85,42,.06);
  border-left:3px solid var(--accent-warm);border-radius:0 8px 8px 0;
}
.tips-text{
  font-style:italic;
  font-size:.82rem;color:var(--text-3);line-height:1.8;
}
/* Sidebar */
.sb-inner{position:sticky;top:calc(44px + 47px + 24px)}
.sb-label{
  font-size:.54rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--accent);margin-bottom:10px;font-weight:600;
  display:flex;align-items:center;gap:10px;
}
.sb-label::after{content:'';flex:1;height:1px;background:var(--border)}
.sb-stat{
  display:flex;justify-content:space-between;
  padding:8px 0;border-bottom:1px solid var(--border);font-size:.78rem;
}
.sb-stat:last-of-type{border-bottom:none}
.sb-key{color:var(--text-3);text-transform:capitalize}
.sb-val{color:var(--text-1);font-weight:500;text-transform:capitalize}
.save-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-top:16px;padding:10px;width:100%;
  border:1px solid var(--border);border-radius:8px;
  background:none;font-size:.56rem;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--text-3);cursor:pointer;transition:all .2s;font-family:inherit;
}
.save-btn:hover{border-color:var(--accent-warm);color:var(--accent-warm)}
.save-btn.saved{border-color:var(--accent-warm);color:var(--accent-warm);background:rgba(196,120,74,.08)}

/* ── Footer ── */
.page-footer{
  padding:52px 0 12px;text-align:center;
  font-size:.56rem;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-4);
}
.page-footer a{color:var(--text-4);text-decoration:none;transition:color .2s}
.page-footer a:hover{color:var(--text-2)}

/* ── Animations ── */
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-in{animation:cardIn .28s ease forwards}

/* ── Responsive ── */
@media(max-width:540px){
  .topbar,.cat-strip{padding-left:16px;padding-right:16px}
  .page{padding:0 16px 80px}
  .masthead{padding:36px 16px 32px}
  .masthead-label{padding:16px 28px}
  .detail-head-section,.orn-rule{padding-left:18px;padding-right:18px}
}
</style>
</head>
<body>

<div class="topbar">
  <a href="../../index.html#lab" class="back-link">&larr; Portfolio</a>
  <span class="topbar-brand">From Scratch</span>
  <div class="topbar-right">
    <button class="saved-btn" id="savedBadge" onclick="filterSaved()">
      <span id="savedHeart">&#9825;</span>&thinsp;<span id="savedCount">0</span>
    </button>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">&#9790;</button>
  </div>
</div>

<div class="catalog-view" id="catalogView">

  <div class="masthead">
    <div class="masthead-label">
      <p class="masthead-eyebrow">a personal recipe index</p>
      <h1 class="masthead-title">From Scratch</h1>
      <p class="masthead-tag">made with care</p>
    </div>
  </div>

  <div class="cat-wrap">
    <div class="cat-strip">
      <button class="cat-pill active" data-cat="all"       onclick="setCat('all',this)">All</button>
      <button class="cat-pill"        data-cat="breakfast" onclick="setCat('breakfast',this)">Breakfast</button>
      <button class="cat-pill"        data-cat="main"      onclick="setCat('main',this)">Main</button>
      <button class="cat-pill"        data-cat="side"      onclick="setCat('side',this)">Side</button>
      <button class="cat-pill"        data-cat="dessert"   onclick="setCat('dessert',this)">Dessert</button>
      <button class="cat-pill"        data-cat="snack"     onclick="setCat('snack',this)">Snack</button>
      <button class="cat-pill"        data-cat="drink"      onclick="setCat('drink',this)">Drink</button>
      <button class="cat-pill"        data-cat="vietnamese" onclick="setCat('vietnamese',this)">Vietnamese</button>
      <button class="cat-pill"        data-cat="saved"      onclick="setCat('saved',this)">&#9825;&thinsp;Saved</button>
    </div>
  </div>

  <div class="page">
    <div class="filter-row">
      <div class="search-wrap">
        <span class="search-icon">&#10022;</span>
        <input type="search" class="search-input" id="searchInput"
          placeholder="Search recipes, ingredients..." oninput="onSearch()">
      </div>
      <select class="filter-select" id="cuisineFilter" onchange="applyFilters()">
        <option value="">All cuisines</option>
        <option value="italian">Italian</option>
        <option value="japanese">Japanese</option>
        <option value="korean">Korean</option>
        <option value="french">French</option>
        <option value="american">American</option>
        <option value="mexican">Mexican</option>
        <option value="vietnamese">Vietnamese</option>
        <option value="other">Other</option>
      </select>
      <select class="filter-select" id="difficultyFilter" onchange="applyFilters()">
        <option value="">Any difficulty</option>
        <option value="easy">Easy</option>
        <option value="moderate">Moderate</option>
        <option value="involved">Involved</option>
      </select>
    </div>

    <div class="result-count" id="resultCount"></div>
    <div class="card-grid" id="cardGrid"></div>

    <div class="page-footer">
      <a href="../../index.html#lab">&larr; Back to Portfolio</a>
    </div>
  </div>

</div><!-- /catalog-view -->

<div class="detail-view" id="detailView">
  <div class="page">
    <button class="detail-back" onclick="showCatalog()">&larr; Back to Recipes</button>
    <div id="detailContent"></div>
  </div>
</div>

<script>
const LS_FAV   = 'from-scratch-favorites';
const LS_THEME = 'from-scratch-theme';

const CAT_COLORS = {
  breakfast:'var(--cat-breakfast)', main:'var(--cat-main)',
  side:'var(--cat-side)',           dessert:'var(--cat-dessert)',
  snack:'var(--cat-snack)',         drink:'var(--cat-drink)',
  vietnamese:'var(--cat-vietnamese)',
};

let allRecipes = [], activeCat = 'all', savedIds = new Set(), searchTimer = null;

/* ── Theme ── */
function toggleTheme(){
  const h = document.documentElement;
  const n = h.getAttribute('data-theme')==='dark'?'light':'dark';
  h.setAttribute('data-theme',n);
  localStorage.setItem(LS_THEME,n);
  updateThemeBtn(n);
}
function updateThemeBtn(t){
  document.getElementById('themeBtn').textContent = t==='dark'?'\u2600':'\u263E';
}

/* ── Favorites ── */
function loadSaved(){
  try{ savedIds=new Set(JSON.parse(localStorage.getItem(LS_FAV)||'[]')); }
  catch{ savedIds=new Set(); }
}
function persistSaved(){ localStorage.setItem(LS_FAV,JSON.stringify([...savedIds])); }
function toggleFavorite(id,e){
  if(e) e.stopPropagation();
  savedIds.has(id)?savedIds.delete(id):savedIds.add(id);
  persistSaved(); updateSavedBadge();
  document.querySelectorAll('.heart-btn[data-id="'+id+'"]').forEach(b=>{
    b.classList.toggle('saved',savedIds.has(id));
    b.innerHTML=savedIds.has(id)?'&#9829;':'&#9825;';
  });
  const sb=document.getElementById('detailSaveBtn');
  if(sb&&parseInt(sb.dataset.id)===id){
    sb.classList.toggle('saved',savedIds.has(id));
    sb.innerHTML=savedIds.has(id)?'&#9829;&ensp;Saved':'&#9825;&ensp;Save Recipe';
  }
  if(activeCat==='saved'&&!savedIds.has(id)) applyFilters();
}
function updateSavedBadge(){
  const n=savedIds.size;
  document.getElementById('savedCount').textContent=n;
  document.getElementById('savedHeart').innerHTML=n>0?'&#9829;':'&#9825;';
  document.getElementById('savedBadge').classList.toggle('has-saved',n>0);
}

/* ── Filters ── */
function setCat(cat,btn){
  activeCat=cat;
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}
function filterSaved(){
  activeCat='saved';
  document.querySelectorAll('.cat-pill').forEach(p=>{
    p.classList.toggle('active',p.dataset.cat==='saved');
  });
  applyFilters();
}
function onSearch(){ clearTimeout(searchTimer); searchTimer=setTimeout(applyFilters,150); }
function applyFilters(){
  const q=( document.getElementById('searchInput').value||'').toLowerCase().trim();
  const cui=document.getElementById('cuisineFilter').value;
  const dif=document.getElementById('difficultyFilter').value;
  const out=allRecipes.filter(r=>{
    if(activeCat==='saved'){if(!savedIds.has(r.id))return false;}
    else if(activeCat==='vietnamese'){if(r.cuisine!=='vietnamese')return false;}
    else if(activeCat!=='all'){if(r.category!==activeCat)return false;}
    if(cui&&r.cuisine!==cui)return false;
    if(dif&&r.difficulty!==dif)return false;
    if(q){
      const h=[r.name,r.tagline,r.ingredients,r.cuisine,r.category].join(' ').toLowerCase();
      if(!h.includes(q))return false;
    }
    return true;
  });
  renderCards(out);
  document.getElementById('resultCount').textContent=
    out.length+(out.length===1?' recipe':' recipes')+(activeCat==='saved'?' saved':'');
}

/* ── Helpers ── */
function diffDots(d){
  const n={easy:1,moderate:2,involved:3}[d]||1;
  return [0,1,2].map(i=>`<span class="d-dot${i<n?' on':''}"></span>`).join('');
}
function fmtTime(m){
  if(!m)return'—';
  if(m>=60){const h=Math.floor(m/60),r=m%60;return h+'h'+(r?'\u2009'+r+'m':'');}
  return m+'m';
}

/* ── Render cards ── */
function renderCards(list){
  const g=document.getElementById('cardGrid');
  if(!list.length){
    g.innerHTML='<div class="empty-state"><p>No recipes found.<br>Try adjusting your filters.</p></div>';
    return;
  }
  g.innerHTML=list.map((r,i)=>{
    const col=CAT_COLORS[r.category]||'var(--accent-warm)';
    const sv=savedIds.has(r.id);
    const tot=r.prep_time_min+r.cook_time_min;
    return `<div class="recipe-card card-in" style="animation-delay:${i*.035}s" onclick="showDetail(${r.id})">
      <div class="card-band" style="background:${col}">
        <span class="band-cat">${r.category}</span>
        <button class="heart-btn${sv?' saved':''}" data-id="${r.id}"
          onclick="toggleFavorite(${r.id},event)" style="color:rgba(255,255,255,${sv?'1':'.6'})">${sv?'&#9829;':'&#9825;'}</button>
      </div>
      <div class="card-body">
        <div class="card-name">${r.name}</div>
        <div class="card-tag">${r.tagline}</div>
      </div>
      <div class="card-foot">
        <span class="cuisine-lbl">${r.cuisine}</span>
        <span class="diff-dots">${diffDots(r.difficulty)}</span>
        <span class="card-time">${fmtTime(tot)}</span>
      </div>
    </div>`;
  }).join('');
}

/* ── Detail ── */
function showDetail(id){
  const r=allRecipes.find(x=>x.id===id); if(!r)return;
  const col=CAT_COLORS[r.category]||'var(--accent-warm)';
  const sv=savedIds.has(r.id);
  const ings=r.ingredients.split('\n').map(l=>l.replace(/^-\s*/,'').trim()).filter(Boolean);
  const steps=r.instructions.split('\n').map(l=>l.replace(/^\d+\.\s*/,'').trim()).filter(Boolean);
  const dBadges=r.dietary.length?r.dietary.map(d=>`<span class="badge">${d}</span>`).join(''):'';
  const tipsHtml=r.tips?`<div class="det-section">
    <div class="det-label">Tips</div>
    <div class="tips-wrap"><p class="tips-text">${r.tips}</p></div>
  </div>`:'';
  const tot=r.prep_time_min+r.cook_time_min;

  document.getElementById('detailContent').innerHTML=`
    <div class="detail-card">
      <div class="detail-band" style="background:${col}">
        <span class="detail-band-cat">${r.category}</span>
      </div>
      <div class="detail-head-section">
          <h1 class="detail-title">${r.name}</h1>
          <p class="detail-tagline">${r.tagline}</p>
          ${dBadges?'<div class="detail-badges">'+dBadges+'</div>':''}
        </div>
        <div class="orn-rule"></div>
        <div class="detail-body">
          <div class="detail-main">
            <p class="detail-desc">${r.description}</p>
            <div class="det-section">
              <div class="det-label">Ingredients</div>
              <ul class="ing-list">${ings.map(i=>`<li>${i}</li>`).join('')}</ul>
            </div>
            <div class="det-section">
              <div class="det-label">Instructions</div>
              <ol class="step-list">${steps.map(s=>`<li>${s}</li>`).join('')}</ol>
            </div>
            ${tipsHtml}
          </div>
          <div class="detail-sidebar">
            <div class="sb-inner">
              <div class="sb-label">Quick Facts</div>
              <div class="sb-stat"><span class="sb-key">Prep</span><span class="sb-val">${r.prep_time_min} min</span></div>
              <div class="sb-stat"><span class="sb-key">Cook</span><span class="sb-val">${r.cook_time_min>0?r.cook_time_min+' min':'—'}</span></div>
              <div class="sb-stat"><span class="sb-key">Total</span><span class="sb-val">${fmtTime(tot)}</span></div>
              <div class="sb-stat"><span class="sb-key">Serves</span><span class="sb-val">${r.servings}</span></div>
              <div class="sb-stat"><span class="sb-key">Difficulty</span><span class="sb-val">${r.difficulty}</span></div>
              <div class="sb-stat"><span class="sb-key">Cuisine</span><span class="sb-val">${r.cuisine}</span></div>
              <div class="sb-stat"><span class="sb-key">Source</span><span class="sb-val">${r.source}</span></div>
              <button class="save-btn${sv?' saved':''}" id="detailSaveBtn" data-id="${r.id}"
                onclick="toggleFavorite(${r.id},event)">
                ${sv?'&#9829;&ensp;Saved':'&#9825;&ensp;Save Recipe'}
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>`;

  document.getElementById('catalogView').classList.add('hidden');
  document.getElementById('detailView').classList.add('active');
  window.scrollTo(0,0);
  location.hash='recipe-'+id;
}

function showCatalog(){
  document.getElementById('detailView').classList.remove('active');
  document.getElementById('catalogView').classList.remove('hidden');
  history.pushState('',document.title,location.pathname);
}
function handleHash(){
  const h=location.hash;
  if(h.startsWith('#recipe-')){
    const id=parseInt(h.replace('#recipe-',''));
    if(!isNaN(id)&&allRecipes.length) showDetail(id);
  }
}

async function init(){
  const t=localStorage.getItem(LS_THEME)||'light';
  document.documentElement.setAttribute('data-theme',t);
  updateThemeBtn(t);
  loadSaved(); updateSavedBadge();
  const res=await fetch('data/recipes.json');
  allRecipes=await res.json();
  applyFilters(); handleHash();
}

window.addEventListener('hashchange',handleHash);
init();
</script>
</body>
</html>
