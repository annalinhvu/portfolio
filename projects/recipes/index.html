<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cơm Nhà  -  Recipe Index</title>
<meta name="description" content="A personal Vietnamese recipe index  -  100 dishes from Northern, Central, and Southern Vietnam.">
<meta name="theme-color" content="#4E7A55">
<meta property="og:title" content="Cơm Nhà  -  Recipe Index">
<meta property="og:url" content="https://annalinhvu.github.io/portfolio/projects/recipes/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root[data-theme="light"]{
  --bg:#fdf5e0;
  --card:#fff9ee;
  --text-1:#2a1a08;
  --text-2:#4a3010;
  --text-3:#7a5a20;
  --text-4:#a07a40;
  --accent:#c8880a;
  --accent-2:#e0a820;
  --terra:#a04020;
  --gold:#b07808;
  --gold-l:#d09820;
  --border:#e0c888;
  --sh:0 2px 8px rgba(80,40,0,.08),0 1px 3px rgba(80,40,0,.05);
  --sh-h:0 6px 20px rgba(80,40,0,.14),0 3px 8px rgba(80,40,0,.08);
}
:root[data-theme="dark"]{
  --bg:#180e04;
  --card:#201408;
  --text-1:#f8e8c0;
  --text-2:#d0a860;
  --text-3:#906830;
  --text-4:#604010;
  --accent:#d09828;
  --accent-2:#e8b840;
  --terra:#b05028;
  --gold:#c08818;
  --gold-l:#d8a830;
  --border:rgba(200,160,80,.18);
  --sh:0 2px 8px rgba(0,0,0,.4),0 1px 3px rgba(0,0,0,.28);
  --sh-h:0 6px 20px rgba(0,0,0,.55),0 3px 8px rgba(0,0,0,.38);
}

/* ── Base ── */
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background-color:var(--bg);
  color:var(--text-2);min-height:100vh;
  transition:background-color .3s,color .3s;
  -webkit-font-smoothing:antialiased;
}

/* ── Topbar ── */
.topbar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:46px;
  background:var(--bg);
  border-top:2px solid var(--accent);
  border-bottom:1px solid var(--border);
  transition:background .3s,border-color .3s;
}
.back-link{
  font-size:.72rem;letter-spacing:1px;text-transform:uppercase;
  color:var(--text-3);text-decoration:none;transition:color .2s;
}
.back-link:hover{color:var(--accent)}
.topbar-brand{
  font-family:'Playfair Display',Georgia,serif;
  font-style:italic;font-weight:700;font-size:1rem;letter-spacing:.5px;
  color:var(--accent);
  position:absolute;left:50%;transform:translateX(-50%);
}
.topbar-right{display:flex;align-items:center;gap:4px}
.saved-btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:2px;
  border:1.5px solid var(--border);background:none;
  font-size:.6rem;letter-spacing:.5px;color:var(--text-4);
  cursor:pointer;transition:all .2s;font-family:inherit;font-weight:600;
}
.saved-btn:hover,.saved-btn.has-saved{color:var(--accent);border-color:var(--accent)}
.theme-btn{
  background:none;border:none;cursor:pointer;
  font-size:.85rem;color:var(--text-4);padding:4px 8px;transition:color .2s;
}
.theme-btn:hover{color:var(--accent)}

/* ── Masthead ── */
.masthead{
  background:#1C3820;
  padding:52px 32px 40px;
  text-align:center;
  border-bottom:1px solid rgba(0,0,0,.2);
  position:relative;overflow:hidden;
}
:root[data-theme="dark"] .masthead{background:#0A1408}
.masthead::before{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30,4 C20,14 18,26 30,54 C42,26 40,14 30,4 Z' fill='none' stroke='%23FFFFFF' stroke-width='0.8' stroke-opacity='0.07'/%3E%3Cline x1='30' y1='4' x2='30' y2='54' stroke='%23FFFFFF' stroke-width='0.4' stroke-opacity='0.05'/%3E%3C/svg%3E");
  background-size:60px 60px;pointer-events:none;
}
.mast-rule{
  display:flex;align-items:center;justify-content:center;gap:12px;
  margin:0 auto 24px;position:relative;z-index:1;
  color:rgba(180,210,160,.6);font-size:.46rem;letter-spacing:4px;
}
.mast-rule::before,.mast-rule::after{
  content:'';width:72px;height:1px;background:rgba(180,210,160,.25);
}
.masthead-title{
  font-family:'Playfair Display',Georgia,serif;
  font-size:clamp(2.8rem,7vw,5rem);
  font-weight:700;font-style:italic;
  color:#EDE8D8;line-height:1;
  letter-spacing:-.5px;
  margin-bottom:14px;position:relative;z-index:1;
  text-shadow:0 2px 18px rgba(0,0,0,.18);
}
:root[data-theme="dark"] .masthead-title{color:#DDE4C8}
.masthead-sub{
  font-family:Georgia,serif;font-style:italic;
  font-size:.9rem;color:rgba(180,210,160,.8);
  margin-bottom:22px;position:relative;z-index:1;
  letter-spacing:.5px;
}
.mast-rule-b{
  display:flex;align-items:center;justify-content:center;gap:12px;
  margin:0 auto 0;position:relative;z-index:1;
  color:rgba(180,210,160,.6);font-size:.46rem;letter-spacing:4px;
}
.mast-rule-b::before,.mast-rule-b::after{
  content:'';width:72px;height:1px;background:rgba(180,210,160,.25);
}
.masthead-tag{
  font-size:.46rem;letter-spacing:2.5px;text-transform:uppercase;
  color:rgba(180,210,160,.5);
  font-style:normal;position:relative;z-index:1;
}

/* ── Catalog header bar ── */
.catalog-header{
  display:flex;align-items:center;gap:14px;
  padding:10px 28px;
  background:var(--bg);border-bottom:1px solid var(--border);
  transition:background .3s;
}
@media(max-width:540px){.catalog-header{padding:10px 16px}}
.catalog-home-btn{
  font-size:.52rem;letter-spacing:1.6px;text-transform:uppercase;font-weight:600;
  color:var(--text-4);background:none;border:none;cursor:pointer;
  padding:0;font-family:inherit;transition:color .2s;
  white-space:nowrap;
}
.catalog-home-btn:hover{color:var(--accent)}
.catalog-heading{
  font-family:'Playfair Display',Georgia,serif;
  font-style:italic;font-size:.95rem;
  color:var(--text-3);letter-spacing:.3px;
}

/* ── Category strip ── */
.cat-wrap{
  position:sticky;top:87px;z-index:90;
  background:var(--bg);border-bottom:1px solid var(--border);
  overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none;
  transition:background .3s;
}
.cat-wrap::-webkit-scrollbar{display:none}
.cat-strip{
  display:flex;gap:6px;padding:10px 28px;
  min-width:max-content;
}
.cat-pill{
  padding:5px 13px;border-radius:3px;
  border:1px solid var(--border);
  background:none;
  font-size:.54rem;letter-spacing:1.8px;text-transform:uppercase;font-weight:700;
  color:var(--text-3);cursor:pointer;transition:all .15s;
  font-family:inherit;white-space:nowrap;
}
.cat-pill:hover{color:var(--region-color,var(--accent));border-color:var(--region-color,var(--accent))}
.cat-pill.active{background:var(--region-color,var(--accent));color:#fff;border-color:var(--region-color,var(--accent))}

/* Region-tinted catalog + detail */
.catalog-view[data-region="northern"],
.detail-view[data-region="northern"]{
  --region-color:#4A8898;
  --region-tint:rgba(122,170,184,.07);
  --region-bg:#1A3848;
  --region-text:#CCE8F4;
}
.catalog-view[data-region="central"],
.detail-view[data-region="central"]{
  --region-color:#A05838;
  --region-tint:rgba(192,120,88,.07);
  --region-bg:#3A1C0C;
  --region-text:#F0D4B8;
}
.catalog-view[data-region="southern"],
.detail-view[data-region="southern"]{
  --region-color:#987018;
  --region-tint:rgba(200,160,48,.07);
  --region-bg:#2A2008;
  --region-text:#F0E4A8;
}

/* Per-category banner vars */
.catalog-view[data-category="noodles"]{--cat-bg:#3C2C0C;--cat-text:#EED8A0}
.catalog-view[data-category="rice"]   {--cat-bg:#223618;--cat-text:#C4E0A8}
.catalog-view[data-category="bánh"]   {--cat-bg:#3A2810;--cat-text:#EECCA0}
.catalog-view[data-category="sides"]  {--cat-bg:#1E3418;--cat-text:#B8E0A0}
.catalog-view[data-category="sweets"] {--cat-bg:#3A2018;--cat-text:#EEC8B0}
.catalog-view[data-category="drinks"] {--cat-bg:#1A2C20;--cat-text:#B0D8B8}

/* ── Catalog banner (region or category) ── */
.catalog-view[data-region] .catalog-header,
.catalog-view[data-category] .catalog-header{
  display:block;
  padding:44px 28px 36px;
  border-bottom:1px solid rgba(255,255,255,.07);
  position:relative;overflow:hidden;
}
.catalog-view[data-region] .catalog-header{background:var(--region-bg)}
.catalog-view[data-category] .catalog-header{background:var(--cat-bg)}
.catalog-view[data-region] .catalog-header::before,
.catalog-view[data-category] .catalog-header::before{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30,4 C20,14 18,26 30,54 C42,26 40,14 30,4 Z' fill='none' stroke='%23FFFFFF' stroke-width='0.8' stroke-opacity='0.06'/%3E%3Cline x1='30' y1='4' x2='30' y2='54' stroke='%23FFFFFF' stroke-width='0.4' stroke-opacity='0.04'/%3E%3C/svg%3E");
  background-size:60px 60px;pointer-events:none;
}
.catalog-view[data-region] .catalog-home-btn,
.catalog-view[data-category] .catalog-home-btn{
  position:absolute;top:14px;left:28px;
  opacity:.55;font-size:.5rem;
}
.catalog-view[data-region] .catalog-home-btn{color:var(--region-text)}
.catalog-view[data-category] .catalog-home-btn{color:var(--cat-text)}
.catalog-view[data-region] .catalog-home-btn:hover,
.catalog-view[data-category] .catalog-home-btn:hover{opacity:1}
.catalog-view[data-region] .catalog-heading,
.catalog-view[data-category] .catalog-heading{
  display:block;text-align:center;width:100%;
  font-size:clamp(1.9rem,5vw,3.2rem);
  font-weight:700;font-style:italic;letter-spacing:-.3px;
  text-shadow:0 2px 14px rgba(0,0,0,.22);
  padding:0;
}
.catalog-view[data-region] .catalog-heading{color:var(--region-text)}
.catalog-view[data-category] .catalog-heading{color:var(--cat-text)}

/* ── Detail region banner ── */
.detail-view[data-region] .detail-head-section{
  background:var(--region-bg);
  border-bottom:1px solid rgba(255,255,255,.08);
  position:relative;overflow:hidden;
}
.detail-view[data-region] .detail-head-section::before{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30,4 C20,14 18,26 30,54 C42,26 40,14 30,4 Z' fill='none' stroke='%23FFFFFF' stroke-width='0.8' stroke-opacity='0.06'/%3E%3Cline x1='30' y1='4' x2='30' y2='54' stroke='%23FFFFFF' stroke-width='0.4' stroke-opacity='0.04'/%3E%3C/svg%3E");
  background-size:60px 60px;pointer-events:none;
}
.detail-view[data-region] .detail-head-section>*{position:relative;z-index:1}
.detail-view[data-region] .detail-cat-label{color:var(--region-color);opacity:1}
.detail-view[data-region] .detail-title{color:var(--region-text);text-shadow:0 2px 16px rgba(0,0,0,.22)}
.detail-view[data-region] .detail-tagline{color:var(--region-text);opacity:.75}
.detail-view[data-region] .badge{background:rgba(255,255,255,.12);color:var(--region-text);border-color:rgba(255,255,255,.2)}
.detail-view[data-region] .detail-card{border-top-color:transparent}
.detail-view[data-region] .detail-back{color:var(--region-color)}

/* ── Page ── */
.page{max-width:1140px;margin:0 auto;padding:0 28px 100px}

.filter-row{
  display:flex;gap:8px;padding:14px 0;
  border-bottom:1px solid var(--border);
  align-items:center;flex-wrap:wrap;
}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-icon{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  font-size:.62rem;color:var(--text-4);pointer-events:none;
}
.search-input{
  width:100%;padding:8px 12px 8px 28px;border-radius:2px;
  border:1.5px solid var(--border);background:var(--card);
  font-size:.78rem;color:var(--text-2);font-family:inherit;
  transition:border-color .2s;
}
.search-input::placeholder{color:var(--text-4)}
.search-input:focus{outline:none;border-color:var(--accent)}
.filter-select{
  padding:8px 26px 8px 10px;border-radius:2px;
  border:1.5px solid var(--border);background:var(--card);
  font-size:.74rem;color:var(--text-2);font-family:inherit;
  cursor:pointer;-webkit-appearance:none;appearance:none;
  background-image:url("data:image/svg+xml,%3Csvg width='9' height='5' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l4.5 5L9 0z' fill='%23aa8858'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 8px center;
  transition:border-color .2s;
}
.filter-select:focus{outline:none;border-color:var(--accent)}
.result-count{
  padding:14px 0 6px;font-size:.54rem;
  letter-spacing:1.8px;text-transform:uppercase;color:var(--text-4);font-weight:600;
}

/* ── Booklet list ── */
.card-grid{
  display:flex;flex-direction:column;
}

/* ── Recipe entry (booklet row) ── */
.recipe-card{
  display:flex;align-items:baseline;gap:20px;
  padding:22px 0 22px 16px;
  border-bottom:1px solid var(--border);
  border-left:3px solid transparent;
  cursor:pointer;
  transition:border-left-color .18s;
  background:none;border-radius:0;
  box-shadow:none;
  position:relative;
}
.recipe-card:first-child{ border-top:1px solid var(--border); }
.recipe-card:hover{ border-left-color:var(--region-color,var(--accent)); }
.recipe-card:hover .card-name{ color:var(--region-color,var(--accent)); }
.card-num{display:none}
.card-body{
  flex:1;min-width:0;
}
.card-name{
  font-family:'Playfair Display',Georgia,serif;
  font-size:1.12rem;font-weight:700;
  color:var(--text-1);margin-bottom:4px;line-height:1.2;
  transition:color .15s;
}
.card-tag{
  font-size:.8rem;font-style:italic;
  color:var(--text-3);line-height:1.5;
}
.card-right{
  display:flex;flex-direction:column;align-items:flex-end;
  gap:6px;flex-shrink:0;
}
.cuisine-lbl{
  font-size:.46rem;letter-spacing:1.6px;text-transform:uppercase;
  color:var(--accent);font-weight:600;
  border:1px solid var(--accent);
  padding:2px 7px;border-radius:2px;opacity:.8;
}
.card-time-foot{
  font-size:.52rem;color:var(--text-4);letter-spacing:.5px;
}
.heart-btn{
  background:none;border:none;cursor:pointer;
  font-size:.88rem;line-height:1;padding:2px;
  color:var(--text-4);transition:all .18s;flex-shrink:0;
}
.heart-btn:hover{color:var(--terra);transform:scale(1.2)}
.heart-btn.saved{color:var(--terra)}

/* ── Category section headers ── */
.cat-section-head{
  font-family:'Playfair Display',Georgia,serif;
  font-size:1.6rem;font-weight:700;font-style:italic;
  color:var(--terra);
  padding:36px 0 8px;
  letter-spacing:-.3px;
}
.cat-section-head:first-child{ padding-top:20px; }

.card-img-strip{
  width:100%;height:130px;object-fit:cover;display:block;
  border-radius:5px 5px 0 0;
}
.region-badge{
  font-size:.5rem;letter-spacing:1.2px;font-style:italic;
  color:var(--accent);font-weight:600;
}

/* ── Empty state ── */
.empty-state{
  text-align:center;padding:80px 20px;
  color:var(--text-4);grid-column:1/-1;
}
.empty-state p{font-family:Georgia,serif;font-style:italic;font-size:.9rem}

/* ── Views ── */
.detail-view{display:none}
.detail-view.active{display:block}
.catalog-view{display:none}
.catalog-view.active{display:block}
.explore-view{display:block}
.explore-view.hidden{display:none}

/* ── Explore view ── */
.explore-body{
  max-width:1060px;margin:0 auto;padding:40px 28px 80px;
  display:grid;grid-template-columns:1fr 1fr;gap:48px;
}
@media(max-width:720px){.explore-body{grid-template-columns:1fr;gap:32px;padding:28px 16px 60px}}

.explore-panel{
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:28px 24px;box-shadow:var(--sh);
}
.explore-panel-label{
  font-size:.52rem;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--text-4);font-weight:700;margin-bottom:20px;
  display:flex;align-items:center;gap:10px;
}
.explore-panel-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* Region map panel */
.map-and-list{display:flex;gap:28px;align-items:flex-start}
@media(max-width:540px){.map-and-list{gap:18px}}

.viet-map-svg{
  flex-shrink:0;width:112px;height:auto;
}
.viet-region{
  transition:opacity .18s;cursor:pointer;
  stroke:#F0EAD8;stroke-width:1.2;
}
:root[data-theme="dark"] .viet-region{stroke:#111A0E}
.viet-region:hover{opacity:.7}
.map-region-north{fill:#7AAAB8}
.map-region-central{fill:url(#centralGradLight)}
.map-region-south{fill:#C8A030}
:root[data-theme="dark"] .map-region-north{fill:#2A5870}
:root[data-theme="dark"] .map-region-central{fill:url(#centralGradDark)}
:root[data-theme="dark"] .map-region-south{fill:#806818}

.region-list{display:flex;flex-direction:column;flex:1}
.region-btn{
  display:flex;align-items:center;gap:14px;
  padding:14px 0 14px 16px;
  border:none;background:none;cursor:pointer;font-family:inherit;
  text-align:left;width:100%;
  border-bottom:1px solid var(--border);
  border-left:3px solid transparent;
  transition:background .15s,border-left-color .15s;
  position:relative;
}
.region-btn:first-child{border-top:1px solid var(--border)}
.region-btn:hover{background:rgba(60,60,60,.03)}
.region-btn.rn:hover{border-left-color:#7AAAB8;background:rgba(122,170,184,.06)}
.region-btn.rc:hover{border-left-color:#C07858;background:rgba(192,120,88,.06)}
.region-btn.rs:hover{border-left-color:#C8A030;background:rgba(200,160,48,.06)}

.region-info{flex:1;min-width:0}
.region-viet{
  font-family:'Playfair Display',Georgia,serif;
  font-style:italic;font-size:1.12rem;color:var(--text-1);font-weight:700;
  display:block;line-height:1.15;margin-bottom:3px;
}
.region-eng{
  font-size:.46rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--text-4);font-weight:700;
}
.region-count-badge{
  font-family:'Playfair Display',Georgia,serif;font-style:italic;
  font-size:1.7rem;line-height:1;font-weight:700;
  flex-shrink:0;
}
.region-btn.rn .region-count-badge{color:#4A8898}
.region-btn.rc .region-count-badge{color:#A05838}
.region-btn.rs .region-count-badge{color:#987018}
:root[data-theme="dark"] .region-btn.rn .region-count-badge{color:#5A9AAC}
:root[data-theme="dark"] .region-btn.rc .region-count-badge{color:#B07050}
:root[data-theme="dark"] .region-btn.rs .region-count-badge{color:#A08828}

/* Category tiles */
.cat-tiles{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
}
@media(max-width:480px){.cat-tiles{grid-template-columns:repeat(2,1fr)}}
.cat-tile{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:22px 10px 16px;border-radius:5px;border:none;cursor:pointer;
  transition:transform .15s,box-shadow .15s,filter .15s;
  min-height:100px;position:relative;overflow:hidden;
  font-family:inherit;
  box-shadow:0 1px 4px rgba(60,40,0,.07);
}
.cat-tile:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(60,40,0,.12);filter:brightness(.97)}
.cat-tile-icon{
  font-size:1.7rem;margin-bottom:9px;line-height:1;
}
.cat-tile-name{
  font-size:.46rem;letter-spacing:2px;text-transform:uppercase;
  font-weight:700;color:rgba(42,26,8,.72);
}
.cat-tile-count{
  font-family:'Playfair Display',Georgia,serif;font-style:italic;
  font-size:.8rem;color:rgba(42,26,8,.42);margin-top:2px;
}
:root[data-theme="dark"] .cat-tile-name{color:rgba(238,232,208,.75)}
:root[data-theme="dark"] .cat-tile-count{color:rgba(238,232,208,.4)}

/* Explore footer */
.explore-footer{
  text-align:center;padding:0 28px 60px;
}
.explore-all-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:13px 30px;border-radius:3px;
  border:1.5px solid var(--border);background:var(--card);
  font-size:.54rem;letter-spacing:1.8px;text-transform:uppercase;font-weight:700;
  color:var(--text-2);cursor:pointer;transition:all .2s;font-family:inherit;
  box-shadow:var(--sh);
}
.explore-all-btn:hover{border-color:var(--accent);color:var(--accent);box-shadow:var(--sh-h)}

/* ── Detail ── */
.detail-back{
  display:inline-flex;align-items:center;gap:5px;
  font-size:.54rem;letter-spacing:1.6px;text-transform:uppercase;font-weight:600;
  color:var(--text-4);cursor:pointer;padding:20px 0 14px;
  transition:color .2s;background:none;border:none;font-family:inherit;
}
.detail-back:hover{color:var(--region-color,var(--accent))}

.detail-card{
  background:var(--card);border:1px solid var(--border);
  border-left:5px solid var(--region-color,var(--terra));
  border-top:3px solid var(--region-color,var(--accent));
  border-radius:6px;overflow:hidden;box-shadow:var(--sh-h);
}
.detail-img-strip{
  width:100%;height:240px;object-fit:cover;display:block;
}
.detail-head-section{
  padding:28px 32px 24px;
  border-bottom:1px solid var(--border);
}
.detail-cat-label{
  font-size:.5rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--region-color,var(--terra));font-weight:700;margin-bottom:12px;
}
.detail-title{
  font-family:'Playfair Display',Georgia,serif;
  font-size:clamp(1.8rem,3.5vw,2.8rem);
  font-weight:700;color:var(--text-1);
  line-height:1.05;letter-spacing:-.5px;margin-bottom:8px;
}
.detail-tagline{
  font-style:italic;
  font-size:.92rem;color:var(--text-3);margin-bottom:12px;
}
.detail-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:0}
.badge{
  font-size:.54rem;letter-spacing:1px;text-transform:uppercase;
  color:var(--terra);border:1.5px solid var(--terra);
  padding:3px 9px;border-radius:2px;opacity:.75;
}
/* Section divider */
.orn-rule{
  display:flex;align-items:center;gap:14px;
  padding:0 32px;margin:20px 0;
  color:var(--accent);opacity:.5;font-size:.45rem;letter-spacing:4px;
}
.orn-rule::before,.orn-rule::after{
  content:'';flex:1;height:1px;background:var(--border);
}
.detail-body{
  display:grid;grid-template-columns:2fr 1fr;gap:0;
}
@media(max-width:640px){.detail-body{grid-template-columns:1fr}}
.detail-main{
  padding:28px 32px 36px;
  border-right:1px solid var(--border);
}
@media(max-width:640px){.detail-main{border-right:none;border-bottom:1px solid var(--border);padding:24px 20px}}
.detail-sidebar{padding:28px 24px 36px}
@media(max-width:640px){.detail-sidebar{padding:24px 20px}}

.detail-desc{
  font-size:.9rem;color:var(--text-2);line-height:1.85;margin-bottom:28px;
}
.det-section{margin-bottom:24px}
.det-label{
  font-size:.52rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--region-color,var(--accent));margin-bottom:10px;font-weight:700;
  display:flex;align-items:center;gap:10px;
}
.det-label::after{content:'';flex:1;height:1px;background:var(--border)}
.ing-list{list-style:none}
.ing-list li{
  font-size:.84rem;color:var(--text-2);
  padding:6px 0 6px 14px;position:relative;
  line-height:1.6;border-bottom:1px solid var(--border);
}
.ing-list li:last-child{border-bottom:none}
.ing-list li::before{
  content:'';position:absolute;left:0;top:13px;
  width:5px;height:5px;border-radius:50%;
  background:var(--region-color,var(--accent));opacity:.5;
}
.step-list{list-style:none;counter-reset:steps}
.step-list li{
  font-size:.84rem;color:var(--text-2);
  padding:8px 0 8px 28px;position:relative;
  line-height:1.8;counter-increment:steps;
  border-bottom:1px solid var(--border);
}
.step-list li:last-child{border-bottom:none}
.step-list li::before{
  content:counter(steps);position:absolute;left:0;top:8px;
  font-family:Georgia,serif;font-style:italic;font-size:.8rem;
  color:var(--region-color,var(--terra));width:20px;text-align:center;
}
.tips-wrap{
  padding:12px 16px;
  background:var(--region-tint,rgba(62,112,64,.06));
  border-left:3px solid var(--region-color,var(--accent));border-radius:0 4px 4px 0;
}
.tips-text{
  font-style:italic;
  font-size:.82rem;color:var(--text-3);line-height:1.8;
}
/* Sidebar */
.sb-inner{position:sticky;top:calc(46px + 24px)}
.sb-label{
  font-size:.52rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--region-color,var(--accent));margin-bottom:10px;font-weight:700;
  display:flex;align-items:center;gap:10px;
}
.sb-label::after{content:'';flex:1;height:1px;background:var(--border)}
.sb-stat{
  display:flex;justify-content:space-between;
  padding:8px 0;border-bottom:1px solid var(--border);font-size:.78rem;
}
.sb-stat:last-of-type{border-bottom:none}
.sb-key{color:var(--text-3);text-transform:capitalize}
.sb-val{color:var(--text-1);font-weight:500;text-transform:capitalize}
.save-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-top:16px;padding:10px;width:100%;
  border:1.5px solid var(--border);border-radius:2px;
  background:none;font-size:.54rem;letter-spacing:1.4px;text-transform:uppercase;font-weight:700;
  color:var(--text-3);cursor:pointer;transition:all .2s;font-family:inherit;
}
.save-btn:hover{border-color:var(--region-color,var(--terra));color:var(--region-color,var(--terra))}
.save-btn.saved{border-color:var(--region-color,var(--terra));color:var(--region-color,var(--terra));background:var(--region-tint,rgba(184,88,40,.07))}

/* ── Footer ── */
.page-footer{
  padding:52px 0 12px;text-align:center;
  font-size:.52rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-4);font-weight:600;
}
.page-footer::before{
  content:'✦';display:block;color:rgba(78,122,85,.4);font-size:.5rem;margin-bottom:18px;letter-spacing:6px;
}
.page-footer a{color:var(--text-4);text-decoration:none;transition:color .2s}
.page-footer a:hover{color:var(--accent)}

/* ── Animations ── */
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-in{animation:cardIn .26s ease forwards}

/* ── Responsive ── */
@media(max-width:540px){
  .topbar,.cat-strip{padding-left:16px;padding-right:16px}
  .page{padding:0 16px 80px}
  .masthead{padding:12px 16px 10px}
  .mast-rule::before,.mast-rule::after,.mast-rule-b::before,.mast-rule-b::after{width:40px}
  .detail-head-section,.orn-rule{padding-left:18px;padding-right:18px}
}
</style>
</head>
<body>

<div class="topbar">
  <a href="../../index.html#lab" class="back-link">&larr; Portfolio</a>
  <button class="topbar-brand" onclick="showExplore()" aria-label="Back to home" style="cursor:pointer;background:none;border:none;font-size:.7rem;color:var(--text-4);letter-spacing:1px;font-family:inherit;transition:color .2s" onmouseenter="this.style.color='var(--accent)'" onmouseleave="this.style.color='var(--text-4)'">&#8962;</button>
  <div class="topbar-right">
    <button class="saved-btn" id="savedBadge" onclick="filterSaved()">
      <span id="savedHeart">&#9825;</span>&thinsp;<span id="savedCount">0</span>
    </button>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">&#9790;</button>
  </div>
</div>

<div class="explore-view" id="exploreView">

  <div class="masthead">
    <div class="mast-rule">&#10022;</div>
    <div class="masthead-title">Cơm Nhà</div>
    <p class="masthead-sub">175 Vietnamese recipes, cooked from scratch</p>
    <div class="mast-rule-b">&#10022;</div>
  </div>

  <div class="explore-body">
    <!-- A: Region map -->
    <div class="explore-panel">
      <div class="explore-panel-label">Browse by region</div>
      <div class="map-and-list">
        <svg class="viet-map-svg" viewBox="0 0 68 138" xmlns="http://www.w3.org/2000/svg">
          <!--
            Real lat/lon → SVG: x=(lon-102)*9, y=(23.5-lat)*9
            N/C boundary at y≈60 (17°N, narrow waist), C/S at y≈112 (11°N)
            Central region uses a gradient: terracotta (top) → gold (bottom)
          -->
          <defs>
            <!-- light mode gradient: terracotta (top) → harvest gold (bottom) -->
            <linearGradient id="centralGradLight" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stop-color="#C07858"/>
              <stop offset="55%"  stop-color="#C49040"/>
              <stop offset="100%" stop-color="#C8A030"/>
            </linearGradient>
            <!-- dark mode gradient -->
            <linearGradient id="centralGradDark" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stop-color="#703818"/>
              <stop offset="55%"  stop-color="#705010"/>
              <stop offset="100%" stop-color="#806818"/>
            </linearGradient>
          </defs>

          <!-- Northern: wide  -  Red River Delta, Gulf of Tonkin juts right -->
          <path class="viet-region map-region-north"
            onclick="browseRegion('northern')"
            d="M3,9 Q18,1 32,1 Q38,5 42,9
               Q50,14 56,18 Q52,24 48,30
               Q42,37 37,43 Q41,48 45,54
               Q47,57 48,60
               Q44,60 41,60
               Q33,55 27,50 Q23,45 21,41
               Q17,36 15,32 Q9,24 7,18 Q4,13 3,9 Z">
            <title>Miền Bắc</title>
          </path>

          <!-- Central: narrow waist, east coast bulges far right at Quy Nhơn (65,87) -->
          <path class="viet-region map-region-central"
            onclick="browseRegion('central')"
            d="M41,60 Q44,60 48,60
               Q49,61 50,63 Q54,65 58,68
               Q62,78 65,87
               Q63,99 60,110 Q58,111 56,112
               Q39,112 23,112
               Q28,110 32,108 Q40,106 47,104
               Q49,95 50,86 Q47,79 45,72
               Q41,66 41,60 Z">
            <title>Miền Trung</title>
          </path>

          <!-- Southern: Mekong Delta fan, Gulf of Thailand west coast, Cà Mau tip -->
          <path class="viet-region map-region-south"
            onclick="browseRegion('southern')"
            d="M23,112 Q39,112 56,112
               Q52,115 47,117 Q44,120 41,122
               Q34,122 27,122 Q25,129 24,135
               Q20,130 17,126
               Q17,121 18,117 Q20,114 23,112 Z">
            <title>Miền Nam</title>
          </path>
        </svg>
        <div class="region-list" id="regionList">
          <!-- populated by JS -->
        </div>
      </div>
    </div>

    <!-- B: Category tiles -->
    <div class="explore-panel">
      <div class="explore-panel-label">Browse by category</div>
      <div class="cat-tiles" id="catTiles">
        <!-- populated by JS -->
      </div>
    </div>
  </div>

  <div class="explore-footer">
    <button class="explore-all-btn" onclick="browseAll()">Browse all recipes &rarr;</button>
  </div>

</div><!-- /explore-view -->

<div class="catalog-view" id="catalogView">

  <div class="catalog-header">
    <button class="catalog-home-btn" onclick="showExplore()">&larr; Back</button>
    <span class="catalog-heading" id="catalogHeading">All Recipes</span>
  </div>

  <div class="cat-wrap">
    <div class="cat-strip">
      <button class="cat-pill active" data-cat="all"     onclick="setCat('all',this)">All</button>
      <button class="cat-pill"        data-cat="noodles" onclick="setCat('noodles',this)">Noodles</button>
      <button class="cat-pill"        data-cat="rice"    onclick="setCat('rice',this)">Rice</button>
      <button class="cat-pill"        data-cat="bánh"    onclick="setCat('bánh',this)">Bánh</button>
      <button class="cat-pill"        data-cat="sides"   onclick="setCat('sides',this)">Sides</button>
      <button class="cat-pill"        data-cat="sweets"  onclick="setCat('sweets',this)">Sweets</button>
      <button class="cat-pill"        data-cat="drinks"  onclick="setCat('drinks',this)">Drinks</button>
      <button class="cat-pill"        data-cat="saved"   onclick="setCat('saved',this)">&#9825;&thinsp;Saved</button>
    </div>
  </div>

  <div class="page">
    <div class="filter-row">
      <div class="search-wrap">
        <span class="search-icon">&#10022;</span>
        <input type="search" class="search-input" id="searchInput"
          placeholder="Search recipes, ingredients..." oninput="onSearch()">
      </div>
      <select class="filter-select" id="cuisineFilter" onchange="applyFilters()">
        <option value="">All regions</option>
        <option value="northern">Northern</option>
        <option value="central">Central</option>
        <option value="southern">Southern</option>
      </select>
      <select class="filter-select" id="difficultyFilter" onchange="applyFilters()">
        <option value="">Any difficulty</option>
        <option value="easy">Easy</option>
        <option value="moderate">Moderate</option>
        <option value="involved">Involved</option>
      </select>
    </div>

    <div class="result-count" id="resultCount"></div>
    <div class="card-grid" id="cardGrid"></div>

    <div class="page-footer">
      <a href="../../index.html#lab" class="back-link">&larr; Portfolio</a>
    </div>
  </div>

</div><!-- /catalog-view -->

<div class="detail-view" id="detailView">
  <div class="page">
    <button class="detail-back" onclick="showCatalog()">&larr; Back to Recipes</button>
    <div id="detailContent"></div>
  </div>
</div>

<script>
const LS_FAV   = 'from-scratch-favorites';
const LS_THEME = 'from-scratch-theme';

let allRecipes = [], activeCat = 'all', savedIds = new Set(), searchTimer = null;

/* ── Theme ── */
function toggleTheme(){
  const h = document.documentElement;
  const n = h.getAttribute('data-theme')==='dark'?'light':'dark';
  h.setAttribute('data-theme',n);
  localStorage.setItem(LS_THEME,n);
  updateThemeBtn(n);
  // Re-render tiles so pastel vs dark colours update
  if(allRecipes.length) renderExplore();
}
function updateThemeBtn(t){
  document.getElementById('themeBtn').textContent = t==='dark'?'\u2600':'\u263E';
}

/* ── Favorites ── */
function loadSaved(){
  try{ savedIds=new Set(JSON.parse(localStorage.getItem(LS_FAV)||'[]')); }
  catch{ savedIds=new Set(); }
}
function persistSaved(){ localStorage.setItem(LS_FAV,JSON.stringify([...savedIds])); }
function toggleFavorite(id,e){
  if(e) e.stopPropagation();
  savedIds.has(id)?savedIds.delete(id):savedIds.add(id);
  persistSaved(); updateSavedBadge();
  document.querySelectorAll('.heart-btn[data-id="'+id+'"]').forEach(b=>{
    b.classList.toggle('saved',savedIds.has(id));
    b.innerHTML=savedIds.has(id)?'&#9829;':'&#9825;';
  });
  const sb=document.getElementById('detailSaveBtn');
  if(sb&&parseInt(sb.dataset.id)===id){
    sb.classList.toggle('saved',savedIds.has(id));
    sb.innerHTML=savedIds.has(id)?'&#9829;&ensp;Saved':'&#9825;&ensp;Save Recipe';
  }
  if(activeCat==='saved'&&!savedIds.has(id)) applyFilters();
}
function updateSavedBadge(){
  const n=savedIds.size;
  document.getElementById('savedCount').textContent=n;
  document.getElementById('savedHeart').innerHTML=n>0?'&#9829;':'&#9825;';
  document.getElementById('savedBadge').classList.toggle('has-saved',n>0);
}

/* ── Filters ── */
function setCat(cat,btn){
  activeCat=cat;
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  const h=document.getElementById('catalogHeading');
  if(h) h.textContent=cat==='all'?'All Recipes':cat==='saved'?'Saved Recipes':(CAT_LABEL[cat]||cat);
  const cv=document.getElementById('catalogView');
  delete cv.dataset.region;
  const REAL_CATS=['noodles','rice','bánh','sides','sweets','drinks'];
  if(REAL_CATS.includes(cat)) cv.dataset.category=cat; else delete cv.dataset.category;
  applyFilters();
}
function filterSaved(){
  activeCat='saved';
  document.querySelectorAll('.cat-pill').forEach(p=>{
    p.classList.toggle('active',p.dataset.cat==='saved');
  });
  const h=document.getElementById('catalogHeading');
  if(h) h.textContent='Saved Recipes';
  showCatalog();
  applyFilters();
}
function onSearch(){ clearTimeout(searchTimer); searchTimer=setTimeout(applyFilters,150); }
function applyFilters(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase().trim();
  const cui=document.getElementById('cuisineFilter').value;
  const dif=document.getElementById('difficultyFilter').value;
  const out=allRecipes.filter(r=>{
    if(activeCat==='saved'){if(!savedIds.has(r.id))return false;}
    else if(activeCat!=='all'){if(r.category!==activeCat)return false;}
    if(cui&&r.cuisine!==cui)return false;
    if(dif&&r.difficulty!==dif)return false;
    if(q){
      const h=[r.name,r.tagline,r.ingredients,r.cuisine,r.category].join(' ').toLowerCase();
      if(!h.includes(q))return false;
    }
    return true;
  });
  renderCards(out);
  document.getElementById('resultCount').textContent=
    out.length+(out.length===1?' recipe':' recipes')+(activeCat==='saved'?' saved':'');
}

/* ── Helpers ── */
const CAT_GRAD={
  light:{
    noodles:'#D8C898', rice:'#B8CC9C', 'bánh':'#CEB888',
    sides:'#A8C090', sweets:'#CEB4A0', drinks:'#A4B8A0',
  },
  dark:{
    noodles:'#302610', rice:'#182C10', 'bánh':'#2E2010',
    sides:'#162810', sweets:'#2C1E18', drinks:'#142018',
  },
};
const CAT_ICON={
  noodles:'🍜', rice:'🍚', 'bánh':'🥖', sides:'🥬', sweets:'🍮', drinks:'🍵'
};
function catGrad(c){
  const t=document.documentElement.getAttribute('data-theme')||'light';
  return (CAT_GRAD[t]||CAT_GRAD.light)[c]||'#ccc';
}
function regionLabel(c){return{northern:'Miền Bắc',central:'Miền Trung',southern:'Miền Nam'}[c]||c;}
function diffStars(d){
  const n={easy:1,moderate:2,involved:3}[d]||1;
  return [1,2,3].map(i=>`<span class="d-star${i<=n?' on':''}">&#9733;</span>`).join('');
}
function fmtTime(m){
  if(!m)return' - ';
  if(m>=60){const h=Math.floor(m/60),r=m%60;return h+'h'+(r?'\u2009'+r+'m':'');}
  return m+'m';
}

/* ── Render cards ── */
const CAT_ORDER=['noodles','rice','bánh','sides','sweets','drinks'];
const CAT_LABEL={noodles:'Noodles',rice:'Rice','bánh':'Bánh',sides:'Sides',sweets:'Sweets',drinks:'Drinks'};

function renderCards(list){
  const g=document.getElementById('cardGrid');
  if(!list.length){
    g.innerHTML='<div class="empty-state"><p>No recipes found.<br>Try adjusting your filters.</p></div>';
    return;
  }
  const grouped = activeCat==='all' && !document.getElementById('searchInput').value.trim()
                  && !document.getElementById('cuisineFilter').value
                  && !document.getElementById('difficultyFilter').value;
  let html='';
  if(grouped){
    CAT_ORDER.forEach(cat=>{
      const sub=list.filter(r=>r.category===cat);
      if(!sub.length)return;
      html+=`<div class="cat-section-head">${CAT_LABEL[cat]||cat}</div>`;
      html+=sub.map((r,i)=>recipeRow(r,i)).join('');
    });
  } else {
    html=list.map((r,i)=>recipeRow(r,i)).join('');
  }
  g.innerHTML=html;
}

function recipeRow(r,i){
  const sv=savedIds.has(r.id);
  const tot=r.prep_time_min+r.cook_time_min;
  const num=String(r.id).padStart(2,'0');
  return `<div class="recipe-card card-in" style="animation-delay:${i*.02}s" onclick="showDetail(${r.id})">
    <span class="card-num">${num}</span>
    <div class="card-body">
      <div class="card-name">${r.name}</div>
      <div class="card-tag">${r.tagline}</div>
    </div>
    <div class="card-right">
      <span class="cuisine-lbl">${regionLabel(r.cuisine)}</span>
      <span class="card-time-foot">${fmtTime(tot)}</span>
      <button class="heart-btn${sv?' saved':''}" data-id="${r.id}"
        onclick="toggleFavorite(${r.id},event)">${sv?'&#9829;':'&#9825;'}</button>
    </div>
  </div>`;
}

/* ── Detail ── */
function showDetail(id){
  const r=allRecipes.find(x=>x.id===id); if(!r)return;
  const sv=savedIds.has(r.id);
  const ings=r.ingredients.split('\n').map(l=>l.replace(/^-\s*/,'').trim()).filter(Boolean);
  const steps=r.instructions.split('\n').map(l=>l.replace(/^\d+\.\s*/,'').trim()).filter(Boolean);
  const dBadges=r.dietary.length?r.dietary.map(d=>`<span class="badge">${d}</span>`).join(''):'';
  const tipsHtml=r.tips?`<div class="det-section">
    <div class="det-label">Tips</div>
    <div class="tips-wrap"><p class="tips-text">${r.tips}</p></div>
  </div>`:'';
  const tot=r.prep_time_min+r.cook_time_min;

  const detailImg=r.photo?`<img class="detail-img-strip" src="${r.photo}" alt="${r.name}" loading="lazy">`:'' ;
  document.getElementById('detailContent').innerHTML=`
    <div class="detail-card">
      ${detailImg}<div class="detail-head-section">
        <div class="detail-cat-label">${r.category}</div>
        <h1 class="detail-title">${r.name}</h1>
        <p class="detail-tagline">${r.tagline}</p>
        ${dBadges?'<div class="detail-badges">'+dBadges+'</div>':''}
      </div>
      <div class="orn-rule">&#10022;</div>
      <div class="detail-body">
        <div class="detail-main">
          <p class="detail-desc">${r.description}</p>
          <div class="det-section">
            <div class="det-label">Ingredients</div>
            <ul class="ing-list">${ings.map(i=>`<li>${i}</li>`).join('')}</ul>
          </div>
          <div class="det-section">
            <div class="det-label">Instructions</div>
            <ol class="step-list">${steps.map(s=>`<li>${s}</li>`).join('')}</ol>
          </div>
          ${tipsHtml}
        </div>
        <div class="detail-sidebar">
          <div class="sb-inner">
            <div class="sb-label">Quick Facts</div>
            <div class="sb-stat"><span class="sb-key">Prep</span><span class="sb-val">${r.prep_time_min} min</span></div>
            <div class="sb-stat"><span class="sb-key">Cook</span><span class="sb-val">${r.cook_time_min>0?r.cook_time_min+' min':' - '}</span></div>
            <div class="sb-stat"><span class="sb-key">Total</span><span class="sb-val">${fmtTime(tot)}</span></div>
            <div class="sb-stat"><span class="sb-key">Serves</span><span class="sb-val">${r.servings}</span></div>
            <div class="sb-stat"><span class="sb-key">Difficulty</span><span class="sb-val">${r.difficulty}</span></div>
            <div class="sb-stat"><span class="sb-key">Region</span><span class="sb-val">${regionLabel(r.cuisine)}</span></div>
            <div class="sb-stat"><span class="sb-key">Source</span><span class="sb-val">${r.source}</span></div>
            <button class="save-btn${sv?' saved':''}" id="detailSaveBtn" data-id="${r.id}"
              onclick="toggleFavorite(${r.id},event)">
              ${sv?'&#9829;&ensp;Saved':'&#9825;&ensp;Save Recipe'}
            </button>
          </div>
        </div>
      </div>
    </div>`;

  document.getElementById('exploreView').classList.add('hidden');
  document.getElementById('catalogView').classList.remove('active');
  const dv=document.getElementById('detailView');
  dv.dataset.region=r.cuisine;
  dv.classList.add('active');
  window.scrollTo(0,0);
  location.hash='recipe-'+id;
}

function showCatalog(){
  document.getElementById('detailView').classList.remove('active');
  document.getElementById('exploreView').classList.add('hidden');
  document.getElementById('catalogView').classList.add('active');
  history.pushState('',document.title,location.pathname);
  if(!document.getElementById('cardGrid').children.length) applyFilters();
}

function showExplore(){
  document.getElementById('detailView').classList.remove('active');
  const cv=document.getElementById('catalogView');
  cv.classList.remove('active');
  delete cv.dataset.region;
  delete cv.dataset.category;
  document.getElementById('exploreView').classList.remove('hidden');
  history.pushState('',document.title,location.pathname);
  window.scrollTo(0,0);
}

function browseRegion(region){
  activeCat='all';
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.toggle('active',p.dataset.cat==='all'));
  const sel=document.getElementById('cuisineFilter');
  if(sel) sel.value=region;
  const cv=document.getElementById('catalogView');
  cv.dataset.region=region;
  delete cv.dataset.category;
  const heading={northern:'Miền Bắc',central:'Miền Trung',southern:'Miền Nam'}[region]||region;
  const h=document.getElementById('catalogHeading');
  if(h) h.textContent=heading;
  showCatalog();
  applyFilters();
}

function browseCategory(cat){
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.toggle('active',p.dataset.cat===cat));
  activeCat=cat;
  const sel=document.getElementById('cuisineFilter');
  if(sel) sel.value='';
  const cv=document.getElementById('catalogView');
  delete cv.dataset.region;
  const REAL_CATS=['noodles','rice','bánh','sides','sweets','drinks'];
  if(REAL_CATS.includes(cat)) cv.dataset.category=cat; else delete cv.dataset.category;
  const h=document.getElementById('catalogHeading');
  if(h) h.textContent=CAT_LABEL[cat]||cat;
  showCatalog();
  applyFilters();
}

function browseAll(){
  activeCat='all';
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.toggle('active',p.dataset.cat==='all'));
  const sel=document.getElementById('cuisineFilter');
  if(sel) sel.value='';
  const cv=document.getElementById('catalogView');
  delete cv.dataset.region;
  delete cv.dataset.category;
  const h=document.getElementById('catalogHeading');
  if(h) h.textContent='All Recipes';
  showCatalog();
  applyFilters();
}

function renderExplore(){
  // Region list
  const regionCounts={northern:0,central:0,southern:0};
  allRecipes.forEach(r=>{if(regionCounts[r.cuisine]!==undefined)regionCounts[r.cuisine]++;});
  const regionList=document.getElementById('regionList');
  if(regionList){
    regionList.innerHTML=[
      {key:'northern',cls:'rn',viet:'Miền Bắc',eng:'Northern'},
      {key:'central', cls:'rc',viet:'Miền Trung',eng:'Central'},
      {key:'southern',cls:'rs',viet:'Miền Nam',eng:'Southern'},
    ].map(({key,cls,viet,eng})=>`
      <button class="region-btn ${cls}" onclick="browseRegion('${key}')">
        <span class="region-info">
          <span class="region-viet">${viet}</span>
          <span class="region-eng">${eng}</span>
        </span>
        <span class="region-count-badge">${regionCounts[key]}</span>
      </button>`).join('');
  }
  // Category tiles
  const catCounts={};
  allRecipes.forEach(r=>{catCounts[r.category]=(catCounts[r.category]||0)+1;});
  const catTiles=document.getElementById('catTiles');
  if(catTiles){
    catTiles.innerHTML=CAT_ORDER.map(cat=>`
      <button class="cat-tile" style="background:${catGrad(cat)}"
        onclick="browseCategory('${cat.replace(/'/g,"\\'")}')">
        <span class="cat-tile-icon">${CAT_ICON[cat]||'🍽'}</span>
        <span class="cat-tile-name">${CAT_LABEL[cat]||cat}</span>
        <span class="cat-tile-count">${catCounts[cat]||0}</span>
      </button>`).join('');
  }
}

function handleHash(){
  const h=location.hash;
  if(h.startsWith('#recipe-')){
    const id=parseInt(h.replace('#recipe-',''));
    if(!isNaN(id)&&allRecipes.length) showDetail(id);
  }
}

async function init(){
  const t=localStorage.getItem(LS_THEME)||'light';
  document.documentElement.setAttribute('data-theme',t);
  updateThemeBtn(t);
  loadSaved(); updateSavedBadge();
  const res=await fetch('data/recipes.json');
  allRecipes=await res.json();
  renderExplore();
  handleHash();
}

window.addEventListener('hashchange',handleHash);
init();
</script>
</body>
</html>
