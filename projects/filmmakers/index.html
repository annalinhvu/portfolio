<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auteurs — Directors I Admire</title>
  <meta name="description" content="A personal tribute to the filmmakers who shaped the way I see.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Inter:wght@400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Variables ── */
    :root[data-theme="light"] {
      --bg: #f3f1eb;
      --surface: #ffffff;
      --surface-2: #ede8e0;
      --border: #ddd9ce;
      --border-hover: #c4bfb0;
      --text-1: #2a2218;
      --text-2: #4a4238;
      --text-3: #7a7060;
      --text-4: #aaa090;
      --accent: #5e7a62;
      --accent-bg: rgba(94,122,98,0.08);
      --amber: #b8644a;
      --amber-bg: rgba(184,100,74,0.08);
      --indigo: #7060a8;
      --indigo-bg: rgba(112,96,168,0.08);
      --shadow: 0 1px 4px rgba(0,0,0,0.06);
      --shadow-hover: 0 4px 18px rgba(0,0,0,0.10);
      --radius: 10px;
    }
    :root[data-theme="dark"] {
      --bg: #1c2028;
      --surface: #252d3a;
      --surface-2: #2e3848;
      --border: #364050;
      --border-hover: #4a5668;
      --text-1: #e6eaf4;
      --text-2: #b4bcd0;
      --text-3: #7888a4;
      --text-4: #4a5670;
      --accent: #8aaa8e;
      --accent-bg: rgba(138,170,142,0.09);
      --amber: #c8785e;
      --amber-bg: rgba(200,120,94,0.09);
      --indigo: #a090d4;
      --indigo-bg: rgba(160,144,212,0.09);
      --shadow: 0 1px 4px rgba(0,0,0,0.22);
      --shadow-hover: 0 4px 18px rgba(0,0,0,0.32);
      --radius: 10px;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg); color: var(--text-1);
      min-height: 100vh; transition: background 0.25s, color 0.25s;
    }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; font: inherit; }

    /* ── Topbar ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 48px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      transition: background 0.25s, border-color 0.25s;
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .back-link {
      font-size: 0.78rem; color: var(--text-3);
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--accent); }
    .topbar-sep { color: var(--border-hover); font-size: 0.78rem; }
    .topbar-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 0.92rem; font-weight: 400; color: var(--text-1);
      letter-spacing: 0.01em;
    }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .saved-badge {
      font-size: 0.72rem; font-weight: 500;
      color: var(--amber); background: var(--amber-bg);
      padding: 2px 8px; border-radius: 20px;
      display: none; transition: all 0.2s;
    }
    .theme-btn {
      width: 30px; height: 30px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-3); transition: background 0.15s, color 0.15s;
      font-size: 14px;
    }
    .theme-btn:hover { background: var(--surface-2); color: var(--text-1); }

    /* ── Page wrap ── */
    .page { max-width: 980px; margin: 0 auto; padding: 40px 24px 80px; }

    /* ── Catalog header ── */
    .catalog-head { margin-bottom: 32px; }
    .catalog-head h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 2.2rem; font-weight: 300; color: var(--text-1);
      letter-spacing: -0.02em; margin-bottom: 6px;
    }
    .catalog-sub {
      font-size: 0.9rem; color: var(--text-3); font-style: italic;
      font-family: 'Fraunces', Georgia, serif;
    }

    /* ── Filters ── */
    .filters { margin-bottom: 24px; display: flex; flex-direction: column; gap: 10px; }
    .era-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill {
      font-size: 0.72rem; font-weight: 500; padding: 5px 12px;
      border-radius: 20px; border: 1px solid var(--border);
      color: var(--text-3); background: var(--surface);
      transition: all 0.15s; white-space: nowrap;
      font-family: 'Geist Mono', monospace; letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .pill:hover { border-color: var(--border-hover); color: var(--text-1); }
    .pill.active {
      background: var(--text-1); border-color: var(--text-1);
      color: var(--bg);
    }
    .pill-saved.active { background: var(--amber); border-color: var(--amber); color: #fff; }

    .filter-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .search-input, .nat-select {
      font-family: 'Inter', sans-serif; font-size: 0.82rem;
      padding: 7px 12px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-1); outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-input { flex: 1; min-width: 180px; }
    .search-input::placeholder { color: var(--text-4); }
    .search-input:focus, .nat-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-bg);
    }
    .nat-select { appearance: none; -webkit-appearance: none; cursor: pointer; }

    /* ── Result count ── */
    .result-count {
      font-size: 0.72rem; color: var(--text-4);
      font-family: 'Geist Mono', monospace; letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    /* ── Card grid ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    @media (max-width: 860px) { .card-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { .card-grid { grid-template-columns: 1fr; } }

    /* ── Filmmaker card ── */
    .filmmaker-card {
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); border-top-width: 3px;
      padding: 16px; cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
      display: flex; flex-direction: column; gap: 0;
    }
    .filmmaker-card:hover {
      border-color: var(--border-hover);
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }
    /* Era border colors */
    .era-avant-garde  { border-top-color: var(--amber); }
    .era-new-wave     { border-top-color: var(--accent); }
    .era-classical    { border-top-color: var(--text-3); }
    .era-contemporary { border-top-color: var(--indigo); }

    .card-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 10px;
    }
    .era-badge {
      font-family: 'Geist Mono', monospace; font-size: 0.6rem;
      font-weight: 500; letter-spacing: 1px; text-transform: uppercase;
      padding: 3px 8px; border-radius: 4px;
    }
    .era-badge-avant-garde  { color: var(--amber);  background: var(--amber-bg); }
    .era-badge-new-wave     { color: var(--accent); background: var(--accent-bg); }
    .era-badge-classical    { color: var(--text-3); background: rgba(0,0,0,0.04); }
    .era-badge-contemporary { color: var(--indigo); background: var(--indigo-bg); }
    :root[data-theme="dark"] .era-badge-classical { background: rgba(255,255,255,0.06); }

    .heart-btn {
      font-size: 14px; color: var(--text-4); line-height: 1;
      padding: 2px 4px; border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .heart-btn:hover { color: var(--amber); }
    .heart-btn.saved { color: var(--amber); }

    .card-name {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.05rem; font-weight: 400; color: var(--text-1);
      margin-bottom: 4px; line-height: 1.3;
    }
    .card-tagline {
      font-size: 0.78rem; color: var(--text-3); font-style: italic;
      font-family: 'Fraunces', Georgia, serif;
      margin-bottom: 12px; line-height: 1.4;
    }
    .card-films {
      display: flex; flex-wrap: wrap; gap: 4px 0;
      margin-bottom: 10px;
    }
    .card-films span {
      font-size: 0.72rem; color: var(--text-3);
    }
    .card-films .dot {
      font-size: 0.72rem; color: var(--text-4); margin: 0 4px;
    }
    .card-meta {
      font-size: 0.68rem; color: var(--text-4);
      font-family: 'Geist Mono', monospace; letter-spacing: 0.3px;
      margin-top: auto; padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1 / -1;
      padding: 60px 0; text-align: center;
      color: var(--text-4); font-size: 0.88rem; font-style: italic;
    }

    /* ── Detail view ── */
    #view-detail { display: none; }
    .detail-wrap { max-width: 820px; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.78rem; color: var(--text-3);
      padding: 6px 0; margin-bottom: 28px;
      transition: color 0.15s;
    }
    .back-btn:hover { color: var(--accent); }

    .detail-era-badge {
      font-family: 'Geist Mono', monospace; font-size: 0.62rem;
      font-weight: 500; letter-spacing: 1.2px; text-transform: uppercase;
      padding: 4px 10px; border-radius: 4px;
      display: inline-block; margin-bottom: 12px;
    }
    .detail-name {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 2.4rem; font-weight: 300; color: var(--text-1);
      letter-spacing: -0.02em; margin-bottom: 6px; line-height: 1.15;
    }
    .detail-years {
      font-size: 0.82rem; color: var(--text-3);
      font-family: 'Geist Mono', monospace; letter-spacing: 0.3px;
      margin-bottom: 8px;
    }
    .detail-tagline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.05rem; color: var(--text-2); font-style: italic;
      margin-bottom: 16px; font-weight: 300;
    }
    .style-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 32px; }
    .style-tag {
      font-family: 'Geist Mono', monospace; font-size: 0.62rem;
      letter-spacing: 0.8px; text-transform: uppercase;
      padding: 3px 9px; border-radius: 4px;
      color: var(--text-3); background: var(--surface-2);
      border: 1px solid var(--border);
    }

    .detail-content {
      display: grid; grid-template-columns: 1fr 240px; gap: 40px;
      align-items: start;
    }
    @media (max-width: 680px) {
      .detail-content { grid-template-columns: 1fr; }
      .detail-sidebar { order: -1; }
    }

    .section-label {
      font-family: 'Geist Mono', monospace; font-size: 0.62rem;
      font-weight: 500; letter-spacing: 1.8px; text-transform: uppercase;
      color: var(--accent); margin-bottom: 10px;
      padding-left: 10px; border-left: 2px solid var(--accent);
    }
    .detail-bio {
      font-size: 0.9rem; color: var(--text-2); line-height: 1.75;
      margin-bottom: 28px;
    }
    .detail-why {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 0.98rem; color: var(--text-2); font-style: italic;
      line-height: 1.7; font-weight: 300;
      padding: 14px 18px; margin-bottom: 28px;
      border-left: 3px solid var(--amber);
      background: var(--amber-bg); border-radius: 0 6px 6px 0;
    }
    .film-list { list-style: none; display: flex; flex-direction: column; gap: 0; }
    .film-list li {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 9px 0; border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .film-list li:last-child { border-bottom: none; }
    .film-title { font-size: 0.88rem; color: var(--text-1); }
    .film-year {
      font-family: 'Geist Mono', monospace; font-size: 0.72rem;
      color: var(--text-4); flex-shrink: 0;
    }

    /* ── Sidebar ── */
    .detail-sidebar { position: sticky; top: 64px; }
    .sidebar-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      margin-bottom: 12px;
    }
    .sidebar-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 7px 0; border-bottom: 1px solid var(--border);
      font-size: 0.82rem; gap: 10px;
    }
    .sidebar-row:last-child { border-bottom: none; }
    .sidebar-label { color: var(--text-4); font-size: 0.75rem; }
    .sidebar-row span:last-child { color: var(--text-2); text-align: right; }

    .save-btn {
      width: 100%; padding: 10px 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text-3);
      font-size: 0.82rem; font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: all 0.15s;
    }
    .save-btn:hover { border-color: var(--amber); color: var(--amber); }
    .save-btn.saved { background: var(--amber-bg); border-color: var(--amber); color: var(--amber); }
    .save-icon { font-size: 14px; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .page { padding: 28px 16px 60px; }
      .catalog-head h1 { font-size: 1.7rem; }
      .detail-name { font-size: 1.8rem; }
      .topbar { padding: 0 16px; }
    }
  </style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-left">
    <a href="../../index.html#lab" class="back-link">← Portfolio</a>
    <span class="topbar-sep">/</span>
    <span class="topbar-title">Auteurs</span>
  </div>
  <div class="topbar-right">
    <span class="saved-badge" id="saved-badge"></span>
    <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme">◐</button>
  </div>
</div>

<div class="page">

  <!-- ══ CATALOG VIEW ══ -->
  <div id="view-catalog">

    <div class="catalog-head">
      <h1>Auteurs</h1>
      <p class="catalog-sub">directors who shaped the way I see</p>
    </div>

    <div class="filters">
      <div class="era-pills">
        <button class="pill active" data-era="all">All</button>
        <button class="pill" data-era="avant-garde">Avant-garde</button>
        <button class="pill" data-era="new-wave">New Wave</button>
        <button class="pill" data-era="classical">Classical</button>
        <button class="pill" data-era="contemporary">Contemporary</button>
        <button class="pill pill-saved" data-era="saved">Saved ♥</button>
      </div>
      <div class="filter-bar">
        <select class="nat-select" id="filter-nat" aria-label="Filter by nationality">
          <option value="">All Nationalities</option>
        </select>
        <input class="search-input" id="search-input" type="search" placeholder="Search directors..." aria-label="Search directors">
      </div>
    </div>

    <div class="result-count" id="result-count">25 directors</div>
    <div class="card-grid" id="card-grid"></div>

  </div>

  <!-- ══ DETAIL VIEW ══ -->
  <div id="view-detail"></div>

</div>

<script>
  let allFilmmakers = [];
  let activeEra = 'all';
  let savedIds = new Set();
  let activeNat = '';
  let searchQ = '';
  let searchTimer = null;

  async function init() {
    try {
      const r = await fetch('data/filmmakers.json');
      allFilmmakers = await r.json();
    } catch (e) {
      document.getElementById('card-grid').innerHTML = '<p class="empty-state">Could not load data.</p>';
      return;
    }

    const stored = localStorage.getItem('auteurs-saved');
    if (stored) savedIds = new Set(JSON.parse(stored));

    buildNatSelect();
    updateSavedBadge();

    window.addEventListener('hashchange', handleHash);
    handleHash();
  }

  function handleHash() {
    const h = location.hash;
    if (h.startsWith('#director-')) {
      const id = parseInt(h.replace('#director-', ''));
      if (!isNaN(id)) { showDetail(id); return; }
    }
    showCatalog();
    applyFilters();
  }

  function applyFilters() {
    let r = allFilmmakers;
    if (activeEra === 'saved') {
      r = r.filter(f => savedIds.has(f.id));
    } else if (activeEra !== 'all') {
      r = r.filter(f => f.era === activeEra);
    }
    if (activeNat) r = r.filter(f => f.nationality === activeNat);
    if (searchQ) {
      const q = searchQ.toLowerCase();
      r = r.filter(f =>
        f.name.toLowerCase().includes(q) ||
        f.tagline.toLowerCase().includes(q)
      );
    }
    renderCards(r);
    document.getElementById('result-count').textContent =
      `${r.length} director${r.length !== 1 ? 's' : ''}`;
  }

  function renderCards(list) {
    const grid = document.getElementById('card-grid');
    if (list.length === 0) {
      grid.innerHTML = '<p class="empty-state">No directors match your filters.</p>';
      return;
    }
    grid.innerHTML = list.map(f => {
      const films = f.notable_films.slice(0, 3);
      const filmHtml = films.map((film, i) =>
        `<span>${film.title}</span>${i < films.length - 1 ? '<span class="dot">·</span>' : ''}`
      ).join('');
      const lifespan = f.death_year
        ? `${f.birth_year}–${f.death_year}`
        : `b. ${f.birth_year}`;
      return `
        <div class="filmmaker-card era-${f.era}" onclick="showDetail(${f.id})" role="button" tabindex="0"
          onkeydown="if(event.key==='Enter'||event.key===' ')showDetail(${f.id})">
          <div class="card-top">
            <span class="era-badge era-badge-${f.era}">${formatEra(f.era)}</span>
            <button class="heart-btn ${savedIds.has(f.id) ? 'saved' : ''}"
              onclick="toggleFav(${f.id}, event)"
              aria-label="${savedIds.has(f.id) ? 'Remove from saved' : 'Save'}">♥</button>
          </div>
          <div class="card-name">${f.name}</div>
          <div class="card-tagline">${f.tagline}</div>
          <div class="card-films">${filmHtml}</div>
          <div class="card-meta">${formatNat(f.nationality)} · ${lifespan}</div>
        </div>`;
    }).join('');
  }

  function showDetail(id) {
    const f = allFilmmakers.find(x => x.id === id);
    if (!f) return;
    document.getElementById('view-catalog').style.display = 'none';
    const detail = document.getElementById('view-detail');
    detail.style.display = 'block';
    history.pushState(null, '', `#director-${id}`);
    const isSaved = savedIds.has(id);
    const lifespan = f.death_year
      ? `${f.birth_year}–${f.death_year}`
      : `${f.birth_year}–`;
    detail.innerHTML = `
      <div class="detail-wrap">
        <button class="back-btn" onclick="goBack()">← Back to directors</button>
        <span class="detail-era-badge era-badge-${f.era}">${formatEra(f.era)}</span>
        <h1 class="detail-name">${f.name}</h1>
        <p class="detail-years">${lifespan} · ${formatNat(f.nationality)}</p>
        <p class="detail-tagline">${f.tagline}</p>
        <div class="style-tags">${f.style_tags.map(t => `<span class="style-tag">${t}</span>`).join('')}</div>
        <div class="detail-content">
          <div class="detail-main">
            <div class="section-label">About</div>
            <p class="detail-bio">${f.bio}</p>
            ${f.why ? `
              <div class="section-label">Why I admire</div>
              <blockquote class="detail-why">${f.why}</blockquote>` : ''}
            <div class="section-label">Films</div>
            <ul class="film-list">
              ${f.notable_films.map(film =>
                `<li><span class="film-title">${film.title}</span><span class="film-year">${film.year}</span></li>`
              ).join('')}
            </ul>
          </div>
          <aside class="detail-sidebar">
            <div class="sidebar-card">
              <div class="sidebar-row"><span class="sidebar-label">Nationality</span><span>${formatNat(f.nationality)}</span></div>
              <div class="sidebar-row"><span class="sidebar-label">Era</span><span>${formatEra(f.era)}</span></div>
              <div class="sidebar-row"><span class="sidebar-label">Born</span><span>${f.birth_year}</span></div>
              ${f.death_year ? `<div class="sidebar-row"><span class="sidebar-label">Died</span><span>${f.death_year}</span></div>` : ''}
            </div>
            <button class="save-btn ${isSaved ? 'saved' : ''}" id="save-btn-detail" onclick="toggleFavDetail(${id})">
              <span class="save-icon">${isSaved ? '♥' : '♡'}</span>
              <span>${isSaved ? 'Saved' : 'Save'}</span>
            </button>
          </aside>
        </div>
      </div>`;
    window.scrollTo(0, 0);
  }

  function goBack() {
    showCatalog();
    applyFilters();
    history.pushState(null, '', location.pathname);
  }

  function showCatalog() {
    document.getElementById('view-detail').style.display = 'none';
    document.getElementById('view-detail').innerHTML = '';
    document.getElementById('view-catalog').style.display = 'block';
  }

  function toggleFav(id, e) {
    e.stopPropagation();
    savedIds.has(id) ? savedIds.delete(id) : savedIds.add(id);
    localStorage.setItem('auteurs-saved', JSON.stringify([...savedIds]));
    updateSavedBadge();
    applyFilters();
  }

  function toggleFavDetail(id) {
    savedIds.has(id) ? savedIds.delete(id) : savedIds.add(id);
    localStorage.setItem('auteurs-saved', JSON.stringify([...savedIds]));
    updateSavedBadge();
    const btn = document.getElementById('save-btn-detail');
    if (btn) {
      const s = savedIds.has(id);
      btn.className = `save-btn ${s ? 'saved' : ''}`;
      btn.innerHTML = `<span class="save-icon">${s ? '♥' : '♡'}</span><span>${s ? 'Saved' : 'Save'}</span>`;
    }
  }

  function updateSavedBadge() {
    const badge = document.getElementById('saved-badge');
    if (!badge) return;
    badge.style.display = savedIds.size > 0 ? 'inline' : 'none';
    badge.textContent = `♥ ${savedIds.size}`;
  }

  function buildNatSelect() {
    const nats = [...new Set(allFilmmakers.map(f => f.nationality))].sort();
    const select = document.getElementById('filter-nat');
    nats.forEach(nat => {
      const opt = document.createElement('option');
      opt.value = nat; opt.textContent = formatNat(nat);
      select.appendChild(opt);
    });
  }

  function formatEra(era) {
    return { 'avant-garde': 'Avant-garde', 'new-wave': 'New Wave', 'classical': 'Classical', 'contemporary': 'Contemporary' }[era] || era;
  }

  function formatNat(nat) {
    const map = {
      french: 'French', american: 'American', japanese: 'Japanese',
      belgian: 'Belgian', russian: 'Russian', swedish: 'Swedish',
      hongkong: 'Hong Kong', iranian: 'Iranian', korean: 'Korean',
      taiwanese: 'Taiwanese', mexican: 'Mexican'
    };
    return map[nat] || nat.charAt(0).toUpperCase() + nat.slice(1);
  }

  // Era pills
  document.querySelectorAll('.pill[data-era]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.pill[data-era]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeEra = btn.dataset.era;
      applyFilters();
    });
  });

  // Nationality filter
  document.getElementById('filter-nat').addEventListener('change', e => {
    activeNat = e.target.value;
    applyFilters();
  });

  // Search
  document.getElementById('search-input').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { searchQ = e.target.value.trim(); applyFilters(); }, 150);
  });

  // Theme
  function toggleTheme() {
    const html = document.documentElement;
    html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('auteurs-theme', html.dataset.theme);
  }
  const savedTheme = localStorage.getItem('auteurs-theme');
  if (savedTheme) document.documentElement.dataset.theme = savedTheme;

  init();
</script>
</body>
</html>
