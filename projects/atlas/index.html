<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Departure Lounge</title>
<meta name="description" content="A travel bucket list — 17 destinations, boarding passes not yet stamped.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garant:ital,wght@1,500;1,600&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Geist Mono';
  font-style: normal; font-display: swap; font-weight: 100 900;
  src: url(https://cdn.jsdelivr.net/fontsource/fonts/geist-mono:vf@latest/latin-wght-normal.woff2) format('woff2-variations');
}

/* ══ PALETTE ══ */
:root {
  --bg:       #1a2535;
  --bg-2:     #1f2d40;
  --surface:  #263648;
  --surface-2:#2d4058;
  --stub-bg:  #1c2e3e;
  --border:   #384f68;
  --border-2: #486080;
  --text-1:   #e8ddc8;
  --text-2:   #98a8b5;
  --text-3:   #607080;
  --text-4:   #405060;
  --gold:     #c8a040;
  --gold-dim: rgba(200,160,64,0.12);
  --asia:     #e07050;
  --europe:   #58a0e8;
  --americas: #48c080;
  --africa:   #e0a830;
  --oceania:  #38c8c0;
}
:root[data-theme="light"] {
  --bg:       #ddf0fc;
  --bg-2:     #c8e4f8;
  --surface:  #eef8ff;
  --surface-2:#d8eef8;
  --stub-bg:  #c0dcf0;
  --border:   #90c0e0;
  --border-2: #68a8d0;
  --text-1:   #061828;
  --text-2:   #0e3858;
  --text-3:   #2a6080;
  --text-4:   #5890b0;
  --gold:     #a86c00;
  --gold-dim: rgba(168,108,0,0.08);
  --asia:     #c83820;
  --europe:   #1858c0;
  --americas: #107848;
  --africa:   #b07000;
  --oceania:  #0090a0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: 'Geist Mono', monospace;
  background: var(--bg);
  color: var(--text-2);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  transition: background 0.3s, color 0.3s;
}

/* ══ TOPBAR ══ */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 52px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 24px; gap: 16px;
}
.back-link {
  font-size: 0.6rem; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-3); text-decoration: none; transition: color 0.2s; flex-shrink: 0;
}
.back-link:hover { color: var(--gold); }
.topbar-brand {
  flex: 1; text-align: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem; letter-spacing: 8px; color: var(--text-1);
}
.topbar-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.saved-btn {
  font-size: 0.56rem; letter-spacing: 1px; text-transform: uppercase;
  color: var(--text-3); background: none;
  border: 1px solid var(--border); border-radius: 2px;
  padding: 4px 10px; cursor: pointer; transition: all 0.2s;
}
.saved-btn:hover, .saved-btn.active { color: var(--gold); border-color: var(--gold); background: var(--gold-dim); }
.theme-btn {
  font-size: 0.9rem; background: none; border: none;
  cursor: pointer; color: var(--text-3); transition: color 0.2s; padding: 4px;
}
.theme-btn:hover { color: var(--text-1); }

/* ══ CONTROLS ══ */
.controls-bar {
  position: fixed; top: 52px; left: 0; right: 0; z-index: 90;
  height: 44px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex; align-items: center; gap: 5px;
}
.filter-pill {
  font-size: 0.53rem; letter-spacing: 1.5px; text-transform: uppercase;
  border: 1px solid var(--border); border-radius: 1px;
  padding: 3px 9px; background: none; cursor: pointer;
  color: var(--text-4); transition: all 0.15s; flex-shrink: 0; height: 26px;
}
.filter-pill:hover { color: var(--text-2); border-color: var(--border-2); }
.filter-pill.active { color: var(--text-1); border-color: var(--text-3); background: var(--surface-2); }
.filter-pill[data-region="asia"].active    { color: var(--asia);     border-color: var(--asia);     background: rgba(212,96,58,0.08); }
.filter-pill[data-region="europe"].active  { color: var(--europe);   border-color: var(--europe);   background: rgba(74,128,208,0.08); }
.filter-pill[data-region="americas"].active{ color: var(--americas); border-color: var(--americas); background: rgba(72,168,104,0.08); }
.filter-pill[data-region="africa"].active  { color: var(--africa);   border-color: var(--africa);   background: rgba(208,144,48,0.08); }
.filter-pill[data-region="oceania"].active { color: var(--oceania);  border-color: var(--oceania);  background: rgba(56,176,168,0.08); }
.filter-sep { width: 1px; height: 16px; background: var(--border); flex-shrink: 0; margin: 0 2px; }
.search-wrap { flex: 1; min-width: 120px; max-width: 220px; position: relative; display: flex; align-items: center; }
.search-icon { position: absolute; left: 8px; font-size: 0.7rem; color: var(--text-4); pointer-events: none; }
.search-input {
  width: 100%; padding: 3px 8px 3px 26px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 1px;
  color: var(--text-1); font-size: 0.62rem; height: 26px;
  font-family: 'Geist Mono', monospace; letter-spacing: 0.5px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 2px var(--gold-dim); }
.search-input::placeholder { color: var(--text-4); }

/* ══ MAP CONTAINER ══ */
.map-wrap {
  position: fixed;
  top: 96px; left: 0; right: 0; bottom: 0;
  overflow: hidden;
  background: var(--bg);
}
#world-map {
  width: 100%; height: 100%; display: block;
  cursor: grab;
}
#world-map:active { cursor: grabbing; }
.map-hint {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  font-size: 0.5rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-4); pointer-events: none; white-space: nowrap;
  transition: opacity 0.4s;
}
.map-loading-msg {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.58rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-4);
}

/* Map SVG elements */
@keyframes ocean-dark {
  0%, 100% { fill: #1e3045; }
  33%       { fill: #223650; }
  66%       { fill: #1c2e42; }
}
@keyframes ocean-light {
  0%, 100% { fill: #b0d8f4; }
  33%       { fill: #9ccef0; }
  66%       { fill: #bce4fc; }
}
@keyframes graticule-drift {
  0%, 100% { opacity: 0.4; }
  50%       { opacity: 0.15; }
}
:root .sphere { animation: ocean-dark 9s ease-in-out infinite; }
:root[data-theme="light"] .sphere { animation: ocean-light 9s ease-in-out infinite; }
.sphere-atmo { pointer-events: none; }
:root .sphere-atmo { fill: #4080b0; opacity: 0.10; filter: blur(18px); }
:root[data-theme="light"] .sphere-atmo { fill: #0070b0; opacity: 0.07; filter: blur(18px); }
.graticule { fill: none; stroke: var(--border); stroke-width: 0.3px; animation: graticule-drift 12s ease-in-out infinite; }
.land      { fill: var(--surface); stroke: var(--border); stroke-width: 0.4px; }
#world-map .land.destination { cursor: pointer; fill: var(--surface-2); }
#world-map .land.destination:hover { fill: var(--border); }
.flight-path {
  fill: none; stroke-width: 1.2px;
  stroke-linecap: round;
}
.fp-asia     { stroke: var(--asia); }
.fp-europe   { stroke: var(--europe); }
.fp-americas { stroke: var(--americas); }
.fp-africa   { stroke: var(--africa); }
.fp-oceania  { stroke: var(--oceania); }

.pin-group { cursor: pointer; }
.pin-group:hover .pin-ring { filter: brightness(1.5); }
.pin-group:hover .pin-dot  { filter: brightness(1.5); }
.pin-label {
  fill: var(--text-2);
  font-size: 9px;
  font-family: 'Geist Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 1px;
  opacity: 0; /* controlled by zoom handler */
  /* halo so text reads against any map colour */
  paint-order: stroke fill;
  stroke: var(--bg);
  stroke-width: 3.5px;
  stroke-linejoin: round;
  transition: fill 0.15s, opacity 0.15s;
}
.pin-group:hover .pin-label { fill: var(--text-1); opacity: 1; }
.pin-saved-dot {
  fill: var(--gold);
  opacity: 0;
  transition: opacity 0.2s;
}
.pin-saved-dot.visible { opacity: 1; }

.world-label {
  fill: var(--text-4);
  font-size: 3px;
  font-family: 'Geist Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  pointer-events: none;
}
.nyc-marker { pointer-events: none; }
.nyc-label { fill: var(--gold); font-size: 7px; font-family: 'Geist Mono', monospace; letter-spacing: 1.5px; opacity: 0.7; }

/* ══ OVERLAY ══ */
.overlay {
  position: fixed; inset: 0; z-index: 150;
  background: rgba(0,0,0,0.55);
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s;
}
.overlay.visible { opacity: 1; pointer-events: all; }

/* ══ SIDE PANEL ══ */
.side-panel {
  position: fixed;
  right: -680px; top: 0; bottom: 0;
  width: 640px;
  background: var(--bg);
  border-left: 1px solid var(--border);
  z-index: 200;
  overflow-y: auto;
  transition: right 0.38s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex; flex-direction: column;
}
.side-panel.open { right: 0; }

/* Panel nav strip */
.panel-nav {
  position: sticky; top: 0; z-index: 10; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 22px 10px 22px;
  background: var(--bg); border-bottom: 1px solid var(--border);
}
.panel-nav-arrows { display: flex; align-items: center; gap: 10px; }
.panel-nav-btn {
  background: none; border: 1px solid var(--border); border-radius: 2px;
  color: var(--text-3); font-size: 0.85rem; cursor: pointer;
  width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; font-family: 'Geist Mono', monospace;
}
.panel-nav-btn:hover { color: var(--text-1); border-color: var(--border-2); background: var(--surface); }
.panel-nav-pos { font-size: 0.52rem; letter-spacing: 1.5px; color: var(--text-4); min-width: 52px; text-align: center; }
.panel-close-btn {
  background: none; border: none; cursor: pointer;
  font-size: 1.5rem; color: var(--text-3); transition: color 0.2s; line-height: 1; padding: 4px;
}
.panel-close-btn:hover { color: var(--text-1); }

/* Panel photo hero */
.panel-photo { width: 100%; height: 240px; overflow: hidden; flex-shrink: 0; }
.panel-photo img { width: 100%; height: 100%; object-fit: cover; display: block; filter: brightness(0.82); }

/* Panel boarding pass header */
.panel-accent { height: 4px; background: var(--region-color, var(--border)); flex-shrink: 0; }
.panel-pass-head {
  padding: 32px 36px 26px; border-bottom: none;
  position: relative; flex-shrink: 0;
}
/* Tear line */
.panel-tear {
  margin: 0 0; height: 0; flex-shrink: 0;
  border: none; border-top: 1px dashed var(--border-2);
  position: relative;
}
.panel-tear::before, .panel-tear::after {
  content: ''; position: absolute;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--bg-2); border: 1px dashed var(--border-2);
  top: -10px;
}
.panel-tear::before { left: -10px; }
.panel-tear::after  { right: -10px; }
.panel-meta {
  font-size: 0.6rem; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--region-color, var(--text-4)); margin-bottom: 8px;
}
.panel-country {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3.2rem, 9vw, 4.8rem);
  letter-spacing: 5px; color: var(--text-1); line-height: 0.93;
  margin-bottom: 16px;
}
.panel-tagline {
  font-family: 'Cormorant Garant', Georgia, serif;
  font-size: 1.15rem; font-style: italic;
  color: var(--text-2); line-height: 1.7; opacity: 0.9;
}

/* Panel meta fields */
.panel-fields {
  display: flex; flex-wrap: wrap; gap: 24px;
  padding: 22px 36px 24px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.panel-field { display: flex; flex-direction: column; gap: 5px; }
.panel-field-label { font-size: 0.55rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-4); }
.panel-field-value { font-size: 0.82rem; color: var(--text-1); }

/* Panel tabs */
.panel-tabs {
  display: flex; flex-shrink: 0;
  padding: 0 36px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 52px; z-index: 5;
  background: var(--bg);
}
.panel-tab-btn {
  font-family: 'Geist Mono', monospace;
  font-size: 0.52rem; letter-spacing: 1.5px; text-transform: uppercase;
  background: none; border: none; border-bottom: 2px solid transparent;
  margin-bottom: -1px; padding: 12px 14px;
  color: var(--text-4); cursor: pointer; transition: all 0.15s;
}
.panel-tab-btn:hover { color: var(--text-2); }
.panel-tab-btn.active { color: var(--text-1); border-bottom-color: var(--region-color, var(--gold)); }

/* Panel body */
.panel-tab-content {
  padding: 28px 36px;
  display: flex; flex-direction: column; gap: 24px;
}
.panel-section-label {
  font-size: 0.55rem; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--text-4); margin-bottom: 14px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.panel-section-text { font-size: 0.88rem; color: var(--text-2); line-height: 1.9; }
.place-list, .food-list { display: flex; flex-direction: column; gap: 18px; }
.place-name, .food-name {
  font-size: 0.85rem; color: var(--text-1);
  display: flex; align-items: center; gap: 9px; margin-bottom: 4px;
}
.place-name::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--region-color, var(--border)); flex-shrink: 0; }
.food-name::before  { content: ''; width: 6px; height: 2px; background: var(--region-color, var(--border)); flex-shrink: 0; }
.place-notes, .food-notes { font-size: 0.8rem; color: var(--text-3); line-height: 1.8; padding-left: 15px; }
.tips-list { display: flex; flex-direction: column; gap: 14px; }
.tip { font-size: 0.85rem; color: var(--text-2); line-height: 1.8; display: flex; gap: 12px; }
.tip::before { content: '—'; color: var(--text-4); flex-shrink: 0; }

/* Wishlist button — sticky bottom of panel */
.panel-footer {
  position: sticky; bottom: 0;
  padding: 16px 36px 22px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.wishlist-btn {
  width: 100%; padding: 13px;
  background: none; border: 1px solid var(--border); border-radius: 2px;
  font-size: 0.65rem; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-2); cursor: pointer; transition: all 0.2s;
  font-family: 'Geist Mono', monospace;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.wishlist-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
.wishlist-btn.saved { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

/* Vibe tags */
.vibe-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 3px; }
.vibe-chip {
  font-size: 0.58rem; letter-spacing: 0.5px; padding: 2px 9px;
  border: 1px solid var(--border-2); color: var(--text-2);
}

/* Filter selects */
.filter-select {
  font-family: 'Geist Mono', monospace;
  font-size: 0.53rem; letter-spacing: 1px; text-transform: uppercase;
  border: 1px solid var(--border); border-radius: 1px;
  padding: 0 8px; height: 26px; background: var(--bg);
  color: var(--text-4); cursor: pointer; flex-shrink: 0;
  transition: all 0.15s; appearance: none; -webkit-appearance: none;
  min-width: 80px;
}
.filter-select:focus { outline: none; border-color: var(--gold); color: var(--text-1); }
.filter-select.active { color: var(--text-1); border-color: var(--text-3); background: var(--surface-2); }

/* Stats in controls bar */
.stats-info {
  margin-left: auto; font-size: 0.52rem; letter-spacing: 1px;
  color: var(--text-4); white-space: nowrap; flex-shrink: 0;
}

/* Random picker button */
.random-btn {
  font-size: 0.56rem; letter-spacing: 1px; text-transform: uppercase;
  color: var(--text-3); background: none;
  border: 1px solid var(--border); border-radius: 2px;
  padding: 4px 10px; cursor: pointer; transition: all 0.2s;
  white-space: nowrap;
}
.random-btn:hover { color: var(--gold); border-color: var(--gold); background: var(--gold-dim); }

/* Active pin + path highlight */
.pin-group.active { filter: brightness(1.8) drop-shadow(0 0 4px var(--region-color, white)); }
.flight-path.active { opacity: 0.85 !important; stroke-width: 2.2px; }

/* Planning + visited hover */

/* Region cascade */
.rc-asia     { --region-color: var(--asia); }
.rc-europe   { --region-color: var(--europe); }
.rc-americas { --region-color: var(--americas); }
.rc-africa   { --region-color: var(--africa); }
.rc-oceania  { --region-color: var(--oceania); }

/* ══ ZOOM CONTROLS ══ */
.zoom-btns {
  position: absolute; bottom: 20px; right: 20px;
  display: flex; flex-direction: column; gap: 4px; z-index: 50;
}
.zoom-btn {
  width: 44px; height: 44px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-3); font-size: 1rem; line-height: 1;
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
  font-family: monospace;
}
.zoom-btn:hover { color: var(--text-1); border-color: var(--border-2); background: var(--surface-2); }

/* ══ RESPONSIVE ══ */
@media (max-width: 640px) {
  body { overflow: auto; }
  .map-wrap { position: relative; top: 0; height: 55vh; margin-top: 96px; }
  .side-panel { width: 100%; right: -100%; }
  .panel-pass-head { padding: 24px 24px 20px; }
  .panel-fields, .panel-tab-content, .panel-footer { padding-left: 24px; padding-right: 24px; }
  .panel-tabs { padding: 0 24px; }
  .side-panel.open { right: 0; }
  .topbar-brand { font-size: 1.4rem; letter-spacing: 5px; }
  .filter-select { display: none; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a href="../../index.html" class="back-link">← Portfolio</a>
  <div class="topbar-brand">Departure Lounge</div>
  <div class="topbar-right">
    <button class="random-btn" onclick="pickRandom()">✦ surprise me</button>
    <button class="saved-btn" id="savedBtn" onclick="toggleSavedFilter()">♥ <span id="savedCount">0</span></button>
    <button class="theme-btn" onclick="toggleTheme()">◐</button>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls-bar">
  <button class="filter-pill active" data-region="all">All</button>
  <button class="filter-pill" data-region="asia">Asia</button>
  <button class="filter-pill" data-region="europe">Europe</button>
  <button class="filter-pill" data-region="americas">Americas</button>
  <button class="filter-pill" data-region="africa">Africa</button>
  <button class="filter-pill" data-region="oceania">Oceania</button>
  <div class="filter-sep"></div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="search" class="search-input" id="searchInput" placeholder="Search…">
  </div>
  <div class="filter-sep"></div>
  <select class="filter-select" id="monthFilter" onchange="onMonthChange()">
    <option value="">Month</option>
    <option value="1">January</option><option value="2">February</option>
    <option value="3">March</option><option value="4">April</option>
    <option value="5">May</option><option value="6">June</option>
    <option value="7">July</option><option value="8">August</option>
    <option value="9">September</option><option value="10">October</option>
    <option value="11">November</option><option value="12">December</option>
  </select>
  <select class="filter-select" id="statusFilter" onchange="onStatusChange()">
    <option value="">Status</option>
    <option value="dreaming">Dreaming</option>
    <option value="planning">Planning</option>
    <option value="booked">Booked</option>
    <option value="visited">Visited</option>
  </select>
  <select class="filter-select" id="vibeFilter" onchange="onVibeChange()">
    <option value="">Vibe</option>
  </select>
  <span class="stats-info" id="statsInfo"></span>
</div>

<!-- MAP -->
<div class="map-wrap" id="mapWrap">
  <div class="map-loading-msg" id="mapLoading">Charting routes…</div>
  <svg id="world-map"></svg>

// ── MAP ───────────────────────────────────────────
async function initMap() {
  if (typeof d3 === 'undefined') {
    document.getElementById('mapLoading').textContent = 'Map unavailable — check connection.';
    return;
  }

  const wrap = document.getElementById('mapWrap');
  const W = wrap.clientWidth  || 960;
  const H = wrap.clientHeight || 540;

  const svg = d3.select('#world-map')
    .attr('viewBox', `0 0 ${W} ${H}`)
    .attr('preserveAspectRatio', 'xMidYMid meet');

  mapSvg = svg;

  // mapG: zoom-transformed (land, routes scale with map)
  mapG = svg.append('g').attr('class', 'map-g');

  mapProjection = d3.geoNaturalEarth1()
    .scale(W / 6.28)
    .translate([W / 2, H / 2 + H * 0.04]);

  const path = d3.geoPath().projection(mapProjection);

  // pinLayer: NOT zoom-transformed — pins stay the same screen size (Leaflet feel)
  pinLayer = svg.append('g').attr('class', 'pin-layer');

  // Zoom — halved wheel sensitivity, drag to pan when zoomed in
  zoomBehavior = d3.zoom()
    .scaleExtent([1, 10])
    .translateExtent([[-W * 0.4, -H * 0.4], [W * 1.4, H * 1.4]])
    .wheelDelta(e => -e.deltaY * (e.deltaMode === 1 ? 0.05 : e.deltaMode ? 1 : 0.001))
    .filter(event => {
      // Allow wheel zoom, double-click zoom, and drag-to-pan (mouse + touch)
      // Block right-click and ctrl+drag (native browser zoom gesture)
      if (event.type === 'wheel') return true;
      if (event.type === 'dblclick') return true;
      if (event.button === 2) return false; // right-click
      if (event.ctrlKey && event.type === 'mousedown') return false;
      return event.type === 'mousedown' || event.type === 'mousemove' ||
             event.type === 'touchstart' || event.type === 'touchmove';
    })
    .on('zoom', ({ transform }) => {
      const { k, x, y } = transform;
      mapG.attr('transform', transform);
      // Reposition each pin in screen space so it stays fixed size
      pinLayer.selectAll('[data-px]').each(function() {
        const px = +this.getAttribute('data-px');
        const py = +this.getAttribute('data-py');
        d3.select(this).attr('transform', `translate(${px * k + x},${py * k + y})`);
      });
      // Gate destination label visibility
      pinLayer.selectAll('.pin-label').each(function() {
        const minZ = +this.getAttribute('data-min-zoom') || 1;
        d3.select(this).style('opacity', k >= minZ ? 0.85 : 0);
      });
      // Gate world label visibility (inside mapG, so font scales with zoom)
      mapG.selectAll('.world-label').each(function() {
        const minZ = +this.getAttribute('data-min-zoom') || 2;
        d3.select(this).style('opacity', k >= minZ ? 0.22 : 0);
      });
    });
  svg.call(zoomBehavior);

  // Atmosphere glow behind sphere
  mapG.append('path')
    .datum({ type: 'Sphere' })
    .attr('class', 'sphere-atmo')
    .attr('d', path);

  // Sphere background
  mapG.append('path')
    .datum({ type: 'Sphere' })
    .attr('class', 'sphere')
    .attr('d', path);

  // Graticule
  mapG.append('path')
    .datum(d3.geoGraticule().step([30, 30])())
    .attr('class', 'graticule')
    .attr('d', path);

  // Load world topology
  let world;
  try {
    world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2.0.2/countries-110m.json');
  } catch(e) {
    document.getElementById('mapLoading').textContent = 'Could not load map data.';
    return;
  }

  document.getElementById('mapLoading').style.display = 'none';
  // (initMap is async so it already returns a Promise)

  const features = topojson.feature(world, world.objects.countries).features;

  // Countries
  mapG.append('g').selectAll('path')
    .data(features)
    .join('path')
    .attr('class', d => ISO_MAP[d.id] ? 'land destination' : 'land')
    .attr('d', path)
    .on('click', (event, d) => {
      const name = ISO_MAP[d.id];
      if (!name) return;
      const c = allCountries.find(x => x.name === name);
      if (c) openPanel(c.id);
    });

  // World country labels — inside mapG so they scale with zoom
  const destNames = new Set(Object.values(ISO_MAP));
  const worldLabelG = mapG.append('g');
  features.forEach(feat => {
    const name = ALL_ISO_NAMES[+feat.id];
    if (!name || destNames.has(name)) return;
    const c = path.centroid(feat);
    if (!c || isNaN(c[0]) || isNaN(c[1])) return;
    const area = d3.geoArea(feat);
    const minZ = area > 0.1 ? 2.0 : area > 0.03 ? 2.8 : area > 0.008 ? 3.8 : area > 0.002 ? 5.0 : 7.0;
    worldLabelG.append('text')
      .attr('class', 'world-label')
      .attr('x', c[0]).attr('y', c[1])
      .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
      .attr('data-min-zoom', minZ)
      .style('opacity', 0)
      .text(name.toUpperCase());
  });

  // NYC origin marker — in pinLayer so it stays fixed size
  const [nx, ny] = mapProjection(NYC);
  const nycG = pinLayer.append('g')
    .attr('class', 'nyc-marker')
    .attr('transform', `translate(${nx},${ny})`)
    .attr('data-px', nx).attr('data-py', ny);
  nycG.append('polygon')
    .attr('points', '0,-6 5,0 0,6 -5,0')
    .attr('fill', 'none').attr('stroke', 'var(--gold)').attr('stroke-width', 1.5);
  nycG.append('polygon')
    .attr('points', '0,-3 2.5,0 0,3 -2.5,0')
    .attr('fill', 'var(--gold)');
  nycG.append('text').attr('class', 'nyc-label').attr('dx', 9).attr('dy', 3).text('JFK');

  // Routes in mapG (scale with map), pins in pinLayer (fixed screen size)
  drawAll(mapG, pinLayer, nx, ny);
}

function drawAll(routeLayer, pins, nx, ny) {
  const routeG = routeLayer.append('g');
  const pinG   = pins;

  allCountries.forEach((c, i) => {
    const lnglat = COORDS[c.name];
    if (!lnglat) return;

    const [px, py] = mapProjection(lnglat);
    const delay    = 300 + i * 160;   // ms before path starts
    const pathDur  = 900;             // ms path takes to draw

    // ── Arc control point ──────────────────────────
    const dist = Math.hypot(px - nx, py - ny);
    const cpx  = (nx + px) / 2;
    const cpy  = (ny + py) / 2 - Math.min(dist * 0.38, 140);
    const d    = `M ${nx} ${ny} Q ${cpx} ${cpy} ${px} ${py}`;

    // ── Flight path ────────────────────────────────
    const line = routeG.append('path')
      .attr('class', `flight-path fp-${c.region}`)
      .attr('id', `fp-${c.id}`)
      .attr('d', d)
      .attr('data-id', c.id)
      .attr('data-region', c.region)
      .style('opacity', 0)
      .style('stroke-dasharray', 2000)
      .style('stroke-dashoffset', 2000);

    // Correct dasharray after element exists in DOM
    requestAnimationFrame(() => {
      const len = line.node().getTotalLength();
      line.style('stroke-dasharray', len).style('stroke-dashoffset', len);
    });

    setTimeout(() => {
      line.style('transition', `opacity 0.4s, stroke-dashoffset ${pathDur}ms cubic-bezier(0.4,0,0.55,1)`)
          .style('opacity', 0.38)
          .style('stroke-dashoffset', 0);
    }, delay);

    // ── Pin ───────────────────────────────────────
    setTimeout(() => {
      const pg = pinG.append('g')
        .attr('class', `pin-group rc-${c.region}`)
        .attr('transform', `translate(${px},${py})`)
        .attr('data-id', c.id)
        .attr('data-region', c.region)
        .attr('data-status', c.status)
        .attr('data-px', px)
        .attr('data-py', py)
        .style('opacity', 0)
        .on('click', () => openPanel(c.id));

      pg.append('circle').attr('r', 10)
        .attr('fill', 'none')
        .attr('stroke', `var(--${c.region})`)
        .attr('stroke-width', 1)
        .attr('opacity', 0.2)
        .style('animation', `pinPulse 2.8s ${Math.random()*2}s ease-in-out infinite`);
      pg.append('circle').attr('class', 'pin-ring').attr('r', 5.5)
        .attr('fill', 'none').attr('stroke', `var(--${c.region})`).attr('stroke-width', 1.5);
      pg.append('circle').attr('class', 'pin-dot').attr('r', 2.8)
        .attr('fill', `var(--${c.region})`);

      // Saved dot (gold, top-right of pin)
      pg.append('circle').attr('class', `pin-saved-dot ${savedIds.has(c.id) ? 'visible' : ''}`)
        .attr('cx', 5).attr('cy', -5).attr('r', 2.5);

      // Label — positioned per LABEL_OPTS, hidden until minZoom reached
      const isEast = lnglat[0] > -30;
      const lo = LABEL_OPTS[c.name];
      const ldx    = lo ? lo[0] : (isEast ? 9 : -9);
      const ldy    = lo ? lo[1] : 3.5;
      const anchor = lo ? lo[2] : (isEast ? 'start' : 'end');
      const minZ   = lo ? lo[3] : 1.6;
      pg.append('text').attr('class', 'pin-label')
        .attr('dx', ldx).attr('dy', ldy)
        .attr('text-anchor', anchor)
        .attr('data-min-zoom', minZ)
        .style('opacity', minZ <= 1 ? 0.85 : 0)
        .text(c.name.toUpperCase());

      // Fade in
      pg.transition().duration(350).style('opacity', 1);


    }, delay + pathDur + 80);
  });
}

// Pulse keyframe injected once
const style = document.createElement('style');
style.textContent = `
@keyframes pinPulse {
  0%, 100% { r: 8;  opacity: 0.15; }
  50%       { r: 13; opacity: 0.05; }
}`;
document.head.appendChild(style);

// ── PANEL ─────────────────────────────────────────
function openPanel(id) {
  const c = allCountries.find(x => x.id === id);
  if (!c) return;
  currentId = id;

  const rl     = REGIONS[c.region] || c.region;
  const saved  = savedIds.has(id);
  const lang   = c.language.split(',')[0].split('(')[0].trim();
  const vibes  = (c.vibe_tags||[]).map(v => `<span class="vibe-chip">${esc(v)}</span>`).join('');
  const budget = c.budget || '';
  const days   = c.ideal_days ? `${c.ideal_days} days` : '';

  const cities = (c.cities||[]).map(x => `
    <div><div class="place-name">${esc(x.name)}</div>
    <div class="place-notes">${esc(x.notes)}</div></div>`).join('');

  const food = (c.food||[]).map(x => `
    <div><div class="food-name">${esc(x.name)}</div>
    <div class="food-notes">${esc(x.notes)}</div></div>`).join('');

  const tips = (c.tips||[]).map(t => `<div class="tip">${esc(t)}</div>`).join('');

  // Nav position
  const idx = allCountries.findIndex(x => x.id === id);
  document.getElementById('panelNavPos').textContent = `${idx + 1} / ${allCountries.length}`;

  document.getElementById('panelInner').innerHTML = `
    <div class="rc-${c.region}">
      ${c.photo ? `<div class="panel-photo"><img src="${esc(c.photo)}" alt="${esc(c.name)}" loading="lazy" onerror="this.parentElement.style.display='none'"></div>` : ''}
      <div class="panel-accent"></div>
      <div class="panel-pass-head">
        <div class="panel-meta">${esc(rl)} &middot; ${flightNo(c.id)}</div>
        <div class="panel-country">${esc(c.name)}</div>
        <div class="panel-tagline">"${esc(c.tagline)}"</div>
      </div>
      <div class="panel-tear"></div>
      <div class="panel-fields">
        <div class="panel-field">
          <div class="panel-field-label">◷ Best Time</div>
          <div class="panel-field-value">${esc(c.best_time)}</div>
        </div>
        ${budget ? `<div class="panel-field">
          <div class="panel-field-label">◈ Budget</div>
          <div class="panel-field-value">${esc(budget)}</div>
        </div>` : ''}
        ${days ? `<div class="panel-field">
          <div class="panel-field-label">⊞ Duration</div>
          <div class="panel-field-value">${esc(days)}</div>
        </div>` : ''}
        <div class="panel-field">
          <div class="panel-field-label">⊕ Language</div>
          <div class="panel-field-value">${esc(lang)}</div>
        </div>
        <div class="panel-field">
          <div class="panel-field-label">$ Currency</div>
          <div class="panel-field-value">${esc(c.currency||'—')}</div>
        </div>
        ${vibes ? `<div class="panel-field" style="width:100%">
          <div class="panel-field-label">✦ Vibe</div>
          <div class="vibe-chips">${vibes}</div>
        </div>` : ''}
      </div>
      <div class="panel-tabs">
        <button class="panel-tab-btn active" onclick="switchTab('tab-overview',this)">Overview</button>
        ${cities ? `<button class="panel-tab-btn" onclick="switchTab('tab-cities',this)">Cities</button>` : ''}
        ${food   ? `<button class="panel-tab-btn" onclick="switchTab('tab-food',this)">Food</button>` : ''}
        ${tips   ? `<button class="panel-tab-btn" onclick="switchTab('tab-tips',this)">Tips</button>` : ''}
      </div>
      <div id="tab-overview" class="panel-tab-content">
        <div class="panel-section-text">${esc(c.description)}</div>
        <div style="height:8px"></div>
      </div>
      ${cities ? `<div id="tab-cities" class="panel-tab-content" style="display:none">
        <div class="place-list">${cities}</div>
        <div style="height:8px"></div>
      </div>` : ''}
      ${food ? `<div id="tab-food" class="panel-tab-content" style="display:none">
        <div class="food-list">${food}</div>
        <div style="height:8px"></div>
      </div>` : ''}
      ${tips ? `<div id="tab-tips" class="panel-tab-content" style="display:none">
        <div class="tips-list">${tips}</div>
        <div style="height:8px"></div>
      </div>` : ''}
    </div>`;

  setWishlistBtn(saved);
  document.getElementById('sidePanel').classList.add('open');
  document.getElementById('overlay').classList.add('visible');
  document.getElementById('panelInner').scrollTop = 0;

  // URL hash
  history.replaceState(null, '', '#' + c.name.toLowerCase().replace(/\s+/g, '-'));

  // Highlight active pin + path
  setActivePin(id);

  // Zoom map to destination
  zoomToCountry(c.name);
}

function closePanel() {
  document.getElementById('sidePanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
  if (mapSvg) {
    mapSvg.selectAll('.pin-group').classed('active', false);
    mapSvg.selectAll('.flight-path').classed('active', false);
    mapSvg.transition().duration(600).call(zoomBehavior.transform, d3.zoomIdentity);
  }
  history.replaceState(null, '', location.pathname);
  currentId = null;
}

function navigatePanel(dir) {
  if (currentId === null) return;
  const idx  = allCountries.findIndex(x => x.id === currentId);
  const next = allCountries[(idx + dir + allCountries.length) % allCountries.length];
  openPanel(next.id);
}

function setActivePin(id) {
  if (!mapSvg) return;
  mapSvg.selectAll('.pin-group').classed('active', function() {
    return +this.getAttribute('data-id') === id;
  });
  mapSvg.selectAll('.flight-path').classed('active', function() {
    return +this.getAttribute('data-id') === id;
  });
}

function zoomToCountry(name) {
  if (!mapSvg || !mapProjection || !zoomBehavior) return;
  const lnglat = COORDS[name];
  if (!lnglat) return;
  const [px, py] = mapProjection(lnglat);
  const vb = mapSvg.attr('viewBox').split(' ').map(Number);
  const W = vb[2], H = vb[3];
  const k = Math.max(2, d3.zoomTransform(mapSvg.node()).k);
  const tx = (W - 640) / 2 - px * k;
  const ty = H / 2 - py * k;
  mapSvg.transition().duration(700)
    .call(zoomBehavior.transform, d3.zoomIdentity.translate(tx, ty).scale(k));
}

function updateStats() {
  const el = document.getElementById('statsInfo');
  if (!el) return;
  el.textContent = `${allCountries.length} destinations`;
}

function setWishlistBtn(saved) {
  const btn = document.getElementById('wishlistBtn');
  document.getElementById('wishlistHeart').textContent = saved ? '♥' : '♡';
  document.getElementById('wishlistLabel').textContent  = saved ? 'Saved' : 'Save to Wishlist';
  btn.className = 'wishlist-btn' + (saved ? ' saved' : '');
}

function toggleWishlist() {
  if (currentId === null) return;
  savedIds.has(currentId) ? savedIds.delete(currentId) : savedIds.add(currentId);
  savePersist(); updateBadge();
  setWishlistBtn(savedIds.has(currentId));
  // Update saved dot on pin
  if (mapSvg) {
    mapSvg.selectAll('.pin-group').each(function() {
      if (+this.getAttribute('data-id') === currentId) {
        d3.select(this).select('.pin-saved-dot')
          .classed('visible', savedIds.has(currentId));
      }
    });
  }
}

// ── ZOOM CONTROLS ─────────────────────────────────
function mapZoomIn()    { mapSvg && mapSvg.transition().duration(320).call(zoomBehavior.scaleBy, 2); }
function mapZoomOut()   { mapSvg && mapSvg.transition().duration(320).call(zoomBehavior.scaleBy, 0.5); }
function mapZoomReset() { mapSvg && mapSvg.transition().duration(500).call(zoomBehavior.transform, d3.zoomIdentity); }

// ── FILTERS ───────────────────────────────────────
function applyFilters() {
  if (!mapSvg) return;
  const q = document.getElementById('searchInput').value.trim().toLowerCase();

  mapSvg.selectAll('.pin-group').each(function() {
    const id = +this.getAttribute('data-id');
    const c  = allCountries.find(x => x.id === id);
    d3.select(this).transition().duration(180)
      .style('opacity', c && matchesFilter(c, q) ? 1 : 0.12);
  });

  mapSvg.selectAll('.flight-path').each(function() {
    const id = +this.getAttribute('data-id');
    const c  = allCountries.find(x => x.id === id);
    // Only dim paths that have already been animated (dashoffset = 0)
    if (this.style.strokeDashoffset !== '' && parseFloat(this.style.strokeDashoffset) < 5) {
      d3.select(this).style('opacity', c && matchesFilter(c, q) ? 0.38 : 0.06);
    }
  });
}

function matchesFilter(c, q) {
  if (activeRegion !== 'all' && c.region !== activeRegion) return false;
  if (showingSaved && !savedIds.has(c.id)) return false;
  if (activeStatus && c.status !== activeStatus) return false;
  if (activeMonth) {
    const months = BEST_MONTHS[c.name] || [];
    if (!months.includes(+activeMonth)) return false;
  }
  if (activeVibe && !(c.vibe_tags||[]).includes(activeVibe)) return false;
  if (q) {
    const hay = [c.name, c.tagline, ...(c.vibe_tags||[])].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function onMonthChange() {
  activeMonth = document.getElementById('monthFilter').value;
  document.getElementById('monthFilter').classList.toggle('active', !!activeMonth);
  applyFilters();
}

function onVibeChange() {
  activeVibe = document.getElementById('vibeFilter').value;
  document.getElementById('vibeFilter').classList.toggle('active', !!activeVibe);
  applyFilters();
}

function onStatusChange() {
  activeStatus = document.getElementById('statusFilter').value;
  document.getElementById('statusFilter').classList.toggle('active', !!activeStatus);
  applyFilters();
}

function pickRandom() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const pool = allCountries.filter(c => matchesFilter(c, q));
  if (!pool.length) return;
  // Avoid re-picking the same country if there are options
  const choices = pool.length > 1 ? pool.filter(c => c.id !== currentId) : pool;
  const pick = choices[Math.floor(Math.random() * choices.length)];
  openPanel(pick.id);
}

function switchTab(id, btn) {
  document.querySelectorAll('#panelInner .panel-tab-content').forEach(el => el.style.display = 'none');
  document.querySelectorAll('#panelInner .panel-tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(id).style.display = '';
  btn.classList.add('active');
}

function toggleSavedFilter() {
  showingSaved = !showingSaved;
  document.getElementById('savedBtn').classList.toggle('active', showingSaved);
  applyFilters();
}

// ── KEYBOARD ──────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closePanel(); return; }
  if (currentId !== null) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigatePanel(1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigatePanel(-1);
  }
});

// ── EVENT LISTENERS ────────────────────────────────
document.querySelectorAll('.filter-pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.filter-pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    activeRegion = p.dataset.region;
    applyFilters();
  });
});

let _st;
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(_st);
  _st = setTimeout(applyFilters, 150);
});

// ── BOOT ──────────────────────────────────────────
fetch('data/countries.json')
  .then(r => r.json())
  .then(async data => {
    allCountries = data;
    updateBadge();
    updateStats();
    // Populate vibe dropdown — top 10 vibes by frequency
    const TOP_VIBES = ['food culture','nature','history','architecture','hiking','city energy','ancient history','beaches','street food','mountains'];
    const vibeEl = document.getElementById('vibeFilter');
    TOP_VIBES.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v; opt.textContent = v;
      vibeEl.appendChild(opt);
    });
    await initMap();
    // Hash routing — open panel if URL has a destination slug
    if (location.hash) {
      const slug = location.hash.replace('#', '').toLowerCase();
      const match = allCountries.find(c => c.name.toLowerCase().replace(/\s+/g, '-') === slug);
      if (match) openPanel(match.id);
    }
  })
  .catch(() => {
    document.getElementById('mapLoading').textContent = 'Could not load destinations.';
  });

updateBadge();
</script>
