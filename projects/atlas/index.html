<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Departure Lounge</title>
<meta name="description" content="A travel bucket list — 17 destinations, boarding passes not yet stamped.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garant:ital,wght@1,600&family=Special+Elite&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Geist Mono';
  font-style: normal; font-display: swap; font-weight: 100 900;
  src: url(https://cdn.jsdelivr.net/fontsource/fonts/geist-mono:vf@latest/latin-wght-normal.woff2) format('woff2-variations');
}

/* ══ PALETTE ══ */
:root {
  --bg:       #1a1410;
  --bg-2:     #221c16;
  --surface:  #2a211a;
  --surface-2:#332820;
  --border:   #3d3028;
  --border-2: #4d3c30;
  --text-1:   #f0e8d8;
  --text-2:   #c8b89a;
  --text-3:   #8a7860;
  --text-4:   #5a4838;
  --stamp:    #c8a040;    /* gold stamp ink */
  --stamp-bg: rgba(200,160,64,0.08);
  --punch:    #1a1410;    /* hole punch color = bg */

  --asia:     #d4603a;
  --europe:   #4a80d0;
  --americas: #48a868;
  --africa:   #d09030;
  --oceania:  #38b0a8;
}

:root[data-theme="light"] {
  --bg:       #f5f0e6;
  --bg-2:     #ede6d8;
  --surface:  #faf6ee;
  --surface-2:#f0e8d8;
  --border:   #d8cdb8;
  --border-2: #c4b8a0;
  --text-1:   #1a1410;
  --text-2:   #3a3020;
  --text-3:   #7a6a50;
  --text-4:   #aaa090;
  --stamp:    #b06020;
  --stamp-bg: rgba(176,96,32,0.07);
  --punch:    #f5f0e6;
  --asia:     #c04828;
  --europe:   #2a60b0;
  --americas: #287848;
  --africa:   #b07020;
  --oceania:  #188898;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Geist Mono', monospace;
  background: var(--bg);
  color: var(--text-2);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}

/* ══ TOPBAR ══ */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 24px; height: 46px; gap: 16px;
}
.back-link {
  font-size: 0.65rem; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-3); text-decoration: none; transition: color 0.2s; flex-shrink: 0;
}
.back-link:hover { color: var(--stamp); }
.topbar-brand {
  flex: 1; text-align: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem; letter-spacing: 4px; color: var(--text-1);
  text-transform: uppercase;
}
.topbar-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.saved-btn {
  font-size: 0.6rem; letter-spacing: 1px; text-transform: uppercase;
  color: var(--text-3); background: none;
  border: 1px solid var(--border); border-radius: 20px;
  padding: 3px 10px; cursor: pointer; transition: all 0.2s;
}
.saved-btn:hover, .saved-btn.active { color: var(--stamp); border-color: var(--stamp); background: var(--stamp-bg); }
.theme-btn {
  font-size: 0.85rem; background: none; border: none;
  cursor: pointer; color: var(--text-3); transition: color 0.2s; padding: 4px;
}
.theme-btn:hover { color: var(--text-1); }

/* ══ PAGE HEADER ══ */
.page-header {
  max-width: 900px; margin: 0 auto;
  padding: 52px 24px 20px;
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 24px; flex-wrap: wrap;
}
.header-left {}
.header-eyebrow {
  font-size: 0.58rem; letter-spacing: 3px; text-transform: uppercase;
  color: var(--text-4); margin-bottom: 6px;
}
.header-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3rem, 8vw, 5.5rem);
  letter-spacing: 6px; text-transform: uppercase;
  color: var(--text-1); line-height: 0.9;
}
.header-sub {
  font-size: 0.72rem; color: var(--text-3); letter-spacing: 1px;
  margin-top: 10px;
}
.header-stamp {
  flex-shrink: 0; width: 80px; height: 80px;
  border: 3px solid var(--stamp); border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  opacity: 0.55; transform: rotate(-12deg);
  color: var(--stamp);
}
.stamp-main { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 2px; }
.stamp-sub  { font-size: 0.42rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 1px; }

/* ══ FILTERS ══ */
.filters-wrap {
  position: sticky; top: 46px; z-index: 90;
  background: var(--bg); border-bottom: 1px solid var(--border);
  padding: 10px 24px;
}
.filters-inner {
  max-width: 900px; margin: 0 auto;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.filter-pill {
  font-size: 0.58rem; letter-spacing: 1.2px; text-transform: uppercase;
  border: 1px solid var(--border); border-radius: 2px;
  padding: 4px 10px; background: none; cursor: pointer;
  color: var(--text-3); transition: all 0.18s;
}
.filter-pill:hover { color: var(--text-1); border-color: var(--border-2); }
.filter-pill.active { color: var(--text-1); border-color: var(--text-3); background: var(--surface-2); }
.filter-pill[data-region="asia"].active    { color: var(--asia);     border-color: var(--asia); }
.filter-pill[data-region="europe"].active  { color: var(--europe);   border-color: var(--europe); }
.filter-pill[data-region="americas"].active{ color: var(--americas); border-color: var(--americas); }
.filter-pill[data-region="africa"].active  { color: var(--africa);   border-color: var(--africa); }
.filter-pill[data-region="oceania"].active { color: var(--oceania);  border-color: var(--oceania); }
.filter-sep { width: 1px; height: 16px; background: var(--border); flex-shrink: 0; }
.search-input {
  flex: 1; min-width: 140px;
  padding: 5px 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 2px; color: var(--text-1); font-size: 0.7rem;
  font-family: 'Geist Mono', monospace; letter-spacing: 0.5px;
}
.search-input:focus { outline: none; border-color: var(--border-2); }
.search-input::placeholder { color: var(--text-4); }

/* ══ RESULT COUNT ══ */
.result-count {
  max-width: 900px; margin: 0 auto;
  padding: 10px 24px 4px;
  font-size: 0.58rem; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-4);
}

/* ══ BOARDING PASS STACK ══ */
.pass-stack {
  max-width: 900px; margin: 0 auto;
  padding: 8px 24px 64px;
  display: flex; flex-direction: column; gap: 12px;
}

/* ══ THE BOARDING PASS ══ */
.boarding-pass {
  display: flex; align-items: stretch;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.18s, box-shadow 0.18s, transform 0.15s;
  overflow: hidden;
  position: relative;
  animation: passIn 0.3s ease both;
}
.boarding-pass:hover {
  background: var(--surface-2);
  box-shadow: 0 4px 24px rgba(0,0,0,0.35);
  transform: translateY(-1px);
}
@keyframes passIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Color stripe on left */
.pass-stripe {
  width: 5px; flex-shrink: 0;
  background: var(--region-color, var(--border));
}

/* Main body */
.pass-body {
  flex: 1; display: flex; align-items: stretch;
  min-width: 0;
}

/* Left section — destination */
.pass-dest {
  flex: 1; padding: 20px 24px;
  display: flex; flex-direction: column; justify-content: space-between;
  gap: 10px; min-width: 0;
}
.pass-from-to {
  display: flex; align-items: center; gap: 10px;
  font-size: 0.55rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-4);
}
.pass-from-to .arrow { color: var(--region-color, var(--text-4)); font-size: 0.9rem; }
.pass-country {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2rem, 5vw, 3.2rem);
  letter-spacing: 4px; text-transform: uppercase;
  color: var(--text-1); line-height: 1;
}
.pass-tagline {
  font-size: 0.72rem; color: var(--text-3);
  line-height: 1.55; font-style: italic;
  font-family: 'Cormorant Garant', Georgia, serif;
  max-width: 420px;
}
.pass-tags {
  display: flex; flex-wrap: wrap; gap: 5px;
}
.pass-tag {
  font-size: 0.5rem; letter-spacing: 1px; text-transform: uppercase;
  color: var(--text-4); border: 1px solid var(--border);
  border-radius: 2px; padding: 2px 6px;
}

/* Tear line */
.pass-tear {
  width: 1px; flex-shrink: 0; position: relative;
  margin: 12px 0;
  background: repeating-linear-gradient(
    to bottom,
    var(--border) 0px, var(--border) 6px,
    transparent 6px, transparent 10px
  );
}
.pass-tear::before,
.pass-tear::after {
  content: '';
  position: absolute; left: 50%; transform: translateX(-50%);
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--bg);
  border: 1px solid var(--border);
}
.pass-tear::before { top: -7px; }
.pass-tear::after  { bottom: -7px; }

/* Right stub */
.pass-stub {
  width: 180px; flex-shrink: 0;
  padding: 18px 20px;
  display: flex; flex-direction: column; gap: 12px;
  justify-content: space-between;
}
.stub-field { display: flex; flex-direction: column; gap: 3px; }
.stub-label {
  font-size: 0.5rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-4);
}
.stub-value {
  font-size: 0.72rem; color: var(--text-1);
  letter-spacing: 0.3px;
}
.stub-status {
  font-size: 0.55rem; letter-spacing: 1px; text-transform: uppercase;
  padding: 3px 8px; border-radius: 2px; border: 1px solid var(--border);
  color: var(--text-3); background: var(--surface);
  display: inline-block; width: fit-content;
}
.stub-status.planning { color: var(--stamp); border-color: var(--stamp); background: var(--stamp-bg); }
.stub-status.visited  { color: var(--americas); border-color: var(--americas); }
.stub-heart {
  background: none; border: none; cursor: pointer;
  font-size: 1.1rem; color: var(--text-4);
  transition: color 0.2s, transform 0.15s; padding: 0; align-self: flex-end;
}
.stub-heart:hover { color: var(--text-2); }
.stub-heart.saved { color: var(--stamp); transform: scale(1.1); }

/* Region color helpers */
.rc-asia     { --region-color: var(--asia); }
.rc-europe   { --region-color: var(--europe); }
.rc-americas { --region-color: var(--americas); }
.rc-africa   { --region-color: var(--africa); }
.rc-oceania  { --region-color: var(--oceania); }

/* ══ EMPTY STATE ══ */
.empty-state {
  text-align: center; padding: 64px 24px;
  color: var(--text-4); font-size: 0.68rem; letter-spacing: 1.5px;
}

/* ══ DETAIL VIEW ══ */
#view-detail { display: none; }
.detail-wrap { max-width: 900px; margin: 0 auto; padding: 32px 24px 80px; }

.detail-back {
  font-size: 0.62rem; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-3); background: none; border: none;
  cursor: pointer; transition: color 0.2s; padding: 0; margin-bottom: 36px; display: block;
}
.detail-back:hover { color: var(--stamp); }

/* Detail boarding pass header */
.detail-pass {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px; overflow: hidden;
  margin-bottom: 32px;
  display: flex; align-items: stretch;
}
.detail-pass-stripe {
  width: 8px; flex-shrink: 0;
  background: var(--region-color, var(--border));
}
.detail-pass-body {
  flex: 1; padding: 28px 32px;
  display: flex; flex-direction: column; gap: 8px;
}
.detail-region {
  font-size: 0.58rem; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--region-color, var(--text-4));
}
.detail-country {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.8rem, 8vw, 5rem);
  letter-spacing: 5px; color: var(--text-1); line-height: 0.95;
}
.detail-tagline {
  font-family: 'Cormorant Garant', Georgia, serif;
  font-size: 1.05rem; font-style: italic;
  color: var(--text-3); line-height: 1.6; margin-top: 4px;
}
.detail-pass-stub {
  width: 200px; flex-shrink: 0;
  border-left: repeating-linear-gradient(
    to bottom, var(--border) 0 6px, transparent 6px 10px
  ) 1px 0 / 1px 100% no-repeat;
  padding: 28px 24px;
  display: flex; flex-direction: column; gap: 14px; justify-content: space-between;
  border-left: none; position: relative;
}
.detail-pass-stub::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 1px;
  background: repeating-linear-gradient(
    to bottom, var(--border) 0px, var(--border) 6px, transparent 6px, transparent 10px
  );
}
.detail-pass-stub::after {
  content: ''; position: absolute; left: 0; top: -7px;
  transform: translateX(-50%);
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--bg); border: 1px solid var(--border);
}
.detail-stub-field { display: flex; flex-direction: column; gap: 3px; }
.detail-stub-label {
  font-size: 0.48rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-4);
}
.detail-stub-value { font-size: 0.75rem; color: var(--text-1); }
.detail-stub-heart {
  width: 100%; padding: 9px;
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 3px;
  font-size: 0.6rem; letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--text-2); cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.detail-stub-heart:hover { border-color: var(--stamp); color: var(--stamp); background: var(--stamp-bg); }
.detail-stub-heart.saved { border-color: var(--stamp); color: var(--stamp); background: var(--stamp-bg); }

/* Detail content sections */
.detail-sections {
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
}
@media (max-width: 660px) { .detail-sections { grid-template-columns: 1fr; } }
.detail-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; padding: 22px 24px;
}
.detail-section.full { grid-column: 1 / -1; }
.section-label {
  font-size: 0.5rem; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--text-4); margin-bottom: 16px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.section-text { font-size: 0.82rem; color: var(--text-2); line-height: 1.85; }

.place-list { display: flex; flex-direction: column; gap: 13px; }
.place-item {}
.place-name {
  font-size: 0.78rem; font-weight: 600; color: var(--text-1);
  display: flex; align-items: center; gap: 8px; margin-bottom: 3px;
}
.place-name::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--region-color, var(--border)); flex-shrink: 0;
}
.place-notes { font-size: 0.75rem; color: var(--text-3); line-height: 1.65; padding-left: 14px; }

.food-grid { display: flex; flex-direction: column; gap: 11px; }
.food-item {}
.food-name {
  font-size: 0.78rem; font-weight: 600; color: var(--text-1);
  display: flex; align-items: center; gap: 8px; margin-bottom: 3px;
}
.food-name::before {
  content: ''; width: 5px; height: 5px; border-radius: 1px;
  background: var(--region-color, var(--border)); flex-shrink: 0;
}
.food-notes { font-size: 0.75rem; color: var(--text-3); line-height: 1.65; padding-left: 13px; }

.tips-list { display: flex; flex-direction: column; gap: 10px; }
.tip { font-size: 0.78rem; color: var(--text-2); line-height: 1.7; display: flex; gap: 10px; }
.tip::before { content: '—'; color: var(--text-4); flex-shrink: 0; }

/* ══ MOBILE ══ */
@media (max-width: 600px) {
  .pass-stub { width: 130px; padding: 14px; }
  .pass-dest { padding: 14px 16px; }
  .pass-country { font-size: 2rem; }
  .page-header { padding: 28px 16px 12px; }
  .header-stamp { display: none; }
  .pass-stack { padding: 8px 14px 48px; }
  .filters-wrap { padding: 10px 14px; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a href="../../index.html#lab" class="back-link">← Portfolio</a>
  <div class="topbar-brand">Departure Lounge</div>
  <div class="topbar-right">
    <button class="saved-btn" id="savedBtn" onclick="toggleSavedFilter()">
      ♥ <span id="savedCount">0</span>
    </button>
    <button class="theme-btn" onclick="toggleTheme()">◐</button>
  </div>
</div>

<!-- CATALOG VIEW -->
<div id="view-catalog">

  <div class="page-header">
    <div class="header-left">
      <div class="header-eyebrow">Travel Bucket List</div>
      <div class="header-title">Departure<br>Lounge</div>
      <div class="header-sub">17 destinations · boarding passes not yet stamped</div>
    </div>
    <div class="header-stamp">
      <div class="stamp-main">NEXT</div>
      <div class="stamp-sub">Destination</div>
      <div class="stamp-main" style="font-size:0.6rem;margin-top:2px;letter-spacing:1px">UNKNOWN</div>
    </div>
  </div>

  <div class="filters-wrap">
    <div class="filters-inner">
      <button class="filter-pill active" data-region="all">All</button>
      <button class="filter-pill" data-region="asia">Asia</button>
      <button class="filter-pill" data-region="europe">Europe</button>
      <button class="filter-pill" data-region="americas">Americas</button>
      <button class="filter-pill" data-region="africa">Africa</button>
      <button class="filter-pill" data-region="oceania">Oceania</button>
      <div class="filter-sep"></div>
      <input type="search" class="search-input" id="searchInput" placeholder="Search destinations…">
    </div>
  </div>

  <div class="result-count" id="resultCount"></div>
  <div class="pass-stack" id="passStack"></div>

</div>

<!-- DETAIL VIEW -->
<div id="view-detail">
  <div class="detail-wrap">
    <button class="detail-back" onclick="showCatalog()">← Back to Departure Lounge</button>
    <div id="detailContent"></div>
  </div>
</div>

<script>
const REGION_LABELS = { asia:'Asia', europe:'Europe', americas:'Americas', africa:'Africa', oceania:'Oceania' };
const LS_KEY = 'atlas-wishlist';

let allCountries = [];
let activeRegion = 'all';
let showingSaved = false;
let searchTimer = null;
let savedIds = new Set(JSON.parse(localStorage.getItem(LS_KEY) || '[]'));

function savePersist() { localStorage.setItem(LS_KEY, JSON.stringify([...savedIds])); }
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function slug(n) { return n.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''); }

function applyFilters() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let res = allCountries.filter(c => {
    if (activeRegion !== 'all' && c.region !== activeRegion) return false;
    if (showingSaved && !savedIds.has(c.id)) return false;
    if (q) {
      const hay = [c.name, c.tagline, ...(c.vibe_tags||[]), ...(c.food||[]).map(f=>f.name)].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  renderPasses(res);
  document.getElementById('resultCount').textContent =
    res.length + ' boarding pass' + (res.length === 1 ? '' : 'es');
}

function renderPasses(list) {
  const stack = document.getElementById('passStack');
  if (!list.length) {
    stack.innerHTML = '<div class="empty-state">No destinations match.</div>';
    return;
  }
  stack.innerHTML = list.map((c, i) => {
    const saved = savedIds.has(c.id);
    const tags = (c.vibe_tags||[]).slice(0,4).map(t=>`<span class="pass-tag">${esc(t)}</span>`).join('');
    return `
    <div class="boarding-pass rc-${c.region}" style="animation-delay:${i*0.04}s"
         onclick="handleClick(event,${c.id})">
      <div class="pass-stripe"></div>
      <div class="pass-body">
        <div class="pass-dest">
          <div class="pass-from-to">
            <span>NYC</span>
            <span class="arrow">→</span>
            <span>${esc(c.code)}</span>
            <span style="margin-left:8px;color:var(--text-4)">${esc(REGION_LABELS[c.region]||'')}</span>
          </div>
          <div class="pass-country">${esc(c.name)}</div>
          <div class="pass-tagline">${esc(c.tagline)}</div>
          ${tags ? `<div class="pass-tags">${tags}</div>` : ''}
        </div>
        <div class="pass-tear"></div>
        <div class="pass-stub">
          <div class="stub-field">
            <div class="stub-label">Season</div>
            <div class="stub-value">${esc(c.best_time.split(',')[0])}</div>
          </div>
          <div class="stub-field">
            <div class="stub-label">Language</div>
            <div class="stub-value">${esc(c.language.split(',')[0].split('(')[0].trim())}</div>
          </div>
          <div class="stub-field">
            <div class="stub-label">Status</div>
            <div class="stub-value">
              <span class="stub-status ${c.status}">${esc(c.status)}</span>
            </div>
          </div>
          <button class="stub-heart ${saved?'saved':''}"
                  onclick="toggleSaved(event,${c.id})"
                  aria-label="Wishlist">
            ${saved ? '♥' : '♡'}
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function handleClick(e, id) {
  if (e.target.closest('.stub-heart')) return;
  showDetail(id);
}

function showDetail(id) {
  const c = allCountries.find(x => x.id === id);
  if (!c) return;
  const saved = savedIds.has(c.id);
  const rl = REGION_LABELS[c.region] || c.region;

  const cities = (c.cities||[]).map(x=>`
    <div class="place-item">
      <div class="place-name">${esc(x.name)}</div>
      <div class="place-notes">${esc(x.notes)}</div>
    </div>`).join('');

  const food = (c.food||[]).map(x=>`
    <div class="food-item">
      <div class="food-name">${esc(x.name)}</div>
      <div class="food-notes">${esc(x.notes)}</div>
    </div>`).join('');

  const tips = (c.tips||[]).map(t=>`<div class="tip">${esc(t)}</div>`).join('');

  document.getElementById('detailContent').innerHTML = `
    <div class="rc-${c.region}">
      <div class="detail-pass">
        <div class="detail-pass-stripe"></div>
        <div class="detail-pass-body">
          <div class="detail-region">${esc(rl)} · ${esc(c.code)}</div>
          <div class="detail-country">${esc(c.name)}</div>
          <div class="detail-tagline">"${esc(c.tagline)}"</div>
        </div>
        <div class="detail-pass-stub">
          <div class="detail-stub-field">
            <div class="detail-stub-label">Best Time</div>
            <div class="detail-stub-value">${esc(c.best_time)}</div>
          </div>
          <div class="detail-stub-field">
            <div class="detail-stub-label">Language</div>
            <div class="detail-stub-value">${esc(c.language)}</div>
          </div>
          <div class="detail-stub-field">
            <div class="detail-stub-label">Currency</div>
            <div class="detail-stub-value">${esc(c.currency)}</div>
          </div>
          <div class="detail-stub-field">
            <div class="detail-stub-label">Status</div>
            <div class="detail-stub-value">
              <span class="stub-status ${c.status}">${esc(c.status)}</span>
            </div>
          </div>
          <button class="detail-stub-heart ${saved?'saved':''}" id="detailHeart"
                  onclick="toggleSavedDetail(${c.id})">
            ${saved ? '♥ Saved' : '♡ Save'}
          </button>
        </div>
      </div>

      <div class="detail-sections">
        <div class="detail-section full">
          <div class="section-label">About</div>
          <div class="section-text">${esc(c.description)}</div>
        </div>
        ${cities ? `<div class="detail-section">
          <div class="section-label">Cities to Visit</div>
          <div class="place-list">${cities}</div>
        </div>` : ''}
        ${food ? `<div class="detail-section">
          <div class="section-label">Food to Try</div>
          <div class="food-grid">${food}</div>
        </div>` : ''}
        ${tips ? `<div class="detail-section full">
          <div class="section-label">Tips</div>
          <div class="tips-list">${tips}</div>
        </div>` : ''}
      </div>
    </div>`;

  document.getElementById('view-catalog').style.display = 'none';
  document.getElementById('view-detail').style.display = 'block';
  window.scrollTo(0, 0);
  history.pushState({ view: 'detail', id }, '', '#' + slug(c.name));
}

function showCatalog() {
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('view-catalog').style.display = 'block';
  history.pushState({ view: 'catalog' }, '', location.pathname);
  updateBadge();
}

function toggleSaved(e, id) {
  e.stopPropagation();
  savedIds.has(id) ? savedIds.delete(id) : savedIds.add(id);
  savePersist(); updateBadge(); applyFilters();
}

function toggleSavedDetail(id) {
  savedIds.has(id) ? savedIds.delete(id) : savedIds.add(id);
  savePersist(); updateBadge();
  const btn = document.getElementById('detailHeart');
  if (btn) {
    const s = savedIds.has(id);
    btn.className = 'detail-stub-heart' + (s ? ' saved' : '');
    btn.textContent = s ? '♥ Saved' : '♡ Save';
  }
}

function toggleSavedFilter() {
  showingSaved = !showingSaved;
  document.getElementById('savedBtn').classList.toggle('active', showingSaved);
  applyFilters();
}

function updateBadge() {
  document.getElementById('savedCount').textContent = savedIds.size;
}

function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('atlas-theme', next);
}

// Filter pills
document.querySelectorAll('.filter-pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.filter-pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    activeRegion = p.dataset.region;
    applyFilters();
  });
});

// Search
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilters, 150);
});

// Back/forward
window.addEventListener('popstate', e => {
  if (e.state?.view === 'detail') showDetail(e.state.id);
  else {
    document.getElementById('view-detail').style.display = 'none';
    document.getElementById('view-catalog').style.display = 'block';
  }
});

// Init
const savedTheme = localStorage.getItem('atlas-theme');
if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);

fetch('data/countries.json')
  .then(r => r.json())
  .then(data => {
    allCountries = data;
    updateBadge();
    const hash = location.hash.slice(1);
    if (hash) {
      const m = allCountries.find(c => slug(c.name) === hash);
      if (m) { showDetail(m.id); return; }
    }
    applyFilters();
  })
  .catch(() => {
    document.getElementById('passStack').innerHTML =
      '<div class="empty-state">Could not load data. Run a local server.</div>';
  });
</script>
</body>
</html>
