<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Departure Lounge</title>
<meta name="description" content="A travel bucket list — 17 destinations, boarding passes not yet stamped.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garant:ital,wght@1,500;1,600&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Geist Mono';
  font-style: normal; font-display: swap; font-weight: 100 900;
  src: url(https://cdn.jsdelivr.net/fontsource/fonts/geist-mono:vf@latest/latin-wght-normal.woff2) format('woff2-variations');
}

/* ══ PALETTE ══ */
:root {
  --bg:       #181210;
  --bg-2:     #1e1810;
  --surface:  #261e16;
  --surface-2:#2e2418;
  --stub-bg:  #221a12;
  --border:   #382c20;
  --border-2: #4a3c2c;
  --text-1:   #f2e8d4;
  --text-2:   #c4b090;
  --text-3:   #847060;
  --text-4:   #524038;
  --gold:     #c8a040;
  --gold-dim: rgba(200,160,64,0.12);
  --asia:     #d4603a;
  --europe:   #4a80d0;
  --americas: #48a868;
  --africa:   #d09030;
  --oceania:  #38b0a8;
}
:root[data-theme="light"] {
  --bg:       #f4efe4;
  --bg-2:     #ece5d6;
  --surface:  #faf5eb;
  --surface-2:#f0e8d8;
  --stub-bg:  #ede4d2;
  --border:   #d4c8b0;
  --border-2: #beb09a;
  --text-1:   #1c1408;
  --text-2:   #3c3020;
  --text-3:   #786050;
  --text-4:   #a89888;
  --gold:     #a85c10;
  --gold-dim: rgba(168,92,16,0.08);
  --asia:     #c04828;
  --europe:   #2a60b0;
  --americas: #287848;
  --africa:   #b07020;
  --oceania:  #188898;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: 'Geist Mono', monospace;
  background: var(--bg);
  color: var(--text-2);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  transition: background 0.3s, color 0.3s;
}

/* ══ TOPBAR ══ */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 52px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 24px; gap: 16px;
}
.back-link {
  font-size: 0.6rem; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-3); text-decoration: none; transition: color 0.2s; flex-shrink: 0;
}
.back-link:hover { color: var(--gold); }
.topbar-brand {
  flex: 1; text-align: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem; letter-spacing: 8px; color: var(--text-1);
}
.topbar-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.saved-btn {
  font-size: 0.56rem; letter-spacing: 1px; text-transform: uppercase;
  color: var(--text-3); background: none;
  border: 1px solid var(--border); border-radius: 2px;
  padding: 4px 10px; cursor: pointer; transition: all 0.2s;
}
.saved-btn:hover, .saved-btn.active { color: var(--gold); border-color: var(--gold); background: var(--gold-dim); }
.theme-btn {
  font-size: 0.9rem; background: none; border: none;
  cursor: pointer; color: var(--text-3); transition: color 0.2s; padding: 4px;
}
.theme-btn:hover { color: var(--text-1); }

/* ══ CONTROLS ══ */
.controls-bar {
  position: fixed; top: 52px; left: 0; right: 0; z-index: 90;
  height: 44px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex; align-items: center; gap: 5px;
}
.filter-pill {
  font-size: 0.53rem; letter-spacing: 1.5px; text-transform: uppercase;
  border: 1px solid var(--border); border-radius: 1px;
  padding: 3px 9px; background: none; cursor: pointer;
  color: var(--text-4); transition: all 0.15s; flex-shrink: 0; height: 26px;
}
.filter-pill:hover { color: var(--text-2); border-color: var(--border-2); }
.filter-pill.active { color: var(--text-1); border-color: var(--text-3); background: var(--surface-2); }
.filter-pill[data-region="asia"].active    { color: var(--asia);     border-color: var(--asia);     background: rgba(212,96,58,0.08); }
.filter-pill[data-region="europe"].active  { color: var(--europe);   border-color: var(--europe);   background: rgba(74,128,208,0.08); }
.filter-pill[data-region="americas"].active{ color: var(--americas); border-color: var(--americas); background: rgba(72,168,104,0.08); }
.filter-pill[data-region="africa"].active  { color: var(--africa);   border-color: var(--africa);   background: rgba(208,144,48,0.08); }
.filter-pill[data-region="oceania"].active { color: var(--oceania);  border-color: var(--oceania);  background: rgba(56,176,168,0.08); }
.filter-sep { width: 1px; height: 16px; background: var(--border); flex-shrink: 0; margin: 0 2px; }
.search-wrap { flex: 1; min-width: 120px; max-width: 220px; position: relative; display: flex; align-items: center; }
.search-icon { position: absolute; left: 8px; font-size: 0.7rem; color: var(--text-4); pointer-events: none; }
.search-input {
  width: 100%; padding: 3px 8px 3px 26px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 1px;
  color: var(--text-1); font-size: 0.62rem; height: 26px;
  font-family: 'Geist Mono', monospace; letter-spacing: 0.5px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 2px var(--gold-dim); }
.search-input::placeholder { color: var(--text-4); }

/* ══ MAP CONTAINER ══ */
.map-wrap {
  position: fixed;
  top: 96px; left: 0; right: 0; bottom: 0;
  overflow: hidden;
  background: var(--bg);
}
#world-map {
  width: 100%; height: 100%; display: block;
}
.map-hint {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  font-size: 0.5rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-4); pointer-events: none; white-space: nowrap;
  transition: opacity 0.4s;
}
.map-loading-msg {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.58rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-4);
}

/* Map SVG elements */
.sphere    { fill: var(--bg-2); }
.graticule { fill: none; stroke: var(--border); stroke-width: 0.3px; opacity: 0.5; }
.land      { fill: var(--surface); stroke: var(--border); stroke-width: 0.4px; }
.flight-path {
  fill: none; stroke-width: 1.2px;
  stroke-linecap: round;
}
.fp-asia     { stroke: var(--asia); }
.fp-europe   { stroke: var(--europe); }
.fp-americas { stroke: var(--americas); }
.fp-africa   { stroke: var(--africa); }
.fp-oceania  { stroke: var(--oceania); }

.pin-group { cursor: pointer; }
.pin-group:hover .pin-ring { filter: brightness(1.5); }
.pin-group:hover .pin-dot  { filter: brightness(1.5); }
.pin-label {
  fill: var(--text-3);
  font-size: 7.5px;
  font-family: 'Geist Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 1px;
  opacity: 0;
  transition: opacity 0.15s;
  pointer-events: none;
}
.pin-group:hover .pin-label { opacity: 1; }
.pin-saved-dot {
  fill: var(--gold);
  opacity: 0;
  transition: opacity 0.2s;
}
.pin-saved-dot.visible { opacity: 1; }

.nyc-marker { pointer-events: none; }
.nyc-label { fill: var(--gold); font-size: 7px; font-family: 'Geist Mono', monospace; letter-spacing: 1.5px; opacity: 0.7; }

/* ══ OVERLAY ══ */
.overlay {
  position: fixed; inset: 0; z-index: 150;
  background: rgba(0,0,0,0.55);
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s;
}
.overlay.visible { opacity: 1; pointer-events: all; }

/* ══ SIDE PANEL ══ */
.side-panel {
  position: fixed;
  right: -480px; top: 0; bottom: 0;
  width: 440px;
  background: var(--bg);
  border-left: 1px solid var(--border);
  z-index: 200;
  overflow-y: auto;
  transition: right 0.38s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex; flex-direction: column;
}
.side-panel.open { right: 0; }

.panel-close {
  position: absolute; top: 14px; right: 18px; z-index: 10;
  background: none; border: none; cursor: pointer;
  font-size: 1.3rem; color: var(--text-3); transition: color 0.2s; line-height: 1;
}
.panel-close:hover { color: var(--text-1); }

/* Panel boarding pass header */
.panel-accent { height: 5px; background: var(--region-color, var(--border)); flex-shrink: 0; }
.panel-pass-head {
  padding: 24px 28px 20px; border-bottom: 1px solid var(--border);
  position: relative; flex-shrink: 0;
}
.panel-meta {
  font-size: 0.5rem; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--region-color, var(--text-4)); margin-bottom: 5px;
}
.panel-country {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.8rem, 9vw, 4rem);
  letter-spacing: 5px; color: var(--text-1); line-height: 0.93;
  margin-bottom: 12px;
}
.panel-tagline {
  font-family: 'Cormorant Garant', Georgia, serif;
  font-size: 1.02rem; font-style: italic;
  color: var(--text-2); line-height: 1.6; opacity: 0.85;
}

/* Panel meta fields */
.panel-fields {
  display: flex; flex-wrap: wrap; gap: 16px;
  padding: 14px 28px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.panel-field { display: flex; flex-direction: column; gap: 2px; }
.panel-field-label { font-size: 0.43rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-4); }
.panel-field-value { font-size: 0.7rem; color: var(--text-1); }
.status-chip {
  font-size: 0.44rem; letter-spacing: 1px; text-transform: uppercase;
  padding: 2px 6px; border: 1px solid var(--border); color: var(--text-3); display: inline-block;
}
.status-chip.planning { color: var(--gold); border-color: var(--gold); }
.status-chip.visited  { color: var(--americas); border-color: var(--americas); }

/* Panel body */
.panel-body {
  flex: 1; padding: 20px 28px 0;
  display: flex; flex-direction: column; gap: 20px;
  overflow-y: auto;
}
.panel-section-label {
  font-size: 0.44rem; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--text-4); margin-bottom: 11px;
  padding-bottom: 7px; border-bottom: 1px solid var(--border);
}
.panel-section-text { font-size: 0.76rem; color: var(--text-2); line-height: 1.9; }
.place-list, .food-list { display: flex; flex-direction: column; gap: 11px; }
.place-name, .food-name {
  font-size: 0.7rem; color: var(--text-1);
  display: flex; align-items: center; gap: 7px; margin-bottom: 2px;
}
.place-name::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--region-color, var(--border)); flex-shrink: 0; }
.food-name::before  { content: ''; width: 5px; height: 2px; background: var(--region-color, var(--border)); flex-shrink: 0; }
.place-notes, .food-notes { font-size: 0.68rem; color: var(--text-3); line-height: 1.7; padding-left: 12px; }
.tips-list { display: flex; flex-direction: column; gap: 8px; }
.tip { font-size: 0.72rem; color: var(--text-2); line-height: 1.75; display: flex; gap: 10px; }
.tip::before { content: '—'; color: var(--text-4); flex-shrink: 0; }

/* Wishlist button — sticky bottom of panel */
.panel-footer {
  position: sticky; bottom: 0;
  padding: 12px 28px 16px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.wishlist-btn {
  width: 100%; padding: 10px;
  background: none; border: 1px solid var(--border); border-radius: 2px;
  font-size: 0.56rem; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-2); cursor: pointer; transition: all 0.2s;
  font-family: 'Geist Mono', monospace;
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.wishlist-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
.wishlist-btn.saved { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

/* Region cascade */
.rc-asia     { --region-color: var(--asia); }
.rc-europe   { --region-color: var(--europe); }
.rc-americas { --region-color: var(--americas); }
.rc-africa   { --region-color: var(--africa); }
.rc-oceania  { --region-color: var(--oceania); }

/* ══ RESPONSIVE ══ */
@media (max-width: 640px) {
  body { overflow: auto; }
  .map-wrap { position: relative; top: 0; height: 55vh; margin-top: 96px; }
  .side-panel { width: 100%; right: -100%; }
  .side-panel.open { right: 0; }
  .topbar-brand { font-size: 1.4rem; letter-spacing: 5px; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a href="../../index.html#lab" class="back-link">← Portfolio</a>
  <div class="topbar-brand">Departure Lounge</div>
  <div class="topbar-right">
    <button class="saved-btn" id="savedBtn" onclick="toggleSavedFilter()">♥ <span id="savedCount">0</span></button>
    <button class="theme-btn" onclick="toggleTheme()">◐</button>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls-bar">
  <button class="filter-pill active" data-region="all">All</button>
  <button class="filter-pill" data-region="asia">Asia</button>
  <button class="filter-pill" data-region="europe">Europe</button>
  <button class="filter-pill" data-region="americas">Americas</button>
  <button class="filter-pill" data-region="africa">Africa</button>
  <button class="filter-pill" data-region="oceania">Oceania</button>
  <div class="filter-sep"></div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="search" class="search-input" id="searchInput" placeholder="Search…">
  </div>
</div>

<!-- MAP -->
<div class="map-wrap" id="mapWrap">
  <div class="map-loading-msg" id="mapLoading">Charting routes…</div>
  <svg id="world-map"></svg>
  <div class="map-hint" id="mapHint">Click a destination to board</div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>

<!-- SIDE PANEL -->
<div class="side-panel" id="sidePanel">
  <button class="panel-close" onclick="closePanel()">×</button>
  <div id="panelInner"></div>
  <div class="panel-footer">
    <button class="wishlist-btn" id="wishlistBtn" onclick="toggleWishlist()">
      <span id="wishlistHeart">♡</span><span id="wishlistLabel">Save to Wishlist</span>
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
<script>
// ── CONSTANTS ─────────────────────────────────────
const NYC      = [-74.006, 40.7128];
const LS_KEY   = 'atlas-wishlist';
const THEME_KEY= 'atlas-theme';
const REGIONS  = { asia:'Asia', europe:'Europe', americas:'Americas', africa:'Africa', oceania:'Oceania' };
const COORDS   = {
  'Japan':       [138.25,  36.20], 'Italy':      [ 12.57,  41.87],
  'Taiwan':      [120.96,  23.70], 'Ireland':    [ -8.24,  53.41],
  'Greece':      [ 21.82,  39.07], 'France':     [  2.21,  46.23],
  'Vietnam':     [108.28,  14.06], 'Morocco':    [ -7.09,  31.79],
  'Argentina':   [-63.62, -38.42], 'Portugal':   [ -8.22,  39.40],
  'Iceland':     [-19.02,  64.96], 'Mexico':     [-102.55, 23.63],
  'Thailand':    [100.99,  15.87], 'Spain':      [ -3.75,  40.46],
  'Norway':      [  8.47,  60.47], 'New Zealand':[174.89, -40.90],
  'India':       [ 78.96,  20.59],
};

// ── STATE ─────────────────────────────────────────
let allCountries  = [];
let activeRegion  = 'all';
let showingSaved  = false;
let currentId     = null;
let savedIds      = new Set(JSON.parse(localStorage.getItem(LS_KEY) || '[]'));
let mapSvg        = null;
let mapProjection = null;

// ── UTILS ─────────────────────────────────────────
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const flightNo = id => 'DL ' + String(id).padStart(3,'0');
function savePersist() { localStorage.setItem(LS_KEY, JSON.stringify([...savedIds])); }
function updateBadge() { document.getElementById('savedCount').textContent = savedIds.size; }

// ── THEME ─────────────────────────────────────────
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem(THEME_KEY, next);
}
const _t = localStorage.getItem(THEME_KEY);
if (_t) document.documentElement.setAttribute('data-theme', _t);

// ── MAP ───────────────────────────────────────────
async function initMap() {
  if (typeof d3 === 'undefined') {
    document.getElementById('mapLoading').textContent = 'Map unavailable — check connection.';
    return;
  }

  const wrap = document.getElementById('mapWrap');
  const W = wrap.clientWidth  || 960;
  const H = wrap.clientHeight || 540;

  const svg = d3.select('#world-map')
    .attr('viewBox', `0 0 ${W} ${H}`)
    .attr('preserveAspectRatio', 'xMidYMid meet');

  mapSvg = svg;

  mapProjection = d3.geoNaturalEarth1()
    .scale(W / 6.28)
    .translate([W / 2, H / 2 + H * 0.04]);

  const path = d3.geoPath().projection(mapProjection);

  // Sphere background
  svg.append('path')
    .datum({ type: 'Sphere' })
    .attr('class', 'sphere')
    .attr('d', path);

  // Graticule
  svg.append('path')
    .datum(d3.geoGraticule().step([30, 30])())
    .attr('class', 'graticule')
    .attr('d', path);

  // Load world topology
  let world;
  try {
    world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2.0.2/countries-110m.json');
  } catch(e) {
    document.getElementById('mapLoading').textContent = 'Could not load map data.';
    return;
  }

  document.getElementById('mapLoading').style.display = 'none';

  // Countries
  svg.append('g').selectAll('path')
    .data(topojson.feature(world, world.objects.countries).features)
    .join('path')
    .attr('class', 'land')
    .attr('d', path);

  // NYC origin marker (diamond)
  const [nx, ny] = mapProjection(NYC);
  const nycG = svg.append('g').attr('class', 'nyc-marker').attr('transform', `translate(${nx},${ny})`);
  nycG.append('polygon')
    .attr('points', '0,-6 5,0 0,6 -5,0')
    .attr('fill', 'none').attr('stroke', 'var(--gold)').attr('stroke-width', 1.5);
  nycG.append('polygon')
    .attr('points', '0,-3 2.5,0 0,3 -2.5,0')
    .attr('fill', 'var(--gold)');
  nycG.append('text').attr('class', 'nyc-label').attr('dx', 9).attr('dy', 3).text('JFK');

  // Routes & pins
  drawAll(svg, nx, ny);
}

function drawAll(svg, nx, ny) {
  const routeG = svg.append('g');
  const pinG   = svg.append('g');

  allCountries.forEach((c, i) => {
    const lnglat = COORDS[c.name];
    if (!lnglat) return;

    const [px, py] = mapProjection(lnglat);
    const delay    = 300 + i * 160;   // ms before path starts
    const pathDur  = 900;             // ms path takes to draw

    // ── Arc control point ──────────────────────────
    const dist = Math.hypot(px - nx, py - ny);
    const cpx  = (nx + px) / 2;
    const cpy  = (ny + py) / 2 - Math.min(dist * 0.38, 140);
    const d    = `M ${nx} ${ny} Q ${cpx} ${cpy} ${px} ${py}`;

    // ── Flight path ────────────────────────────────
    const line = routeG.append('path')
      .attr('class', `flight-path fp-${c.region}`)
      .attr('d', d)
      .attr('data-id', c.id)
      .attr('data-region', c.region)
      .style('opacity', 0)
      .style('stroke-dasharray', 2000)
      .style('stroke-dashoffset', 2000);

    // Correct dasharray after element exists in DOM
    requestAnimationFrame(() => {
      const len = line.node().getTotalLength();
      line.style('stroke-dasharray', len).style('stroke-dashoffset', len);
    });

    setTimeout(() => {
      line.style('transition', `opacity 0.4s, stroke-dashoffset ${pathDur}ms cubic-bezier(0.4,0,0.55,1)`)
          .style('opacity', 0.38)
          .style('stroke-dashoffset', 0);
    }, delay);

    // ── Pin ───────────────────────────────────────
    setTimeout(() => {
      const pg = pinG.append('g')
        .attr('class', `pin-group rc-${c.region}`)
        .attr('transform', `translate(${px},${py})`)
        .attr('data-id', c.id)
        .attr('data-region', c.region)
        .style('opacity', 0)
        .on('click', () => openPanel(c.id));

      // Pulse ring
      pg.append('circle').attr('r', 10)
        .attr('fill', 'none')
        .attr('stroke', `var(--${c.region})`)
        .attr('stroke-width', 1)
        .attr('opacity', 0.2)
        .style('animation', `pinPulse 2.8s ${Math.random()*2}s ease-in-out infinite`);

      // Outer ring
      pg.append('circle').attr('class', 'pin-ring').attr('r', 5.5)
        .attr('fill', 'none')
        .attr('stroke', `var(--${c.region})`)
        .attr('stroke-width', 1.5);

      // Inner dot
      pg.append('circle').attr('class', 'pin-dot').attr('r', 2.8)
        .attr('fill', `var(--${c.region})`);

      // Saved dot (gold, top-right of pin)
      pg.append('circle').attr('class', `pin-saved-dot ${savedIds.has(c.id) ? 'visible' : ''}`)
        .attr('cx', 5).attr('cy', -5).attr('r', 2.5);

      // Label — left side for eastern hemisphere, right for western
      const isEast = lnglat[0] > -30;
      pg.append('text').attr('class', 'pin-label')
        .attr('dx', isEast ? 9 : -9)
        .attr('dy', 3.5)
        .attr('text-anchor', isEast ? 'start' : 'end')
        .text(c.name.toUpperCase());

      // Fade in
      pg.transition().duration(350).style('opacity', 1);

    }, delay + pathDur + 80);
  });
}

// Pulse keyframe injected once
const style = document.createElement('style');
style.textContent = `
@keyframes pinPulse {
  0%, 100% { r: 8;  opacity: 0.15; }
  50%       { r: 13; opacity: 0.05; }
}`;
document.head.appendChild(style);

// ── PANEL ─────────────────────────────────────────
function openPanel(id) {
  const c = allCountries.find(x => x.id === id);
  if (!c) return;
  currentId = id;

  const rl     = REGIONS[c.region] || c.region;
  const saved  = savedIds.has(id);
  const season = c.best_time.split(',')[0];
  const lang   = c.language.split(',')[0].split('(')[0].trim();
  const vibe   = (c.vibe_tags||[])[0] || '—';

  const cities = (c.cities||[]).map(x => `
    <div><div class="place-name">${esc(x.name)}</div>
    <div class="place-notes">${esc(x.notes)}</div></div>`).join('');

  const food = (c.food||[]).map(x => `
    <div><div class="food-name">${esc(x.name)}</div>
    <div class="food-notes">${esc(x.notes)}</div></div>`).join('');

  const tips = (c.tips||[]).map(t => `<div class="tip">${esc(t)}</div>`).join('');

  document.getElementById('panelInner').innerHTML = `
    <div class="rc-${c.region}">
      <div class="panel-accent"></div>
      <div class="panel-pass-head">
        <div class="panel-meta">${esc(rl)} &middot; ${flightNo(c.id)}</div>
        <div class="panel-country">${esc(c.name)}</div>
        <div class="panel-tagline">"${esc(c.tagline)}"</div>
      </div>
      <div class="panel-fields">
        <div class="panel-field">
          <div class="panel-field-label">◷ Season</div>
          <div class="panel-field-value">${esc(season)}</div>
        </div>
        <div class="panel-field">
          <div class="panel-field-label">⊕ Language</div>
          <div class="panel-field-value">${esc(lang)}</div>
        </div>
        <div class="panel-field">
          <div class="panel-field-label">✦ Vibe</div>
          <div class="panel-field-value">${esc(vibe)}</div>
        </div>
        <div class="panel-field">
          <div class="panel-field-label">◎ Status</div>
          <div class="panel-field-value"><span class="status-chip ${c.status}">${esc(c.status)}</span></div>
        </div>
      </div>
      <div class="panel-body">
        <div>
          <div class="panel-section-label">About</div>
          <div class="panel-section-text">${esc(c.description)}</div>
        </div>
        ${cities ? `<div>
          <div class="panel-section-label">Cities to Visit</div>
          <div class="place-list">${cities}</div>
        </div>` : ''}
        ${food ? `<div>
          <div class="panel-section-label">Food to Try</div>
          <div class="food-list">${food}</div>
        </div>` : ''}
        ${tips ? `<div>
          <div class="panel-section-label">Tips</div>
          <div class="tips-list">${tips}</div>
        </div>` : ''}
        <div style="height:8px"></div>
      </div>
    </div>`;

  setWishlistBtn(saved);
  document.getElementById('sidePanel').classList.add('open');
  document.getElementById('overlay').classList.add('visible');
  document.getElementById('sidePanel').scrollTop = 0;
}

function closePanel() {
  document.getElementById('sidePanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
  currentId = null;
}

function setWishlistBtn(saved) {
  const btn = document.getElementById('wishlistBtn');
  document.getElementById('wishlistHeart').textContent = saved ? '♥' : '♡';
  document.getElementById('wishlistLabel').textContent  = saved ? 'Saved' : 'Save to Wishlist';
  btn.className = 'wishlist-btn' + (saved ? ' saved' : '');
}

function toggleWishlist() {
  if (currentId === null) return;
  savedIds.has(currentId) ? savedIds.delete(currentId) : savedIds.add(currentId);
  savePersist(); updateBadge();
  setWishlistBtn(savedIds.has(currentId));
  // Update saved dot on pin
  if (mapSvg) {
    mapSvg.selectAll('.pin-group').each(function() {
      if (+this.getAttribute('data-id') === currentId) {
        d3.select(this).select('.pin-saved-dot')
          .classed('visible', savedIds.has(currentId));
      }
    });
  }
}

// ── FILTERS ───────────────────────────────────────
function applyFilters() {
  if (!mapSvg) return;
  const q = document.getElementById('searchInput').value.trim().toLowerCase();

  mapSvg.selectAll('.pin-group').each(function() {
    const id = +this.getAttribute('data-id');
    const c  = allCountries.find(x => x.id === id);
    d3.select(this).transition().duration(180)
      .style('opacity', c && matchesFilter(c, q) ? 1 : 0.12);
  });

  mapSvg.selectAll('.flight-path').each(function() {
    const id = +this.getAttribute('data-id');
    const c  = allCountries.find(x => x.id === id);
    // Only dim paths that have already been animated (dashoffset = 0)
    if (this.style.strokeDashoffset !== '' && parseFloat(this.style.strokeDashoffset) < 5) {
      d3.select(this).style('opacity', c && matchesFilter(c, q) ? 0.38 : 0.06);
    }
  });
}

function matchesFilter(c, q) {
  if (activeRegion !== 'all' && c.region !== activeRegion) return false;
  if (showingSaved && !savedIds.has(c.id)) return false;
  if (q) {
    const hay = [c.name, c.tagline, ...(c.vibe_tags||[])].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function toggleSavedFilter() {
  showingSaved = !showingSaved;
  document.getElementById('savedBtn').classList.toggle('active', showingSaved);
  applyFilters();
}

// ── EVENT LISTENERS ────────────────────────────────
document.querySelectorAll('.filter-pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.filter-pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    activeRegion = p.dataset.region;
    applyFilters();
  });
});

let _st;
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(_st);
  _st = setTimeout(applyFilters, 150);
});

// ── BOOT ──────────────────────────────────────────
fetch('data/countries.json')
  .then(r => r.json())
  .then(data => {
    allCountries = data;
    updateBadge();
    initMap();
  })
  .catch(() => {
    document.getElementById('mapLoading').textContent = 'Could not load destinations.';
  });

updateBadge();
</script>
</body>
</html>
