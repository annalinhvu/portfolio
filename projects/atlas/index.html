<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Departure Lounge</title>
<meta name="description" content="A travel bucket list — 17 destinations, boarding passes not yet stamped.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garant:ital,wght@1,500;1,600&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Geist Mono';
  font-style: normal; font-display: swap; font-weight: 100 900;
  src: url(https://cdn.jsdelivr.net/fontsource/fonts/geist-mono:vf@latest/latin-wght-normal.woff2) format('woff2-variations');
}

/* ══ PALETTE ══ */
:root {
  --bg:       #181210;
  --bg-2:     #201810;
  --surface:  #261e16;
  --surface-2:#2e2418;
  --stub-bg:  #221a12;
  --border:   #382c20;
  --border-2: #4a3c2c;
  --text-1:   #f2e8d4;
  --text-2:   #c4b090;
  --text-3:   #847060;
  --text-4:   #524038;
  --gold:     #c8a040;
  --gold-dim: rgba(200,160,64,0.12);
  --asia:     #d4603a;
  --europe:   #4a80d0;
  --americas: #48a868;
  --africa:   #d09030;
  --oceania:  #38b0a8;
}
:root[data-theme="light"] {
  --bg:       #f4efe4;
  --bg-2:     #ece5d6;
  --surface:  #faf5eb;
  --surface-2:#f0e8d8;
  --stub-bg:  #ede4d2;
  --border:   #d4c8b0;
  --border-2: #beb09a;
  --text-1:   #1c1408;
  --text-2:   #3c3020;
  --text-3:   #786050;
  --text-4:   #a89888;
  --gold:     #a85c10;
  --gold-dim: rgba(168,92,16,0.08);
  --asia:     #c04828;
  --europe:   #2a60b0;
  --americas: #287848;
  --africa:   #b07020;
  --oceania:  #188898;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Geist Mono', monospace;
  background: var(--bg);
  color: var(--text-2);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}

/* ══ TOPBAR ══ */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 28px; height: 58px; gap: 20px;
}
.back-link {
  font-size: 0.6rem; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-3); text-decoration: none; transition: color 0.2s; flex-shrink: 0;
}
.back-link:hover { color: var(--gold); }
.topbar-brand {
  flex: 1; text-align: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem; letter-spacing: 8px; color: var(--text-1);
}
.topbar-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.saved-btn {
  font-size: 0.58rem; letter-spacing: 1px; text-transform: uppercase;
  color: var(--text-3); background: none;
  border: 1px solid var(--border); border-radius: 2px;
  padding: 4px 10px; cursor: pointer; transition: all 0.2s;
}
.saved-btn:hover, .saved-btn.active {
  color: var(--gold); border-color: var(--gold); background: var(--gold-dim);
}
.theme-btn {
  font-size: 0.85rem; background: none; border: none;
  cursor: pointer; color: var(--text-3); transition: color 0.2s; padding: 4px;
}
.theme-btn:hover { color: var(--text-1); }

/* ══ TAGLINE STRIP ══ */
.tagline-strip {
  border-bottom: 1px solid var(--border);
  padding: 10px 28px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
}
.tagline-text {
  font-size: 0.6rem; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-4);
}
.tagline-stamp {
  display: flex; align-items: center; gap: 14px;
  font-size: 0.56rem; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-4);
}
.tagline-stamp span { color: var(--gold); }

/* ══ FILTERS ══ */
.filters-wrap {
  position: sticky; top: 58px; z-index: 90;
  background: var(--bg); border-bottom: 1px solid var(--border);
  padding: 10px 28px;
}
.filters-inner {
  max-width: 920px; margin: 0 auto;
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.filter-pill {
  font-size: 0.56rem; letter-spacing: 1.5px; text-transform: uppercase;
  border: 1px solid var(--border); border-radius: 1px;
  padding: 5px 11px; background: none; cursor: pointer;
  color: var(--text-3); transition: all 0.15s;
}
.filter-pill:hover { color: var(--text-1); border-color: var(--border-2); }
.filter-pill.active { color: var(--text-1); border-color: var(--text-3); background: var(--surface-2); }
.filter-pill[data-region="asia"].active    { color: var(--asia);     border-color: var(--asia); background: rgba(212,96,58,0.08); }
.filter-pill[data-region="europe"].active  { color: var(--europe);   border-color: var(--europe); background: rgba(74,128,208,0.08); }
.filter-pill[data-region="americas"].active{ color: var(--americas); border-color: var(--americas); background: rgba(72,168,104,0.08); }
.filter-pill[data-region="africa"].active  { color: var(--africa);   border-color: var(--africa); background: rgba(208,144,48,0.08); }
.filter-pill[data-region="oceania"].active { color: var(--oceania);  border-color: var(--oceania); background: rgba(56,176,168,0.08); }
.filter-sep { width: 1px; height: 14px; background: var(--border); flex-shrink: 0; }
.search-wrap {
  flex: 1; min-width: 160px; position: relative; display: flex; align-items: center;
}
.search-icon {
  position: absolute; left: 9px; font-size: 0.7rem; color: var(--text-4);
  pointer-events: none; line-height: 1;
}
.search-input {
  width: 100%;
  padding: 5px 10px 5px 28px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 1px;
  color: var(--text-1); font-size: 0.68rem;
  font-family: 'Geist Mono', monospace; letter-spacing: 0.5px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 2px var(--gold-dim); }
.search-input::placeholder { color: var(--text-4); }

/* ══ RESULT COUNT ══ */
.result-count {
  max-width: 920px; margin: 0 auto;
  padding: 10px 28px 4px;
  font-size: 0.54rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-4);
}

/* ══ PASS STACK ══ */
.pass-stack {
  max-width: 920px; margin: 0 auto;
  padding: 10px 28px 80px;
  display: flex; flex-direction: column; gap: 10px;
}

/* ══ BOARDING PASS ══ */
.boarding-pass {
  display: flex; align-items: stretch;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  transition: box-shadow 0.2s, transform 0.15s, border-color 0.2s;
  overflow: visible; /* allow hole-punches to bleed out */
  position: relative;
  animation: passIn 0.28s ease both;
}
.boarding-pass:hover {
  box-shadow: 0 10px 40px rgba(0,0,0,0.55), 0 3px 12px rgba(0,0,0,0.35);
  transform: translateY(-4px);
  border-color: var(--border-2);
}
@keyframes passIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Region left accent */
.pass-accent {
  width: 4px; flex-shrink: 0;
  background: var(--region-color, var(--border));
  border-radius: 4px 0 0 4px;
}

/* Pass main area */
.pass-main {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  padding: 18px 22px 16px;
  gap: 8px;
}

/* Header row: FROM → TO + flight number */
.pass-header {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
}
.pass-route {
  display: flex; align-items: center; gap: 8px;
}
.pass-iata {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.55rem; letter-spacing: 3px;
  color: var(--text-1); line-height: 1;
}
.pass-iata.origin { color: var(--text-3); }
.pass-arrow {
  font-size: 0.75rem; color: var(--region-color, var(--text-4));
  margin: 0 2px; flex-shrink: 0;
}
.pass-flight-no {
  font-size: 0.54rem; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-4); text-align: right;
}

/* Country name */
.pass-country {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.2rem, 4.5vw, 3rem);
  letter-spacing: 5px; text-transform: uppercase;
  color: var(--text-1); line-height: 1;
}

/* Italic tagline */
.pass-tagline {
  font-family: 'Cormorant Garant', Georgia, serif;
  font-size: 1.05rem; font-style: italic;
  color: var(--text-2); line-height: 1.55;
  max-width: 440px; opacity: 0.88;
}

/* Vibe tags */
.pass-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
.pass-tag {
  font-size: 0.48rem; letter-spacing: 1px; text-transform: uppercase;
  color: var(--text-3); border: 1px solid var(--border-2);
  background: var(--surface-2);
  padding: 3px 7px; transition: all 0.15s; cursor: default;
}
.pass-tag:hover {
  background: var(--gold-dim); border-color: var(--gold);
  color: var(--gold);
}

/* ══ TEAR LINE ══ */
.pass-tear {
  width: 24px; flex-shrink: 0;
  position: relative; align-self: stretch;
  display: flex; align-items: center; justify-content: center;
}
/* The dashed vertical line */
.pass-tear::after {
  content: '';
  position: absolute; left: 50%; top: 0; bottom: 0;
  width: 1px; transform: translateX(-50%);
  background: repeating-linear-gradient(
    to bottom,
    var(--border) 0px, var(--border) 5px,
    transparent 5px, transparent 9px
  );
}
/* Hole punch top */
.pass-tear .hole-top,
.pass-tear .hole-bot {
  position: absolute; left: 50%; transform: translateX(-50%);
  width: 18px; height: 9px;
  background: var(--bg);
  border: 1px solid var(--border);
  z-index: 2;
}
.pass-tear .hole-top {
  top: -1px;
  border-radius: 0 0 9px 9px;
  border-top: none;
}
.pass-tear .hole-bot {
  bottom: -1px;
  border-radius: 9px 9px 0 0;
  border-bottom: none;
}

/* ══ STUB ══ */
.pass-stub {
  width: 172px; flex-shrink: 0;
  background: var(--stub-bg);
  /* subtle diagonal stripe */
  background-image:
    repeating-linear-gradient(
      45deg,
      transparent 0, transparent 12px,
      rgba(255,255,255,0.012) 12px, rgba(255,255,255,0.012) 13px
    );
  background-color: var(--stub-bg);
  border-radius: 0 4px 4px 0;
  padding: 16px 18px 14px;
  display: flex; flex-direction: column; gap: 0;
  justify-content: space-between;
}
.stub-fields {
  display: flex; flex-direction: column; gap: 8px;
  margin-bottom: 10px;
}
.stub-field { display: flex; flex-direction: column; gap: 2px; }
.stub-label {
  font-size: 0.46rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-4);
}
.stub-value {
  font-size: 0.7rem; color: var(--text-1); letter-spacing: 0.2px;
}
.stub-status {
  font-size: 0.5rem; letter-spacing: 1px; text-transform: uppercase;
  padding: 2px 7px; border: 1px solid var(--border);
  color: var(--text-3); display: inline-block;
}
.stub-status.planning { color: var(--gold); border-color: var(--gold); }
.stub-status.visited  { color: var(--americas); border-color: var(--americas); }

/* Fake barcode */
.stub-barcode {
  display: flex; gap: 1.5px; align-items: flex-end;
  height: 24px; margin-bottom: 10px; opacity: 0.35;
}
.stub-barcode span {
  flex: 1; background: var(--text-2); border-radius: 0.5px;
}

/* Heart */
.stub-heart {
  background: none; border: none; cursor: pointer;
  font-size: 1rem; color: var(--text-4);
  transition: color 0.2s, transform 0.15s; padding: 0; align-self: flex-end;
}
.stub-heart:hover { color: var(--text-2); }
.stub-heart.saved { color: var(--gold); transform: scale(1.15); }

/* Region helpers */
.rc-asia     { --region-color: var(--asia); }
.rc-europe   { --region-color: var(--europe); }
.rc-americas { --region-color: var(--americas); }
.rc-africa   { --region-color: var(--africa); }
.rc-oceania  { --region-color: var(--oceania); }

/* ══ EMPTY STATE ══ */
.empty-state {
  text-align: center; padding: 64px 24px;
  color: var(--text-4); font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase;
}

/* ══ DETAIL VIEW ══ */
#view-detail { display: none; }
.detail-wrap { max-width: 920px; margin: 0 auto; padding: 36px 28px 80px; }
.detail-back {
  font-size: 0.58rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-3); background: none; border: none;
  cursor: pointer; transition: color 0.2s; padding: 0; margin-bottom: 32px; display: block;
}
.detail-back:hover { color: var(--gold); }

/* Detail pass header */
.detail-pass {
  display: flex; align-items: stretch;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; overflow: visible;
  margin-bottom: 24px; position: relative;
}
.detail-accent {
  width: 6px; flex-shrink: 0;
  background: var(--region-color, var(--border));
  border-radius: 4px 0 0 4px;
}
.detail-pass-main {
  flex: 1; padding: 28px 32px; display: flex; flex-direction: column; gap: 6px;
}
.detail-region-label {
  font-size: 0.54rem; letter-spacing: 3px; text-transform: uppercase;
  color: var(--region-color, var(--text-4));
}
.detail-country {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3rem, 7vw, 4.8rem);
  letter-spacing: 6px; color: var(--text-1); line-height: 0.95;
}
.detail-tagline {
  font-family: 'Cormorant Garant', Georgia, serif;
  font-size: 1.1rem; font-style: italic;
  color: var(--text-3); line-height: 1.6; margin-top: 6px;
}
.detail-tear {
  width: 24px; flex-shrink: 0; position: relative;
  display: flex; align-items: center; justify-content: center;
}
.detail-tear::after {
  content: ''; position: absolute; left: 50%; top: 0; bottom: 0;
  width: 1px; transform: translateX(-50%);
  background: repeating-linear-gradient(
    to bottom, var(--border) 0px, var(--border) 5px, transparent 5px, transparent 9px
  );
}
.detail-tear .hole-top, .detail-tear .hole-bot {
  position: absolute; left: 50%; transform: translateX(-50%);
  width: 18px; height: 9px; background: var(--bg);
  border: 1px solid var(--border); z-index: 2;
}
.detail-tear .hole-top { top: -1px; border-radius: 0 0 9px 9px; border-top: none; }
.detail-tear .hole-bot { bottom: -1px; border-radius: 9px 9px 0 0; border-bottom: none; }
.detail-stub {
  width: 200px; flex-shrink: 0;
  background: var(--stub-bg);
  background-image: repeating-linear-gradient(
    45deg, transparent 0, transparent 12px,
    rgba(255,255,255,0.012) 12px, rgba(255,255,255,0.012) 13px
  );
  background-color: var(--stub-bg);
  border-radius: 0 4px 4px 0;
  padding: 26px 22px;
  display: flex; flex-direction: column; gap: 14px; justify-content: space-between;
}
.detail-stub-field { display: flex; flex-direction: column; gap: 3px; }
.detail-stub-label {
  font-size: 0.46rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-4);
}
.detail-stub-value { font-size: 0.78rem; color: var(--text-1); }
.detail-heart-btn {
  width: 100%; padding: 10px;
  background: none; border: 1px solid var(--border); border-radius: 2px;
  font-size: 0.56rem; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-2); cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.detail-heart-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
.detail-heart-btn.saved { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

/* Detail content */
.detail-sections {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}
@media (max-width: 640px) { .detail-sections { grid-template-columns: 1fr; } }
.detail-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 3px; padding: 20px 22px;
}
.detail-section.full { grid-column: 1 / -1; }
.section-label {
  font-size: 0.48rem; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--text-4); margin-bottom: 14px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.section-text { font-size: 0.8rem; color: var(--text-2); line-height: 1.9; }

.place-list, .food-list { display: flex; flex-direction: column; gap: 13px; }
.place-item, .food-item {}
.place-name, .food-name {
  font-size: 0.76rem; font-weight: 600; color: var(--text-1);
  display: flex; align-items: center; gap: 8px; margin-bottom: 3px;
}
.place-name::before {
  content: ''; width: 5px; height: 5px; border-radius: 50%;
  background: var(--region-color, var(--border)); flex-shrink: 0;
}
.food-name::before {
  content: ''; width: 5px; height: 2px;
  background: var(--region-color, var(--border)); flex-shrink: 0;
}
.place-notes, .food-notes {
  font-size: 0.74rem; color: var(--text-3); line-height: 1.7; padding-left: 13px;
}
.tips-list { display: flex; flex-direction: column; gap: 10px; }
.tip { font-size: 0.76rem; color: var(--text-2); line-height: 1.75; display: flex; gap: 10px; }
.tip::before { content: '—'; color: var(--text-4); flex-shrink: 0; }

/* ══ RESPONSIVE ══ */
@media (max-width: 580px) {
  .pass-stub { width: 130px; padding: 14px; }
  .pass-main { padding: 14px 16px; }
  .pass-country { font-size: 1.8rem; }
  .pass-iata { font-size: 1.1rem; }
  .tagline-strip { flex-direction: column; align-items: flex-start; gap: 4px; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a href="../../index.html#lab" class="back-link">← Portfolio</a>
  <div class="topbar-brand">Departure Lounge</div>
  <div class="topbar-right">
    <button class="saved-btn" id="savedBtn" onclick="toggleSavedFilter()">
      ♥ <span id="savedCount">0</span>
    </button>
    <button class="theme-btn" onclick="toggleTheme()">◐</button>
  </div>
</div>

<!-- TAGLINE STRIP -->
<div class="tagline-strip">
  <div class="tagline-text">Travel Bucket List &middot; Boarding passes not yet stamped</div>
  <div class="tagline-stamp">
    <span>✈</span> Next destination: <span>unknown</span>
  </div>
</div>

<!-- FILTERS -->
<div class="filters-wrap">
  <div class="filters-inner">
    <button class="filter-pill active" data-region="all">All</button>
    <button class="filter-pill" data-region="asia">Asia</button>
    <button class="filter-pill" data-region="europe">Europe</button>
    <button class="filter-pill" data-region="americas">Americas</button>
    <button class="filter-pill" data-region="africa">Africa</button>
    <button class="filter-pill" data-region="oceania">Oceania</button>
    <div class="filter-sep"></div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="search" class="search-input" id="searchInput" placeholder="Search destinations…">
    </div>
  </div>
</div>

<!-- CATALOG VIEW -->
<div id="view-catalog">
  <div class="result-count" id="resultCount"></div>
  <div class="pass-stack" id="passStack"></div>
</div>

<!-- DETAIL VIEW -->
<div id="view-detail">
  <div class="detail-wrap">
    <button class="detail-back" onclick="showCatalog()">← Departure Lounge</button>
    <div id="detailContent"></div>
  </div>
</div>

<script>
const REGION_LABELS = { asia:'Asia', europe:'Europe', americas:'Americas', africa:'Africa', oceania:'Oceania' };
// Fake barcode heights — deterministic from id
function barcode(id) {
  const seed = [3,7,2,9,1,5,4,8,6,2,7,3,9,1,5,4,8,6,3,7,2,9,1];
  const heights = [40,70,100,55,85,30,95,65,45,80,35,75,50,90,25,60,100,40,70,55,85,30,95];
  let html = '';
  for (let i = 0; i < 18; i++) {
    const h = heights[(id * 3 + i * seed[i % seed.length]) % heights.length];
    html += `<span style="height:${h}%"></span>`;
  }
  return html;
}

const LS_KEY = 'atlas-wishlist';
let allCountries = [];
let activeRegion = 'all';
let showingSaved = false;
let searchTimer = null;
let savedIds = new Set(JSON.parse(localStorage.getItem(LS_KEY) || '[]'));

function savePersist() { localStorage.setItem(LS_KEY, JSON.stringify([...savedIds])); }
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function slug(n) { return n.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''); }

// Simple flight number from id
function flightNo(id) {
  return 'DL ' + String(id).padStart(3,'0');
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let res = allCountries.filter(c => {
    if (activeRegion !== 'all' && c.region !== activeRegion) return false;
    if (showingSaved && !savedIds.has(c.id)) return false;
    if (q) {
      const hay = [c.name, c.tagline, ...(c.vibe_tags||[]), ...(c.food||[]).map(f=>f.name)].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  renderPasses(res);
  document.getElementById('resultCount').textContent =
    res.length + ' boarding pass' + (res.length===1?'':'es');
}

function renderPasses(list) {
  const stack = document.getElementById('passStack');
  if (!list.length) {
    stack.innerHTML = '<div class="empty-state">No destinations match.</div>';
    return;
  }
  stack.innerHTML = list.map((c, i) => {
    const saved = savedIds.has(c.id);
    const tags = (c.vibe_tags||[]).slice(0,4).map(t=>`<span class="pass-tag">${esc(t)}</span>`).join('');
    return `
    <div class="boarding-pass rc-${c.region}" style="animation-delay:${i*0.035}s"
         onclick="handleClick(event,${c.id})">
      <div class="pass-accent"></div>
      <div class="pass-main">
        <div class="pass-header">
          <div class="pass-route">
            <div class="pass-iata origin">NYC</div>
            <div class="pass-arrow">→</div>
            <div class="pass-iata">${esc(c.code)}</div>
          </div>
          <div class="pass-flight-no">${flightNo(c.id)}<br>${esc(REGION_LABELS[c.region]||'')}</div>
        </div>
        <div class="pass-country">${esc(c.name)}</div>
        <div class="pass-tagline">${esc(c.tagline)}</div>
        ${tags?`<div class="pass-tags">${tags}</div>`:''}
      </div>
      <div class="pass-tear">
        <div class="hole-top"></div>
        <div class="hole-bot"></div>
      </div>
      <div class="pass-stub">
        <div class="stub-fields">
          <div class="stub-field">
            <div class="stub-label">◷ Season</div>
            <div class="stub-value">${esc(c.best_time.split(',')[0])}</div>
          </div>
          <div class="stub-field">
            <div class="stub-label">⊕ Language</div>
            <div class="stub-value">${esc(c.language.split(',')[0].split('(')[0].trim())}</div>
          </div>
          <div class="stub-field">
            <div class="stub-label">✦ Vibe</div>
            <div class="stub-value">${esc((c.vibe_tags||[])[0]||'—')}</div>
          </div>
          <div class="stub-field">
            <div class="stub-label">◎ Status</div>
            <div class="stub-value"><span class="stub-status ${c.status}">${esc(c.status)}</span></div>
          </div>
        </div>
        <div class="stub-barcode">${barcode(c.id)}</div>
        <button class="stub-heart ${saved?'saved':''}"
                onclick="toggleSaved(event,${c.id})" aria-label="Wishlist">
          ${saved?'♥':'♡'}
        </button>
      </div>
    </div>`;
  }).join('');
}

function handleClick(e, id) {
  if (e.target.closest('.stub-heart')) return;
  showDetail(id);
}

function showDetail(id) {
  const c = allCountries.find(x=>x.id===id);
  if (!c) return;
  const saved = savedIds.has(c.id);
  const rl = REGION_LABELS[c.region]||c.region;

  const cities = (c.cities||[]).map(x=>`
    <div class="place-item">
      <div class="place-name">${esc(x.name)}</div>
      <div class="place-notes">${esc(x.notes)}</div>
    </div>`).join('');

  const food = (c.food||[]).map(x=>`
    <div class="food-item">
      <div class="food-name">${esc(x.name)}</div>
      <div class="food-notes">${esc(x.notes)}</div>
    </div>`).join('');

  const tips = (c.tips||[]).map(t=>`<div class="tip">${esc(t)}</div>`).join('');

  document.getElementById('detailContent').innerHTML = `
    <div class="rc-${c.region}">
      <div class="detail-pass">
        <div class="detail-accent"></div>
        <div class="detail-pass-main">
          <div class="detail-region-label">${esc(rl)} &middot; ${flightNo(c.id)}</div>
          <div class="detail-country">${esc(c.name)}</div>
          <div class="detail-tagline">"${esc(c.tagline)}"</div>
        </div>
        <div class="detail-tear">
          <div class="hole-top"></div>
          <div class="hole-bot"></div>
        </div>
        <div class="detail-stub">
          <div class="detail-stub-field">
            <div class="detail-stub-label">Best Time</div>
            <div class="detail-stub-value">${esc(c.best_time)}</div>
          </div>
          <div class="detail-stub-field">
            <div class="detail-stub-label">Language</div>
            <div class="detail-stub-value">${esc(c.language)}</div>
          </div>
          <div class="detail-stub-field">
            <div class="detail-stub-label">Currency</div>
            <div class="detail-stub-value">${esc(c.currency)}</div>
          </div>
          <div class="detail-stub-field">
            <div class="detail-stub-label">Status</div>
            <div class="detail-stub-value"><span class="stub-status ${c.status}">${esc(c.status)}</span></div>
          </div>
          <button class="detail-heart-btn ${saved?'saved':''}" id="detailHeart"
                  onclick="toggleSavedDetail(${c.id})">
            ${saved?'♥ Saved':'♡ Save'}
          </button>
        </div>
      </div>

      <div class="detail-sections">
        <div class="detail-section full">
          <div class="section-label">About</div>
          <div class="section-text">${esc(c.description)}</div>
        </div>
        ${cities?`<div class="detail-section">
          <div class="section-label">Cities to Visit</div>
          <div class="place-list">${cities}</div>
        </div>`:''}
        ${food?`<div class="detail-section">
          <div class="section-label">Food to Try</div>
          <div class="food-list">${food}</div>
        </div>`:''}
        ${tips?`<div class="detail-section full">
          <div class="section-label">Tips</div>
          <div class="tips-list">${tips}</div>
        </div>`:''}
      </div>
    </div>`;

  document.getElementById('view-catalog').style.display = 'none';
  document.getElementById('view-detail').style.display = 'block';
  window.scrollTo(0,0);
  history.pushState({view:'detail',id},'','#'+slug(c.name));
}

function showCatalog() {
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('view-catalog').style.display = 'block';
  history.pushState({view:'catalog'},'',location.pathname);
  updateBadge();
}

function toggleSaved(e, id) {
  e.stopPropagation();
  savedIds.has(id)?savedIds.delete(id):savedIds.add(id);
  savePersist(); updateBadge(); applyFilters();
}

function toggleSavedDetail(id) {
  savedIds.has(id)?savedIds.delete(id):savedIds.add(id);
  savePersist(); updateBadge();
  const btn = document.getElementById('detailHeart');
  if (btn) {
    const s = savedIds.has(id);
    btn.className = 'detail-heart-btn'+(s?' saved':'');
    btn.textContent = s?'♥ Saved':'♡ Save';
  }
}

function toggleSavedFilter() {
  showingSaved = !showingSaved;
  document.getElementById('savedBtn').classList.toggle('active', showingSaved);
  applyFilters();
}

function updateBadge() {
  document.getElementById('savedCount').textContent = savedIds.size;
}

function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('atlas-theme', next);
}

document.querySelectorAll('.filter-pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.filter-pill').forEach(x=>x.classList.remove('active'));
    p.classList.add('active');
    activeRegion = p.dataset.region;
    applyFilters();
  });
});

document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilters, 150);
});

window.addEventListener('popstate', e => {
  if (e.state?.view==='detail') showDetail(e.state.id);
  else {
    document.getElementById('view-detail').style.display='none';
    document.getElementById('view-catalog').style.display='block';
  }
});

const savedTheme = localStorage.getItem('atlas-theme');
if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);

fetch('data/countries.json')
  .then(r=>r.json())
  .then(data => {
    allCountries = data;
    updateBadge();
    const hash = location.hash.slice(1);
    if (hash) {
      const m = allCountries.find(c=>slug(c.name)===hash);
      if (m) { showDetail(m.id); return; }
    }
    applyFilters();
  })
  .catch(()=>{
    document.getElementById('passStack').innerHTML =
      '<div class="empty-state">Could not load data. Run a local server.</div>';
  });
</script>
</body>
</html>
